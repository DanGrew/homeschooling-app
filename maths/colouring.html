<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colouring Pictures</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-prev="prevPicture" data-next="nextPicture"></div>
<div class="game-area">
  <div class="game-title"><span id="title"></span></div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="done" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,240,0.85);">
      <div style="font-size:2.5em;margin-bottom:12px;">&#11088; Well done! &#11088;</div>
      <button onclick="nextPicture()" style="background:#2ECC71;color:white;border:none;font-size:1.8em;padding:20px 44px;border-radius:18px;font-family:inherit;cursor:pointer;">Next &#8595;</button>
    </div>
  </div>
</div>
<script>var pictures=[];</script>
<script src="colouring/pictures/sun.js"></script>
<script src="colouring/pictures/cat.js"></script>
<script src="colouring/pictures/fish.js"></script>
<script src="colouring/pictures/house.js"></script>
<script src="colouring/pictures/tree.js"></script>
<script src="colouring/generated/zebra-colouring-level-1.js"></script>
<script>
var picIdx=0,filled,total;

function ns(tag,attrs){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});
  return el;
}

function render(){
  var pic=pictures[picIdx];
  var svg=document.getElementById('svg');
  svg.innerHTML='';
  filled=0;
  total=pic.shapes.filter(function(s){return!s.noColour}).length;
  document.getElementById('title').textContent=pic.name;
  document.getElementById('done').style.display='none';
  svg.setAttribute('viewBox',pic.vb);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:'#D0D0D0',stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    var el=ns(s.tag,attrs);
    if(s.noColour){svg.appendChild(el);return;}
    el.style.cursor='pointer';
    var done=false;
    el.addEventListener('click',function(){
      if(done)return;
      done=true;
      el.setAttribute('fill',s.colour);
      filled++;
      if(filled===total)document.getElementById('done').style.display='flex';
    });
    svg.appendChild(el);
  });
}

function nextPicture(){picIdx=(picIdx+1)%pictures.length;render();}
function prevPicture(){picIdx=(picIdx+pictures.length-1)%pictures.length;render();}

render();
</script>
</body>
</html>
