<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colour with Palette</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
<style>
#layout{flex:1;display:flex;overflow:hidden;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#sidebar{width:160px;display:flex;flex-direction:column;gap:8px;padding:8px;overflow:hidden;}
#ref-wrap{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;}
#ref-label{font-size:0.7em;color:#888;margin-bottom:2px;}
#ref{width:100%;flex:1;min-height:0;}
#palette{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.swatch{aspect-ratio:1;border-radius:10px;cursor:pointer;border:3px solid transparent;box-sizing:border-box;}
.swatch.selected{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333;}
@media(orientation:portrait){
  #layout{flex-direction:column;}
  #sidebar{width:100%;flex-direction:row;height:120px;box-sizing:border-box;}
  #ref-wrap{flex:1;min-width:0;}
  #palette{grid-template-columns:repeat(5,1fr);grid-auto-rows:min(48px,11vw);flex:2;min-width:0;align-content:center;}
  .swatch{aspect-ratio:unset;}
}
</style>
</head>
<body>
<div class="nav-bar" data-prev="prevPicture" data-next="nextPicture"></div>
<div class="game-area">
  <div id="filter-bar" style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;"></div>
  <div class="game-title"><span id="title"></span></div>
  <div id="layout">
    <div id="canvas-wrap">
      <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="sidebar">
      <div id="ref-wrap">
        <div id="ref-label">Reference</div>
        <svg id="ref" style="width:100%;flex:1;min-height:0;" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div id="palette"></div>
    </div>
  </div>
</div>
<script src="colouring/colouring-common.js"></script>
<script>var pictures=[];</script>
<script src="colouring/pictures/sun.js"></script>
<script src="colouring/pictures/cat.js"></script>
<script src="colouring/pictures/fish.js"></script>
<script src="colouring/pictures/house.js"></script>
<script src="colouring/pictures/tree.js"></script>
<script src="colouring/generated/bird-colouring-level-1.js"></script>
<script src="colouring/generated/bull-colouring-level-1.js"></script>
<script src="colouring/generated/camel-colouring-level-1.js"></script>
<script src="colouring/generated/cat-colouring-level-1.js"></script>
<script src="colouring/generated/cow-colouring-level-1.js"></script>
<script src="colouring/generated/dog-colouring-level-1.js"></script>
<script src="colouring/generated/duck-colouring-level-1.js"></script>
<script src="colouring/generated/elephant-colouring-level-1.js"></script>
<script src="colouring/generated/fish-colouring-level-1.js"></script>
<script src="colouring/generated/giraffe-colouring-level-1.js"></script>
<script src="colouring/generated/goose-colouring-level-1.js"></script>
<script src="colouring/generated/horse-colouring-level-1.js"></script>
<script src="colouring/generated/lion-colouring-level-1.js"></script>
<script src="colouring/generated/monkey-colouring-level-1.js"></script>
<script src="colouring/generated/mouse-colouring-level-1.js"></script>
<script src="colouring/generated/rabbit-colouring-level-1.js"></script>
<script src="colouring/generated/tiger-colouring-level-1.js"></script>
<script src="colouring/generated/turtle-colouring-level-1.js"></script>
<script src="colouring/generated/zebra-colouring-level-1.js"></script>
<script>
var filtIdx=0,selectedColour=null,filledEls,filtered=[];

function buildFilterBar(){
  var tags=['all'];
  pictures.forEach(function(p){(p.tags||[]).forEach(function(t){if(tags.indexOf(t)<0)tags.push(t);});});
  var bar=document.getElementById('filter-bar');
  tags.forEach(function(t){
    var b=document.createElement('button');
    b.textContent=t.charAt(0).toUpperCase()+t.slice(1);
    b.setAttribute('data-tag',t);
    b.style.cssText='padding:6px 14px;border-radius:12px;border:2px solid #ddd;background:#fff;font-family:inherit;font-size:0.95em;cursor:pointer;';
    b.onclick=function(){setFilter(t);};
    bar.appendChild(b);
  });
  setFilter('all');
}

function setFilter(tag){
  filtered=tag==='all'?pictures.slice():pictures.filter(function(p){return(p.tags||[]).indexOf(tag)>=0;});
  filtIdx=0;
  document.querySelectorAll('#filter-bar button').forEach(function(b){
    var active=b.getAttribute('data-tag')===tag;
    b.style.background=active?'#2ECC71':'#fff';
    b.style.color=active?'white':'#333';
    b.style.borderColor=active?'#27AE60':'#ddd';
  });
  render();
}

function selectColour(c){
  selectedColour=c;
  document.querySelectorAll('.swatch').forEach(function(s){
    s.classList.toggle('selected',s.dataset.colour===c);
  });
}

function checkComplete(){
  var done=filledEls.every(function(el){return el.getAttribute('fill')===el.dataset.target;});
  if(done)showBanner(nextPicture);
}

function render(){
  var pic=filtered[filtIdx];
  document.getElementById('title').textContent=pic.name;
  hideBanner();
  selectedColour=null;
  filledEls=[];

  var svg=document.getElementById('svg');
  svg.innerHTML='';
  svg.setAttribute('viewBox',pic.vb);
  injectDotPattern(svg);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:'url(#dots)',stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    var el=ns(s.tag,attrs);
    if(s.noColour){svg.appendChild(el);return;}
    el.style.cursor='pointer';
    el.dataset.target=s.colour;
    filledEls.push(el);
    el.addEventListener('click',function(){
      if(!selectedColour)return;
      el.setAttribute('fill',selectedColour);
      checkComplete();
    });
    svg.appendChild(el);
  });

  var ref=document.getElementById('ref');
  ref.innerHTML='';
  ref.setAttribute('viewBox',pic.vb);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:s.colour,stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    ref.appendChild(ns(s.tag,attrs));
  });

  var seen={},cols=[];
  pic.shapes.forEach(function(s){if(s.noColour)return;if(!seen[s.colour]){seen[s.colour]=1;cols.push(s.colour);}});
  var palette=document.getElementById('palette');
  palette.innerHTML='';
  cols.forEach(function(c){
    var d=document.createElement('div');
    d.className='swatch';
    d.dataset.colour=c;
    d.style.background=c;
    d.addEventListener('click',function(){selectColour(c);});
    palette.appendChild(d);
  });
}

function nextPicture(){filtIdx=(filtIdx+1)%filtered.length;render();}
function prevPicture(){filtIdx=(filtIdx+filtered.length-1)%filtered.length;render();}

buildFilterBar();
</script>
</body>
</html>
