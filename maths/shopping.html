<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shopping List</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
<style>
#filter-bar{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;flex-shrink:0;}
#game-body{display:flex;flex:1;overflow:hidden;}
#catalog-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#catalog-title{padding:10px 16px 4px;font-size:1.1em;color:#888;flex-shrink:0;}
#tiles-scroll{flex:1;overflow-y:auto;padding:12px 16px;}
#tiles{display:flex;flex-wrap:wrap;gap:14px;}
.ctile{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:120px;height:120px;border-radius:20px;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,0.12);cursor:pointer;padding:0 0 10px;transition:transform 0.12s,box-shadow 0.12s;border:none;font-family:'Comic Sans MS','Chalkboard SE',cursive;}
.ctile:hover{transform:translateY(-3px);box-shadow:0 7px 16px rgba(0,0,0,0.18);}
.ctile-icon{font-size:2.6em;flex:1;display:flex;align-items:center;justify-content:center;}
.ctile-name{font-size:0.82em;font-weight:bold;color:#333;text-align:center;padding:0 6px;}
#list-panel{width:260px;display:flex;flex-direction:column;border-left:2px solid #eee;background:#fffdf8;}
#list-header{padding:12px 16px 6px;font-size:1.2em;font-weight:bold;color:#333;flex-shrink:0;}
#list-items{flex:1;overflow-y:auto;padding:4px 12px;}
.list-row{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:6px;border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.list-icon{font-size:1.5em;flex-shrink:0;}
.list-name{flex:1;font-size:0.95em;color:#333;}
.list-remove{background:none;border:none;font-size:1.1em;color:#E74C3C;cursor:pointer;padding:2px 4px;}
#list-footer{padding:10px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
#go-buttons{display:flex;gap:8px;}
.btn-go{flex:1;padding:13px 8px;border:none;border-radius:14px;font-family:inherit;font-size:1em;font-weight:bold;cursor:pointer;color:#fff;transition:opacity 0.2s;}
.btn-go:disabled{opacity:0.35;cursor:default;}
#btn-find{background:#3498DB;}
#btn-scan-it{background:#9B59B6;}
#scan-unavailable{font-size:0.75em;color:#bbb;text-align:center;}
#empty-list{color:#bbb;font-style:italic;font-size:0.9em;text-align:center;padding:16px 0;}
#phase2{display:none;flex:1;flex-direction:column;overflow:hidden;}
#phase2-title{padding:12px 16px;font-size:1.4em;font-weight:bold;color:#333;flex-shrink:0;border-bottom:1px solid #eee;}
#find-list{flex:1;overflow-y:auto;padding:12px 16px;}
.find-row{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:8px;border-radius:14px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.find-row.found{background:#f0fff4;}
.find-icon{font-size:1.8em;}
.find-name{flex:1;font-size:1.1em;color:#333;}
.find-row.found .find-name{text-decoration:line-through;color:#888;}
.find-tick{font-size:1.4em;width:28px;text-align:center;}
.btn-got{padding:8px 14px;border:none;border-radius:10px;font-family:inherit;font-size:0.9em;cursor:pointer;background:#3498DB;color:#fff;}
.btn-undo{padding:6px 10px;border:none;border-radius:10px;font-family:inherit;font-size:0.8em;cursor:pointer;background:#E67E22;color:#fff;display:none;}
.find-row.found .btn-undo{display:inline-block;}
.find-row.found .btn-got{display:none;}
#phase-scan{display:none;flex:1;flex-direction:row;overflow:hidden;}
#scan-video-wrap{flex:1;background:#111;position:relative;overflow:hidden;}
#scan-video{width:100%;height:100%;object-fit:cover;}
#scan-aim{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:110px;border:3px solid #27AE60;border-radius:10px;pointer-events:none;}
#scan-checklist{width:220px;display:flex;flex-direction:column;border-left:2px solid #eee;background:#fffdf8;overflow:hidden;}
#scan-checklist-title{padding:12px 14px 6px;font-size:1.1em;font-weight:bold;color:#333;flex-shrink:0;}
#scan-checklist-items{flex:1;overflow-y:auto;padding:6px 10px;}
.sc-row{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:6px;border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.sc-row.found{background:#f0fff4;}
.sc-icon{font-size:1.5em;flex-shrink:0;}
.sc-name{flex:1;font-size:0.9em;color:#333;}
.sc-row.found .sc-name{text-decoration:line-through;color:#888;}
.sc-tick{font-size:1.2em;width:22px;text-align:center;}
#success-banner{display:none;position:fixed;inset:0;background:rgba(39,174,96,0.95);flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:2.8em;font-weight:bold;text-align:center;font-family:'Comic Sans MS','Chalkboard SE',cursive;}
#btn-again{margin-top:24px;padding:14px 32px;border:3px solid #fff;border-radius:16px;background:transparent;color:#fff;font-family:inherit;font-size:0.55em;cursor:pointer;}
@media(orientation:portrait){
  #game-body{flex-direction:column;}
  #list-panel{width:auto;height:200px;border-left:none;border-top:2px solid #eee;flex-direction:row;}
  #list-header{display:none;}
  #list-items{flex:1;display:flex;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:8px;gap:8px;align-items:center;}
  .list-row{flex-direction:column;align-items:center;min-width:72px;max-width:72px;padding:6px 4px;gap:4px;position:relative;}
  .list-name{font-size:0.7em;text-align:center;line-height:1.2;}
  .list-remove{position:absolute;top:-4px;right:-4px;background:#E74C3C;color:#fff;border-radius:50%;width:20px;height:20px;font-size:0.75em;display:flex;align-items:center;justify-content:center;padding:0;}
  #list-footer{flex-direction:row;align-items:center;padding:8px;gap:6px;}
  #go-buttons{flex-direction:column;gap:4px;flex:1;}
  .btn-go{padding:9px 8px;font-size:0.82em;}
  #scan-unavailable{display:none;}
  #phase-scan{flex-direction:column;}
  #scan-video-wrap{flex:1;}
  #scan-checklist{width:auto;height:160px;border-left:none;border-top:2px solid #eee;flex-direction:row;}
  #scan-checklist-title{display:none;}
  #scan-checklist-items{display:flex;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;gap:6px;padding:6px 8px;align-items:center;}
  .sc-row{flex-direction:column;min-width:70px;max-width:70px;padding:6px 4px;gap:2px;align-items:center;}
  .sc-name{font-size:0.68em;text-align:center;line-height:1.2;}
  .sc-tick{width:auto;}
}
</style>
</head>
<body>
<div class="nav-bar"></div>
<div class="game-area">
  <div id="filter-bar"></div>
  <div id="game-body">
    <div id="catalog-area">
      <div id="catalog-title">Choose items for your list:</div>
      <div id="tiles-scroll"><div id="tiles"></div></div>
    </div>
    <div id="list-panel">
      <div id="list-header">🛒 My List</div>
      <div id="list-items"><div id="empty-list">Tap items to add them</div></div>
      <div id="list-footer">
        <div id="go-buttons">
          <button class="btn-go" id="btn-find" disabled>Find it! 🔍</button>
          <button class="btn-go" id="btn-scan-it" disabled>Scan it! 📷</button>
        </div>
        <div id="scan-unavailable"></div>
      </div>
    </div>
    <div id="phase2">
      <div id="phase2-title">Find each item! 🔍</div>
      <div id="find-list"></div>
    </div>
    <div id="phase-scan">
      <div id="scan-video-wrap">
        <video id="scan-video" autoplay playsinline muted></video>
        <div id="scan-aim"></div>
      </div>
      <div id="scan-checklist">
        <div id="scan-checklist-title">Scan each item! 📷</div>
        <div id="scan-checklist-items"></div>
      </div>
    </div>
  </div>
</div>
<div id="success-banner">
  🎉 Well done! 🎉
  <button id="btn-again">Play Again!</button>
</div>
<script src="filter-bar.js"></script>
<script>
var hasDetector=typeof BarcodeDetector!=='undefined';
var CATALOGS=[];
var TILE_COLOURS=['#FFF0E0','#EAF4FF','#F0FFF4','#FFF0FA','#FFF5E0','#F5EEFF','#F0F8FF','#FFFBEA','#FFF0F0','#E8FFF0'];
var allItems=[],listItems=[],scanStream=null,scanInterval=null,scanFound=0,scanTotal=0;

function flattenCatalogs(catalogs){
  var out=[];
  catalogs.forEach(function(c){c.items.forEach(function(it){out.push({name:it.name,barcode:it.barcode,icon:it.icon,tags:c.tags,catalog:c.name});});});
  return out;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderTiles(items){
  var wrap=document.getElementById('tiles');
  wrap.innerHTML='';
  items.filter(function(it){return listItems.indexOf(it)<0;}).forEach(function(it,i){
    var btn=document.createElement('button');
    btn.className='ctile';
    btn.style.background=TILE_COLOURS[i%TILE_COLOURS.length];
    btn.innerHTML='<span class="ctile-icon">'+it.icon+'</span><span class="ctile-name">'+escHtml(it.name)+'</span>';
    btn.onclick=function(){addToList(it);};
    wrap.appendChild(btn);
  });
}

function renderList(){
  var wrap=document.getElementById('list-items');
  wrap.innerHTML='';
  var empty=listItems.length===0;
  if(empty){wrap.innerHTML='<div id="empty-list">Tap items to add them</div>';}
  document.getElementById('btn-find').disabled=empty;
  document.getElementById('btn-scan-it').disabled=empty||!hasDetector;
  listItems.forEach(function(it){
    var row=document.createElement('div');
    row.className='list-row';
    row.innerHTML='<span class="list-icon">'+it.icon+'</span><span class="list-name">'+escHtml(it.name)+'</span><button class="list-remove">✕</button>';
    row.querySelector('.list-remove').onclick=function(){removeFromList(it);};
    wrap.appendChild(row);
  });
}

function addToList(it){listItems.push(it);renderList();renderTiles(allItems);}
function removeFromList(it){listItems.splice(listItems.indexOf(it),1);renderList();renderTiles(allItems);}

function hidePhase1(){
  document.getElementById('catalog-area').style.display='none';
  document.getElementById('list-panel').style.display='none';
  document.getElementById('filter-bar').style.display='none';
}

function showPhase1(){
  document.getElementById('catalog-area').style.display='flex';
  document.getElementById('list-panel').style.display='flex';
  document.getElementById('filter-bar').style.display='flex';
}

document.getElementById('btn-find').onclick=function(){
  hidePhase1();
  var p2=document.getElementById('phase2');
  p2.style.display='flex';
  var fl=document.getElementById('find-list');
  fl.innerHTML='';
  var found=0;
  listItems.forEach(function(it){
    var row=document.createElement('div');
    row.className='find-row';
    row.innerHTML='<span class="find-icon">'+it.icon+'</span><span class="find-name">'+escHtml(it.name)+'</span><span class="find-tick"></span><button class="btn-got">Got it! ✓</button><button class="btn-undo">Undo</button>';
    row.querySelector('.btn-got').onclick=function(){
      row.classList.add('found');
      row.querySelector('.find-tick').textContent='✅';
      found++;
      if(found===listItems.length)setTimeout(showSuccess,400);
    };
    row.querySelector('.btn-undo').onclick=function(){
      row.classList.remove('found');
      row.querySelector('.find-tick').textContent='';
      found--;
    };
    fl.appendChild(row);
  });
};

document.getElementById('btn-scan-it').onclick=function(){
  hidePhase1();
  var ps=document.getElementById('phase-scan');
  ps.style.display='flex';
  var ci=document.getElementById('scan-checklist-items');
  ci.innerHTML='';
  var barcodeMap={};
  scanFound=0;
  scanTotal=listItems.length;
  listItems.forEach(function(it){
    var row=document.createElement('div');
    row.className='sc-row';
    row.innerHTML='<span class="sc-icon">'+it.icon+'</span><span class="sc-name">'+escHtml(it.name)+'</span><span class="sc-tick">·</span>';
    barcodeMap[it.barcode]=row;
    ci.appendChild(row);
  });
  var detector=new BarcodeDetector();
  var v=document.getElementById('scan-video');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(s){
    scanStream=s;
    v.srcObject=s;
    scanInterval=setInterval(function(){
      if(v.readyState<2)return;
      detector.detect(v).then(function(codes){
        codes.forEach(function(c){
          var row=barcodeMap[c.rawValue];
          if(row&&!row.classList.contains('found')){
            row.classList.add('found');
            row.querySelector('.sc-tick').textContent='✅';
            beep();
            scanFound++;
            if(scanFound===scanTotal){stopScan();setTimeout(showSuccess,400);}
          }
        });
      }).catch(function(){});
    },500);
  }).catch(function(e){
    document.getElementById('scan-checklist-title').textContent='Camera error: '+e.message;
  });
};

function stopScan(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(function(t){t.stop();});scanStream=null;}
  document.getElementById('scan-video').srcObject=null;
}

function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start();o.stop(ctx.currentTime+0.25);
  }catch(e){}
}

function showSuccess(){document.getElementById('success-banner').style.display='flex';}

document.getElementById('btn-again').onclick=function(){
  stopScan();
  document.getElementById('success-banner').style.display='none';
  document.getElementById('phase2').style.display='none';
  document.getElementById('phase-scan').style.display='none';
  listItems=[];
  showPhase1();
  renderList();
  renderTiles(allItems);
};

if(!hasDetector){
  document.getElementById('btn-scan-it').disabled=true;
  document.getElementById('scan-unavailable').textContent='Scanning not available on this device';
}

function initGame(){
  allItems=flattenCatalogs(CATALOGS);
  buildFilterBar(CATALOGS.map(function(c){return{tags:c.tags||[],name:c.name};}),function(filtered){
    var items=[];
    filtered.forEach(function(c){
      CATALOGS.forEach(function(cat){
        if(cat.name===c.name)items=items.concat(cat.items.map(function(it){return{name:it.name,barcode:it.barcode,icon:it.icon,tags:cat.tags||[],catalog:cat.name};}));
      });
    });
    allItems=items;
    listItems=listItems.filter(function(li){return items.some(function(i){return i.barcode===li.barcode;});});
    renderTiles(allItems);
    renderList();
  });
}

fetch('shopping/catalogs/groceries.json')
  .then(function(r){return r.json();})
  .then(function(data){CATALOGS=[data];initGame();})
  .catch(function(){initGame();});
</script>
</body>
</html>
