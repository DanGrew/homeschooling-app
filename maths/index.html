<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;font-family:'Comic Sans MS','Chalkboard SE',cursive;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px;}
h1{font-size:3em;color:#333;margin-bottom:32px;}
section{width:100%;max-width:760px;margin-bottom:40px;}
hr{border:none;border-top:3px solid #ddd;margin-bottom:24px;}
h2{text-align:center;font-size:1.8em;color:#555;margin-bottom:20px;}
.tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:150px;height:150px;border-radius:20px;text-decoration:none;color:#333;font-size:1em;font-family:inherit;font-weight:bold;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.12);transition:transform 0.15s,box-shadow 0.15s;background:#fff;padding:0 0 12px;}
.tile:hover{transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,0.18);}
.tile svg{flex:1;width:100%;padding:16px 16px 8px;}
.tile span{font-size:0.95em;text-align:center;padding:0 8px;}
.empty{color:#aaa;font-style:italic;font-size:1.1em;text-align:center;padding:16px 0;}
</style>
</head>
<body>
<h1>Games!</h1>

<section>
  <h2>Level 1</h2>
  <hr>
  <div class="tiles">

    <a class="tile" href="match-colour.html" style="background:#EAF4FF;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="30" r="14" fill="#E74C3C"/>
        <circle cx="40" cy="30" r="14" fill="#3498DB"/>
        <circle cx="60" cy="30" r="14" fill="#F1C40F"/>
      </svg>
      <span>Colour Match</span>
    </a>

    <a class="tile" href="match-shape.html" style="background:#F5EEFF;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="14" width="28" height="28" rx="4" fill="#9B59B6"/>
        <polygon points="66,10 78,42 54,42" fill="#27AE60"/>
        <circle cx="40" cy="34" r="14" fill="#E67E22"/>
      </svg>
      <span>Shape Match</span>
    </a>

    <a class="tile" href="connect-the-dots.html" style="background:#FFF0F0;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="14" y1="46" x2="40" y2="14" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="4 3"/>
        <line x1="40" y1="14" x2="66" y2="46" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="4 3"/>
        <circle cx="14" cy="46" r="7" fill="#E74C3C"/>
        <circle cx="40" cy="14" r="7" fill="#E74C3C"/>
        <circle cx="66" cy="46" r="7" fill="#E74C3C"/>
      </svg>
      <span>Connect the Dots</span>
    </a>

    <a class="tile" href="colouring.html" style="background:#F0FFF4;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="8" width="60" height="40" rx="6" fill="#eee" stroke="#ccc" stroke-width="2"/>
        <rect x="18" y="16" width="14" height="14" rx="2" fill="#E74C3C"/>
        <rect x="36" y="16" width="14" height="14" rx="2" fill="#3498DB"/>
        <rect x="18" y="34" width="14" height="8" rx="2" fill="#F1C40F"/>
        <rect x="36" y="34" width="14" height="8" rx="2" fill="#27AE60"/>
        <rect x="54" y="16" width="10" height="26" rx="2" fill="#9B59B6"/>
      </svg>
      <span>Colour Me</span>
    </a>

    <a class="tile" href="say-words.html" style="background:#FFFBEA;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 8 Q12 4 16 4 H64 Q68 4 68 8 V36 Q68 40 64 40 H44 L32 52 V40 H16 Q12 40 12 36 Z" fill="#F39C12"/>
        <circle cx="28" cy="22" r="4" fill="#fff"/>
        <circle cx="40" cy="22" r="4" fill="#fff"/>
        <circle cx="52" cy="22" r="4" fill="#fff"/>
      </svg>
      <span>Say It!</span>
    </a>

  </div>
</section>

<section>
  <h2>Level 2</h2>
  <hr>
  <div class="tiles">

    <a class="tile" href="match-colour-shape.html" style="background:#FFF0FA;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="30" r="14" fill="#E74C3C"/>
        <polygon points="60,16 76,46 44,46" fill="#3498DB"/>
      </svg>
      <span>Colour &amp; Shape Match</span>
    </a>

    <a class="tile" href="colouring-palette.html" style="background:#FFF0E8;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="8" width="42" height="44" rx="5" fill="#eee" stroke="#ccc" stroke-width="2"/>
        <rect x="14" y="16" width="12" height="12" rx="2" fill="#D0D0D0" stroke="#aaa" stroke-width="1.5"/>
        <rect x="30" y="16" width="12" height="12" rx="2" fill="#D0D0D0" stroke="#aaa" stroke-width="1.5"/>
        <rect x="14" y="32" width="12" height="12" rx="2" fill="#D0D0D0" stroke="#aaa" stroke-width="1.5"/>
        <rect x="30" y="32" width="12" height="12" rx="2" fill="#D0D0D0" stroke="#aaa" stroke-width="1.5"/>
        <rect x="54" y="8" width="20" height="44" rx="5" fill="#fff" stroke="#ccc" stroke-width="2"/>
        <rect x="57" y="12" width="7" height="7" rx="2" fill="#E74C3C"/>
        <rect x="66" y="12" width="7" height="7" rx="2" fill="#3498DB"/>
        <rect x="57" y="22" width="7" height="7" rx="2" fill="#2ECC71"/>
        <rect x="66" y="22" width="7" height="7" rx="2" fill="#F1C40F"/>
        <rect x="57" y="32" width="7" height="7" rx="2" fill="#E67E22"/>
        <rect x="66" y="32" width="7" height="7" rx="2" fill="#9B59B6"/>
        <rect x="57" y="42" width="7" height="7" rx="2" fill="#1ABC9C"/>
        <rect x="66" y="42" width="7" height="7" rx="2" fill="#E91E63"/>
      </svg>
      <span>Colour with Palette</span>
    </a>

    <a class="tile" href="move-blocks.html" style="background:#EAF4FF;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="18" y="6" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="30" y="6" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="42" y="6" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="54" y="6" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="6" y="18" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="18" y="18" width="10" height="10" rx="2" fill="#3498DB"/>
        <rect x="30" y="18" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="42" y="18" width="10" height="10" rx="2" fill="#E67E22"/>
        <rect x="54" y="18" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="6" y="30" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="18" y="30" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="30" y="30" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="42" y="30" width="10" height="10" rx="2" fill="#e0e8f0"/>
        <rect x="54" y="30" width="10" height="10" rx="2" fill="#2ECC71"/>
        <text x="6" y="54" font-size="9" font-family="Comic Sans MS,cursive" fill="#666">&#8592; &#8593; &#8594; &#8595;</text>
      </svg>
      <span>Move the Block</span>
    </a>

    <a class="tile" href="count-shapes.html" style="background:#FFF5E0;">
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="38" r="10" fill="#F39C12"/>
        <rect x="30" y="28" width="20" height="20" rx="3" fill="#3498DB"/>
        <polygon points="70,48 58,28 82,28" fill="#27AE60"/>
        <text x="10" y="20" font-size="18" font-family="Comic Sans MS,cursive" fill="#333" font-weight="bold">1  2  3</text>
      </svg>
      <span>Count Shapes</span>
    </a>

  </div>
</section>

<section>
  <h2>Level 3</h2>
  <hr>
  <p class="empty">More games coming soon!</p>
</section>

</body>
</html>
