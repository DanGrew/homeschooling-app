<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Catalog Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;font-family:'Comic Sans MS','Chalkboard SE',cursive;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#top-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#fff;border-bottom:2px solid #eee;flex-shrink:0;flex-wrap:wrap;}
#top-bar h1{font-size:1.4em;color:#333;white-space:nowrap;}
#catalog-name{flex:1;min-width:140px;padding:8px 12px;border:2px solid #ddd;border-radius:10px;font-family:inherit;font-size:1em;}
.top-btn{padding:8px 16px;border:none;border-radius:10px;font-family:inherit;font-size:0.95em;cursor:pointer;white-space:nowrap;}
#btn-load{background:#3498DB;color:#fff;}
#btn-save{background:#27AE60;color:#fff;}
#main{display:flex;flex:1;overflow:hidden;}
#scanner-panel{display:flex;flex-direction:column;flex:1;border-right:2px solid #eee;overflow:hidden;}
#video-wrap{flex:1;background:#222;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
video{width:100%;height:100%;object-fit:cover;}
#scan-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:120px;border:3px solid #27AE60;border-radius:8px;pointer-events:none;}
#no-camera-msg{color:#aaa;font-size:1em;text-align:center;padding:20px;}
#scanner-controls{padding:12px 16px;display:flex;flex-direction:column;gap:10px;background:#fff;border-top:1px solid #eee;}
#btn-scan{padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:1em;cursor:pointer;background:#E67E22;color:#fff;}
#btn-scan.scanning{background:#E74C3C;}
#manual-barcode-wrap{display:none;flex-direction:column;gap:6px;}
#manual-barcode-wrap label{font-size:0.9em;color:#666;}
#manual-barcode{padding:8px 12px;border:2px solid #ddd;border-radius:10px;font-family:inherit;font-size:1em;}
#add-panel{width:320px;display:flex;flex-direction:column;overflow:hidden;}
#add-form{padding:14px 16px;display:flex;flex-direction:column;gap:10px;background:#fff;border-bottom:2px solid #eee;flex-shrink:0;}
#add-form label{font-size:0.9em;color:#666;}
#item-name{padding:8px 12px;border:2px solid #ddd;border-radius:10px;font-family:inherit;font-size:1em;}
#icon-display{font-size:2.4em;text-align:center;padding:4px;}
#icon-picker{display:flex;flex-wrap:wrap;gap:4px;}
.icon-btn{font-size:1.4em;padding:4px 6px;border:2px solid transparent;border-radius:8px;cursor:pointer;background:none;line-height:1;}
.icon-btn.selected{border-color:#27AE60;background:#f0fff4;}
#btn-add{padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:1em;cursor:pointer;background:#9B59B6;color:#fff;}
#item-list{flex:1;overflow-y:auto;padding:10px 16px;}
#item-list h2{font-size:1em;color:#888;margin-bottom:8px;}
.item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;margin-bottom:6px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.item-icon{font-size:1.6em;flex-shrink:0;}
.item-name{flex:1;font-size:0.95em;color:#333;}
.item-barcode{font-size:0.75em;color:#aaa;font-family:monospace;}
.item-remove{background:none;border:none;font-size:1.2em;color:#E74C3C;cursor:pointer;padding:0 4px;}
#file-input{display:none;}
#status{font-size:0.85em;color:#27AE60;padding:4px 0;}
@media(orientation:portrait){
  #main{flex-direction:column;}
  #scanner-panel{flex:none;height:220px;flex-direction:row;border-right:none;border-bottom:2px solid #eee;}
  #video-wrap{flex:1;}
  #scanner-controls{width:180px;border-top:none;border-left:1px solid #eee;flex-shrink:0;}
  #add-panel{width:auto;flex:1;}
  #add-form{flex-direction:row;flex-wrap:wrap;gap:8px;padding:10px 12px;}
  #add-form label{display:none;}
  #icon-display{font-size:1.8em;padding:0 4px;align-self:center;}
  #item-name{flex:1;min-width:100px;}
  #btn-add{align-self:stretch;}
  #icon-picker{order:10;width:100%;}
}
</style>
</head>
<body>
<div id="top-bar">
  <h1>Catalog Builder</h1>
  <input id="catalog-name" type="text" placeholder="Catalog name" value="My Catalog">
  <button class="top-btn" id="btn-load">Load</button>
  <button class="top-btn" id="btn-save">Save</button>
  <input id="file-input" type="file" accept=".json">
</div>
<div id="main">
  <div id="scanner-panel">
    <div id="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="scan-overlay"></div>
      <div id="no-camera-msg" style="display:none;">Camera scanning not available on this device</div>
    </div>
    <div id="scanner-controls">
      <div id="status"></div>
      <button id="btn-scan">Start Scanning</button>
      <div id="manual-barcode-wrap">
        <label>Barcode (manual entry)</label>
        <input id="manual-barcode" type="text" placeholder="Enter barcode number">
      </div>
    </div>
  </div>
  <div id="add-panel">
    <div id="add-form">
      <label>Item Name</label>
      <input id="item-name" type="text" placeholder="e.g. Milk">
      <label>Icon</label>
      <div id="icon-display">🛒</div>
      <div id="icon-picker"></div>
      <button id="btn-add">Add Item</button>
    </div>
    <div id="item-list">
      <h2>Items (<span id="item-count">0</span>)</h2>
      <div id="items-container"></div>
    </div>
  </div>
</div>
<script>
var EMOJIS=['🥛','🍞','🥚','🧀','🧈','🥩','🍗','🐟','🥦','🥕','🍎','🍌','🍊','🧃','🧴','🫧','🪥','🧹','🧻','🛒','🍫','🍬','🥫','🫙','🧆','🍕','🍜','🥣'];
var selectedIcon='🛒';
var items=[];
var scanning=false;
var stream=null;
var scanInterval=null;
var detector=null;
var hasDetector=typeof BarcodeDetector!=='undefined';

function buildIconPicker(){
  var wrap=document.getElementById('icon-picker');
  EMOJIS.forEach(function(e){
    var b=document.createElement('button');
    b.className='icon-btn'+(e===selectedIcon?' selected':'');
    b.textContent=e;
    b.onclick=function(){
      selectedIcon=e;
      document.getElementById('icon-display').textContent=e;
      document.querySelectorAll('.icon-btn').forEach(function(x){x.classList.remove('selected');});
      b.classList.add('selected');
    };
    wrap.appendChild(b);
  });
}

function renderItems(){
  var c=document.getElementById('items-container');
  c.innerHTML='';
  document.getElementById('item-count').textContent=items.length;
  items.forEach(function(it,i){
    var row=document.createElement('div');
    row.className='item-row';
    row.innerHTML='<span class="item-icon">'+it.icon+'</span><span class="item-name">'+escHtml(it.name)+'</span><span class="item-barcode">'+escHtml(it.barcode)+'</span><button class="item-remove" data-i="'+i+'">✕</button>';
    c.appendChild(row);
  });
  c.querySelectorAll('.item-remove').forEach(function(b){
    b.onclick=function(){items.splice(+b.getAttribute('data-i'),1);renderItems();};
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setStatus(msg,ok){
  var s=document.getElementById('status');
  s.textContent=msg;
  s.style.color=ok?'#27AE60':'#E74C3C';
}

function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator();
    var g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start();o.stop(ctx.currentTime+0.3);
  }catch(e){}
}

function stopScan(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  document.getElementById('video').srcObject=null;
  scanning=false;
  var btn=document.getElementById('btn-scan');
  btn.textContent='Start Scanning';btn.classList.remove('scanning');
}

function startScan(){
  if(!hasDetector){setStatus('BarcodeDetector not supported',false);return;}
  if(!detector)detector=new BarcodeDetector();
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(s){
    stream=s;scanning=true;
    var v=document.getElementById('video');
    v.srcObject=s;
    var btn=document.getElementById('btn-scan');
    btn.textContent='Stop Scanning';btn.classList.add('scanning');
    setStatus('Scanning…',true);
    scanInterval=setInterval(function(){
      if(v.readyState<2)return;
      detector.detect(v).then(function(codes){
        if(codes.length>0){
          var code=codes[0].rawValue;
          document.getElementById('manual-barcode').value=code;
          stopScan();
          beep();
          setStatus('Barcode scanned: '+code,true);
          document.getElementById('item-name').focus();
        }
      }).catch(function(){});
    },500);
  }).catch(function(e){
    setStatus('Camera error: '+e.message,false);
    scanning=false;
  });
}

document.getElementById('btn-scan').onclick=function(){
  if(scanning){stopScan();}else{startScan();}
};

document.getElementById('btn-add').onclick=function(){
  var name=document.getElementById('item-name').value.trim();
  var barcode=document.getElementById('manual-barcode').value.trim();
  if(!name){setStatus('Enter item name',false);document.getElementById('item-name').focus();return;}
  if(!barcode){setStatus('Enter or scan barcode',false);document.getElementById('manual-barcode').focus();return;}
  items.push({name:name,barcode:barcode,icon:selectedIcon});
  renderItems();
  document.getElementById('item-name').value='';
  document.getElementById('manual-barcode').value='';
  setStatus('Added: '+name,true);
  document.getElementById('item-name').focus();
};

document.getElementById('btn-load').onclick=function(){
  document.getElementById('file-input').click();
};

document.getElementById('file-input').onchange=function(e){
  var f=e.target.files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      document.getElementById('catalog-name').value=data.name||'My Catalog';
      items=(data.items||[]).map(function(it){return{name:it.name||'',barcode:it.barcode||'',icon:it.icon||'🛒'};});
      renderItems();
      setStatus('Loaded '+items.length+' items',true);
    }catch(err){setStatus('Invalid JSON file',false);}
  };
  r.readAsText(f);
  e.target.value='';
};

document.getElementById('btn-save').onclick=async function(){
  var name=document.getElementById('catalog-name').value.trim()||'catalog';
  var data=JSON.stringify({name:name,items:items},null,2);
  var blob=new Blob([data],{type:'application/json'});
  if(window.showSaveFilePicker){
    try{
      var fh=await window.showSaveFilePicker({suggestedName:name.replace(/\s+/g,'-').toLowerCase()+'.json',types:[{description:'JSON Catalog',accept:{'application/json':['.json']}}]});
      var w=await fh.createWritable();
      await w.write(blob);
      await w.close();
      setStatus('Saved!',true);
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=name.replace(/\s+/g,'-').toLowerCase()+'.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Downloaded!',true);
};

if(!hasDetector){
  document.getElementById('btn-scan').style.display='none';
  document.getElementById('no-camera-msg').style.display='block';
  document.getElementById('video').style.display='none';
  document.getElementById('scan-overlay').style.display='none';
  document.getElementById('manual-barcode-wrap').style.display='flex';
}else{
  document.getElementById('manual-barcode-wrap').style.display='flex';
}

buildIconPicker();
renderItems();
</script>
</body>
</html>
