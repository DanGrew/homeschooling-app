<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Colouring Sheets</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/theme.css">
<link rel="stylesheet" href="/homeschooling-app/app/shared/panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#panel{width:220px;min-width:220px;}
#panel-header a{color:#27AE60;}
#panel-header h2{font-size:1.2em;}
#panel-header p{font-size:0.8em;color:#888;margin-top:6px;line-height:1.4;}
#panel-list{overflow-y:auto;flex:1;padding:8px 0;}
#btn-print{background:#2ECC71;color:white;border:none;border-radius:12px;padding:14px;font-size:1.1em;font-family:inherit;font-weight:bold;cursor:pointer;margin:12px 16px 16px;flex-shrink:0;}
#btn-print:hover{background:#27AE60;}
.panel-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background 0.1s;}
.panel-item:hover{background:#e8e8e8;}
.panel-item input{width:18px;height:18px;cursor:pointer;accent-color:#27AE60;flex-shrink:0;}
.panel-item label{cursor:pointer;font-size:0.95em;color:#333;}
#main{flex:1;overflow-y:auto;background:#fff8f0;}
#sheet{display:flex;flex-direction:column;}
.worksheet-item{width:100%;height:50vh;display:flex;align-items:center;justify-content:center;border-bottom:2px dashed #ccc;padding:16px;}
.worksheet-item svg{width:100%;height:100%;}
#empty-msg{padding:40px;text-align:center;color:#aaa;font-style:italic;font-size:1.1em;}
@media print{
  #panel{display:none;}
  #btn-print{display:none;}
  body{display:block;overflow:visible;height:auto;}
  #main{overflow:visible;}
  #sheet{display:block;}
  .worksheet-item{height:50vh;page-break-inside:avoid;border:none;padding:4px;}
  #empty-msg{display:none;}
}
</style>
</head>
<body>
<div id="panel">
  <div id="panel-header">
    <a href="/homeschooling-app/app/worksheets/">&#127968; Worksheets</a>
    <h2>Choose images</h2>
    <p>Tick the animals you want. Then use your device's print button to print the sheet.</p>
  </div>
  <div id="panel-list"></div>
  <button id="btn-print" onclick="window.print()">&#128438; Print</button>
</div>
<div id="main">
  <div id="sheet">
    <p id="empty-msg">Select images from the list to build your worksheet.</p>
  </div>
</div>
<script src="/homeschooling-app/app/dictionary/dictionary.js"></script>
<script src="/homeschooling-app/app/dictionary/dictionary-helpers.js"></script>
<script>var pictures=[];</script>
<script>
function ns(tag,attrs){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});
  return el;
}

function renderSVG(pic,uid){
  var patId='dots-'+uid;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',pic.vb);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.style.cssText='width:100%;height:100%;';
  var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  var pat=document.createElementNS('http://www.w3.org/2000/svg','pattern');
  pat.setAttribute('id',patId);pat.setAttribute('width','6');pat.setAttribute('height','6');
  pat.setAttribute('patternUnits','userSpaceOnUse');
  var bg=ns('rect',{width:'6',height:'6',fill:'#fff'});
  var dot=ns('circle',{cx:'3',cy:'3',r:'1',fill:'#ccc'});
  pat.appendChild(bg);pat.appendChild(dot);
  defs.appendChild(pat);
  svg.appendChild(defs);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    attrs.fill=s.noColour?(attrs.fill||'#fff'):'url(#'+patId+')';
    svg.appendChild(ns(s.tag,attrs));
  });
  return svg;
}

function buildPanel(){
  var list=document.getElementById('panel-list');
  pictures.forEach(function(pic,i){
    var item=document.createElement('div');
    item.className='panel-item';
    var cb=document.createElement('input');
    cb.type='checkbox';cb.id='cb-'+i;
    var lbl=document.createElement('label');
    lbl.htmlFor='cb-'+i;lbl.textContent=pic.name;
    cb.addEventListener('change',function(){cb.checked?addImage(i):removeImage(i);});
    item.appendChild(cb);item.appendChild(lbl);
    list.appendChild(item);
  });
}

function addImage(idx){
  var sheet=document.getElementById('sheet');
  document.getElementById('empty-msg').style.display='none';
  var item=document.createElement('div');
  item.className='worksheet-item';item.dataset.idx=idx;
  item.appendChild(renderSVG(pictures[idx],idx));
  var items=sheet.querySelectorAll('.worksheet-item');
  var inserted=false;
  for(var i=0;i<items.length;i++){
    if(parseInt(items[i].dataset.idx)>idx){sheet.insertBefore(item,items[i]);inserted=true;break;}
  }
  if(!inserted)sheet.appendChild(item);
}

function removeImage(idx){
  var sheet=document.getElementById('sheet');
  var item=sheet.querySelector('.worksheet-item[data-idx="'+idx+'"]');
  if(item)sheet.removeChild(item);
  if(!sheet.querySelector('.worksheet-item'))document.getElementById('empty-msg').style.display='';
}

Dictionary.init('/homeschooling-app/app/dictionary/');
loadColouringPictures(pictures,function(){
  pictures.sort(function(a,b){return a.name.localeCompare(b.name);});
  buildPanel();
});
</script>
</body>
</html>
