<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Worksheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Comic Sans MS','Chalkboard SE',cursive;display:flex;height:100vh;overflow:hidden;}
#panel{width:240px;min-width:240px;background:#f5f5f5;border-right:2px solid #ddd;display:flex;flex-direction:column;overflow:hidden;}
#panel-header{padding:16px;border-bottom:1px solid #ddd;}
#panel-header a{color:#3498DB;text-decoration:none;font-size:0.9em;}
#panel-header a:hover{text-decoration:underline;}
#panel-header h2{font-size:1.2em;color:#333;margin-top:8px;}
#panel-header p{font-size:0.8em;color:#888;margin-top:6px;line-height:1.4;}
#panel-controls{padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1;}
.ctrl-label{font-size:0.85em;color:#555;margin-bottom:4px;display:block;}
input[type=text]{width:100%;padding:8px 10px;border:2px solid #ddd;border-radius:8px;font-size:1em;font-family:inherit;}
input[type=text]:focus{outline:none;border-color:#3498DB;}
.num-row{display:flex;align-items:center;gap:8px;}
.num-btn{background:#eee;border:2px solid #ddd;border-radius:8px;width:32px;height:32px;font-size:1.1em;cursor:pointer;font-family:inherit;line-height:1;}
.num-btn:hover{background:#ddd;}
.num-val{flex:1;text-align:center;font-size:1.1em;font-weight:bold;color:#333;}
.size-row{display:flex;gap:8px;}
.size-btn{flex:1;padding:8px;border:2px solid #ddd;border-radius:8px;font-size:0.9em;font-family:inherit;background:#eee;cursor:pointer;}
.size-btn.active{background:#3498DB;border-color:#3498DB;color:white;}
#btn-print{background:#2ECC71;color:white;border:none;border-radius:12px;padding:14px;font-size:1.1em;font-family:inherit;font-weight:bold;cursor:pointer;margin-top:auto;}
#btn-print:hover{background:#27AE60;}
#main{flex:1;overflow-y:auto;background:#fff;}
#sheet{padding:12px;display:grid;gap:8px;}
#empty-msg{padding:40px;text-align:center;color:#aaa;font-style:italic;font-size:1.1em;grid-column:1/-1;}
.cell{border:2px solid #ccc;border-radius:6px;display:flex;align-items:center;justify-content:center;background:#fff;}
.cell svg{width:100%;height:100%;}
@media print{
  #panel{display:none;}
  body{display:block;overflow:visible;height:auto;}
  #main{overflow:visible;}
  #sheet{padding:4px;}
  .cell{border:1.5px solid #bbb;border-radius:4px;break-inside:avoid;}
}
</style>
</head>
<body>
<div id="panel">
  <div id="panel-header">
    <a href="index.html">&#127968; Worksheets</a>
    <h2>Letter Worksheet</h2>
    <p>Type your characters, set the grid, then print.</p>
  </div>
  <div id="panel-controls">
    <div>
      <span class="ctrl-label">Characters</span>
      <input type="text" id="input-chars" placeholder="e.g. aaabbb or ABC" maxlength="40"/>
    </div>
    <div>
      <span class="ctrl-label">Columns</span>
      <div class="num-row">
        <button class="num-btn" id="cols-dec">−</button>
        <span class="num-val" id="cols-val">4</span>
        <button class="num-btn" id="cols-inc">+</button>
      </div>
    </div>
    <div>
      <span class="ctrl-label">Rows</span>
      <div class="num-row">
        <button class="num-btn" id="rows-dec">−</button>
        <span class="num-val" id="rows-val">3</span>
        <button class="num-btn" id="rows-inc">+</button>
      </div>
    </div>
    <div>
      <span class="ctrl-label">Cell size</span>
      <div class="size-row">
        <button class="size-btn" data-size="80">S</button>
        <button class="size-btn active" data-size="120">M</button>
        <button class="size-btn" data-size="180">L</button>
      </div>
    </div>
    <button id="btn-print">&#128438; Print</button>
  </div>
</div>
<div id="main">
  <div id="sheet">
    <p id="empty-msg">Type some characters to build your worksheet.</p>
  </div>
</div>
<script>
let cols = 4, rows = 3, cellSize = 120;
const svgCache = {};

function charToFile(c) {
  if (c >= 'a' && c <= 'z') return 'lower-' + c + '.svg';
  if (c >= 'A' && c <= 'Z') return 'upper-' + c.toLowerCase() + '.svg';
  if (c >= '0' && c <= '9') return c + '.svg';
  return null;
}

async function loadPath(c) {
  const file = charToFile(c);
  if (!file) return null;
  if (svgCache[file] !== undefined) return svgCache[file];
  try {
    const r = await fetch('../assets/characters/' + file);
    const text = await r.text();
    const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
    const path = doc.getElementById('trace-path');
    svgCache[file] = path ? path.getAttribute('d') : null;
  } catch(e) { svgCache[file] = null; }
  return svgCache[file];
}

function makeCell(d) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.style.height = cellSize + 'px';
  if (d) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 200 250');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#ccc');
    path.setAttribute('stroke-width', '18');
    path.setAttribute('stroke-linecap', 'butt');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
    cell.appendChild(svg);
  }
  return cell;
}

async function render() {
  const sheet = document.getElementById('sheet');
  const emptyMsg = document.getElementById('empty-msg');
  const chars = document.getElementById('input-chars').value.replace(/[^a-zA-Z0-9]/g, '');
  const total = cols * rows;

  sheet.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  sheet.querySelectorAll('.cell').forEach(el => el.remove());

  if (!chars) { emptyMsg.style.display = ''; return; }
  emptyMsg.style.display = 'none';

  const pattern = chars.split('');
  const tasks = [];
  for (let i = 0; i < total; i++) {
    const c = pattern[i % pattern.length];
    tasks.push(loadPath(c));
  }
  const paths = await Promise.all(tasks);
  paths.forEach(d => sheet.appendChild(makeCell(d)));
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

document.getElementById('cols-dec').addEventListener('click', () => { cols = clamp(cols - 1, 1, 8); document.getElementById('cols-val').textContent = cols; render(); });
document.getElementById('cols-inc').addEventListener('click', () => { cols = clamp(cols + 1, 1, 8); document.getElementById('cols-val').textContent = cols; render(); });
document.getElementById('rows-dec').addEventListener('click', () => { rows = clamp(rows - 1, 1, 8); document.getElementById('rows-val').textContent = rows; render(); });
document.getElementById('rows-inc').addEventListener('click', () => { rows = clamp(rows + 1, 1, 8); document.getElementById('rows-val').textContent = rows; render(); });

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cellSize = parseInt(btn.dataset.size);
    render();
  });
});

let debounce;
document.getElementById('input-chars').addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(render, 300);
});

document.getElementById('btn-print').addEventListener('click', () => window.print());
</script>
</body>
</html>
