<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace — a</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-next="restart"></div>
<div class="game-area">
  <div class="game-title">Trace the a</div>
  <div style="text-align:center;font-size:1.1em;color:#888;padding:0 16px 8px;">Trace the bowl, then the stem!</div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <svg id="svg" viewBox="0 0 200 240" style="width:100%;height:100%;touch-action:none;" preserveAspectRatio="xMidYMid meet">
      <path id="base" d="M 150,100 C 145,55 45,55 45,140 C 45,215 145,215 150,175 L 150,100 L 150,215"
        fill="none" stroke="#ddd" stroke-width="18" stroke-linecap="butt" stroke-linejoin="round"
        stroke-dasharray="20 10"/>
      <circle id="ball" r="16" fill="#E74C3C" stroke="white" stroke-width="3"/>
    </svg>
    <div id="done" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,240,0.9);">
      <div style="font-size:2.5em;margin-bottom:12px;">&#11088; Well done! &#11088;</div>
      <button onclick="restart()" style="background:#2ECC71;color:white;border:none;font-size:1.8em;padding:20px 44px;border-radius:18px;font-family:inherit;cursor:pointer;">Again &#8635;</button>
    </div>
  </div>
</div>
<script src="trace-engine.js"></script>
<script>
var engine;

function restart() {
  document.getElementById('done').style.display = 'none';
  if (engine) {
    engine.restart();
  } else {
    engine = new TraceEngine(
      document.getElementById('svg'),
      document.getElementById('base'),
      document.getElementById('ball'),
      null,
      {
        progressStroke: '#FFD700',
        progressWidth: 20,
        progressStyle: 'filter:drop-shadow(0 0 10px #FFD700) drop-shadow(0 0 5px #FFA500)',
        onComplete: function() { document.getElementById('done').style.display = 'flex'; }
      }
    );
  }
}

window.addEventListener('load', restart);
</script>
</body>
</html>
