<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Move the Block</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
<style>
#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:#ccc;border:3px solid #ccc;border-radius:8px;overflow:hidden;width:min(62vmin,310px);height:min(62vmin,310px);}
.cell{background:#fff8f0;border-radius:2px;}
.cell.player{background:#3498DB;border-radius:4px;}
.cell.target{background:#2ECC71;border-radius:4px;}
.cell.obstacle{background:#E67E22;border-radius:4px;}
#arrows{display:grid;grid-template-areas:". up ." "left . right" ". down .";grid-template-columns:1fr 1fr 1fr;gap:10px;width:min(48vmin,240px);}
.arr{background:#e0e0e0;border:none;border-radius:14px;font-size:clamp(1.6em,6vmin,2.4em);padding:10px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-touch-callout:none;font-family:inherit;line-height:1;}
.arr:active{background:#bbb;transform:scale(0.93);}
</style>
</head>
<body>
<div class="nav-bar"></div>
<div class="game-area">
  <div class="game-title">Move the blue block to the green square!</div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,4vmin,32px);position:relative;">
    <div id="grid"></div>
    <div id="arrows">
      <button class="arr" style="grid-area:up" onclick="move(0,-1)">&#8593;</button>
      <button class="arr" style="grid-area:left" onclick="move(-1,0)">&#8592;</button>
      <button class="arr" style="grid-area:right" onclick="move(1,0)">&#8594;</button>
      <button class="arr" style="grid-area:down" onclick="move(0,1)">&#8595;</button>
    </div>
    <div id="done" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,240,0.92);">
      <div style="font-size:2.5em;margin-bottom:20px;">&#11088; Well done! &#11088;</div>
      <button onclick="newGame()" style="background:#2ECC71;color:white;border:none;font-size:1.8em;padding:20px 44px;border-radius:18px;font-family:inherit;cursor:pointer;touch-action:manipulation;">Next &#8594;</button>
    </div>
  </div>
</div>
<script>
var N=5,px,py,tx,ty,bx,by,locked;

function rand(){return Math.floor(Math.random()*N);}

function bfs(sc,sr,ec,er,bc,br){
  var vis={},q=[[sc,sr,0]];
  vis[sc+','+sr]=1;
  while(q.length){
    var s=q.shift(),c=s[0],r=s[1],d=s[2];
    if(c===ec&&r===er)return d;
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(dir){
      var nc=c+dir[0],nr=r+dir[1],k=nc+','+nr;
      if(nc>=0&&nc<N&&nr>=0&&nr<N&&!(nc===bc&&nr===br)&&!vis[k]){vis[k]=1;q.push([nc,nr,d+1]);}
    });
  }
  return -1;
}

function newGame(){
  locked=false;
  document.getElementById('done').style.display='none';
  var tries=0;
  while(tries++<300){
    px=rand();py=rand();
    tx=rand();ty=rand();
    if(tx===px&&ty===py)continue;
    var mDist=Math.abs(tx-px)+Math.abs(ty-py);
    if(mDist<4)continue;
    var cands=[];
    for(var row=0;row<N;row++){
      for(var col=0;col<N;col++){
        if((col===px&&row===py)||(col===tx&&row===ty))continue;
        var dp=Math.abs(col-px)+Math.abs(row-py);
        var dt=Math.abs(col-tx)+Math.abs(row-ty);
        if(dp>=1&&dt>=1&&dp+dt<=mDist+2)cands.push([col,row]);
      }
    }
    if(!cands.length)continue;
    var pick=cands[Math.floor(Math.random()*cands.length)];
    bx=pick[0];by=pick[1];
    if(bfs(px,py,tx,ty,bx,by)>=4)break;
  }
  render();
}

function render(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  for(var row=0;row<N;row++){
    for(var col=0;col<N;col++){
      var cell=document.createElement('div');
      var cls='cell';
      if(col===px&&row===py)cls+=' player';
      else if(col===tx&&row===ty)cls+=' target';
      else if(col===bx&&row===by)cls+=' obstacle';
      cell.className=cls;
      g.appendChild(cell);
    }
  }
}

function move(dx,dy){
  if(locked)return;
  var nx=px+dx,ny=py+dy;
  if(nx<0||nx>=N||ny<0||ny>=N)return;
  if(nx===bx&&ny===by)return;
  px=nx;py=ny;
  render();
  if(px===tx&&py===ty){locked=true;document.getElementById('done').style.display='flex';}
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'){e.preventDefault();move(-1,0);}
  else if(e.key==='ArrowRight'){e.preventDefault();move(1,0);}
  else if(e.key==='ArrowUp'){e.preventDefault();move(0,-1);}
  else if(e.key==='ArrowDown'){e.preventDefault();move(0,1);}
});

newGame();
</script>
</body>
</html>
