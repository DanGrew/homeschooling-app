<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
<style>
  .filter-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 8px 16px 0;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: #f0f0f0;
    border: 2px solid #ddd;
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 1em;
    font-family: inherit;
    cursor: pointer;
    color: #555;
  }
  .filter-btn.active {
    background: #3498DB;
    border-color: #3498DB;
    color: white;
  }
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 0;
  }
  .nav-btn {
    background: #eee;
    border: none;
    border-radius: 14px;
    font-size: 1.6em;
    padding: 8px 22px;
    cursor: pointer;
    font-family: inherit;
    color: #333;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .char-label {
    font-size: 2em;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>
<div class="nav-bar"></div>
<div class="game-area">
  <div class="filter-bar">
    <button class="filter-btn" data-filter="all">All</button>
    <button class="filter-btn" data-filter="lower">a–z</button>
    <button class="filter-btn" data-filter="upper">A–Z</button>
    <button class="filter-btn" data-filter="digit">0–9</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <span class="char-label" id="char-label"></span>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>
  <div style="text-align:center;font-size:1em;color:#888;padding:4px 16px 4px;">Hold the red ball and trace!</div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <svg id="svg" viewBox="0 0 200 240" style="width:100%;height:100%;touch-action:none;" preserveAspectRatio="xMidYMid meet">
      <path id="base" fill="none" stroke="#ddd" stroke-width="18" stroke-linecap="butt"
        stroke-linejoin="round" stroke-dasharray="20 10"/>
      <circle id="ball" r="16" fill="#E74C3C" stroke="white" stroke-width="3"/>
    </svg>
    <div id="done" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,240,0.9);">
      <div style="font-size:2.5em;margin-bottom:12px;">&#11088; Well done! &#11088;</div>
      <button id="btn-done-next" style="background:#2ECC71;color:white;border:none;font-size:1.8em;padding:20px 44px;border-radius:18px;font-family:inherit;cursor:pointer;">Next &#8594;</button>
    </div>
  </div>
</div>
<script src="trace-engine.js"></script>
<script src="character-paths.js"></script>
<script>
const CHARS = [
  ...'abcdefghijklmnopqrstuvwxyz'.split('').map(c => ({char: c, file: c + '.svg', group: 'lower'})),
  ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(c => ({char: c, file: 'upper-' + c.toLowerCase() + '.svg', group: 'upper'})),
  ...'0123456789'.split('').map(c => ({char: c, file: c + '.svg', group: 'digit'}))
];

const FILTERS = {all: () => true, lower: e => e.group === 'lower', upper: e => e.group === 'upper', digit: e => e.group === 'digit'};

let currentFilter = 'all';
let filteredChars = CHARS.slice();
let currentIdx = 0;
let engine = null;

function getParam(key) {
  return new URLSearchParams(location.search).get(key);
}

function setParam(char, filter) {
  const url = new URL(location.href);
  url.searchParams.set('char', char);
  url.searchParams.set('filter', filter);
  history.replaceState(null, '', url);
}

function applyFilter(filter) {
  currentFilter = filter;
  filteredChars = CHARS.filter(FILTERS[filter]);
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
}

function navTo(idx) {
  currentIdx = idx;
  const entry = filteredChars[currentIdx];
  document.getElementById('char-label').textContent = entry.char;
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx === filteredChars.length - 1;
  document.getElementById('done').style.display = 'none';
  setParam(entry.char, currentFilter);
  loadChar(entry);
}

function loadChar(entry) {
  const d = CHARACTER_PATHS[entry.char];
  document.getElementById('base').setAttribute('d', d);
  document.querySelectorAll('.progress-path').forEach(el => el.remove());
  engine = null;
  initEngine();
}

function initEngine() {
  engine = new TraceEngine(
    document.getElementById('svg'),
    document.getElementById('base'),
    document.getElementById('ball'),
    null,
    {
      progressStroke: '#FFD700',
      progressWidth: 20,
      progressStyle: 'filter:drop-shadow(0 0 10px #FFD700) drop-shadow(0 0 5px #FFA500)',
      onComplete: function() {
        document.getElementById('done').style.display = 'flex';
      }
    }
  );
  engine.progressPaths.forEach(pp => pp.classList.add('progress-path'));
}

function init() {
  const paramChar = getParam('char') || 'a';
  const paramFilter = getParam('filter') || 'all';

  applyFilter(paramFilter);

  let idx = filteredChars.findIndex(e => e.char === paramChar);
  if (idx === -1) idx = 0;

  navTo(idx);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyFilter(btn.dataset.filter);
    navTo(0);
  });
});

document.getElementById('btn-prev').addEventListener('click', () => navTo(currentIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => navTo(currentIdx + 1));
document.getElementById('btn-done-next').addEventListener('click', () => {
  if (currentIdx < filteredChars.length - 1) navTo(currentIdx + 1);
});

window.addEventListener('load', init);
</script>
</body>
</html>
