<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Colour &amp; Shape</title>
<link rel="stylesheet" href="style.css">
<script src="menu.js" defer></script>
<script src="shapes.js"></script>
</head>
<body>
<div class="nav-bar"></div>
<div class="game-area">
  <div class="game-title">Match the colour and shape!</div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div id="shape"></div>
  </div>
  <div id="options" style="display:flex;justify-content:center;gap:18px;padding:20px 20px 44px;flex-wrap:wrap;"></div>
</div>
<script>
var current,locked;

function makeDistractors(targetCol,targetType){
  var pool=[];
  colours.forEach(function(c){
    types.forEach(function(t){
      if(c!==targetCol||t!==targetType)pool.push({col:c,type:t});
    });
  });
  pool.sort(function(){return Math.random()-0.5;});
  var colWrong=pool.filter(function(o){return o.col!==targetCol&&o.type===targetType;});
  var typeWrong=pool.filter(function(o){return o.col===targetCol&&o.type!==targetType;});
  var both=pool.filter(function(o){return o.col!==targetCol&&o.type!==targetType;});
  var chosen=[];
  if(colWrong.length)chosen.push(colWrong[0]);
  if(typeWrong.length)chosen.push(typeWrong[0]);
  var rest=pool.filter(function(o){return chosen.indexOf(o)===-1;});
  while(chosen.length<5&&rest.length)chosen.push(rest.shift());
  return chosen.slice(0,5);
}

function newRound(){
  locked=false;
  var col=pickCol();
  var type=types[Math.floor(Math.random()*types.length)];
  current={col:col,type:type};
  document.getElementById('shape').innerHTML=svg(type,col);
  var distractors=makeDistractors(col,type);
  var options=[current].concat(distractors).sort(function(){return Math.random()-0.5;});
  document.getElementById('options').innerHTML=options.map(function(o){
    return '<button data-col="'+o.col+'" data-type="'+o.type+'" onclick="check(this)" style="background:none;border:4px solid rgba(0,0,0,0.08);border-radius:18px;padding:8px;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">'+svg(o.type,o.col,'clamp(60px,13vmin,96px)')+'</button>';
  }).join('');
}

function check(btn){
  if(locked)return;
  if(btn.dataset.col===current.col&&btn.dataset.type===current.type){
    locked=true;
    btn.style.outline='6px solid #333';
    btn.style.transform='scale(1.15)';
    setTimeout(newRound,900);
  }else{
    btn.style.opacity='0.3';
    setTimeout(function(){btn.style.opacity='1';},500);
  }
}

newRound();
</script>
</body>
</html>
