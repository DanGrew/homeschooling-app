<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Learning Catalogue</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<style>
.lc-scroll{flex:1;overflow-y:auto;padding:14px 14px 24px;max-width:560px;width:100%;margin:0 auto;box-sizing:border-box;}
.lc-area{font-size:11px;color:#9aa0ad;margin:18px 4px 8px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;border-bottom:1px solid #f0eef5;padding-bottom:5px;}
.lc-card{background:#fff;border:1px solid #efedf5;border-radius:18px;padding:13px 15px;margin-bottom:11px;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;transition:transform .12s;}
.lc-card:active{transform:scale(.98);}
.lc-row1{display:flex;align-items:center;gap:10px;}
.lc-ico{font-size:24px;}
.lc-title{font-size:16px;font-weight:700;flex:1;}
.lc-licons{font-size:15px;letter-spacing:2px;}
.lc-keys{margin-top:7px;font-size:12.5px;color:#7a7a8a;}
.lc-keys b{color:#9a6bd0;font-weight:600;}
.lc-venues{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;}
.lc-vtag{font-size:11px;background:#EAF4FF;color:#3f6fae;border-radius:7px;padding:2px 8px;}
.lc-back{display:inline-block;color:#7b4fc0;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:6px;cursor:pointer;}
.lc-hero{font-size:52px;text-align:center;margin:6px 0 0;}
.lc-d-title{text-align:center;font-size:21px;font-weight:800;margin:6px 4px 0;color:#2b2b3a;}
.lc-d-icons{text-align:center;font-size:18px;letter-spacing:4px;margin:4px 0 2px;}
.lc-sec{margin:16px 4px 0;}
.lc-lab{font-size:12px;color:#9a6bd0;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.lc-focus{font-size:17px;line-height:1.35;font-weight:500;}
.lc-pills{display:flex;flex-wrap:wrap;gap:7px;}
.lc-pill{background:#f4f3f8;border-radius:999px;padding:5px 12px;font-size:13px;color:#55556a;}
.lc-pill.lc-cur{background:#EAF4FF;color:#3f6fae;}
.lc-look{margin:0;padding-left:18px;font-size:14px;line-height:1.7;color:#444;}
.lc-venue{display:flex;align-items:center;gap:11px;text-decoration:none;color:#2b2b3a;background:#fff;border:1px solid #e6e3ef;border-radius:14px;padding:12px 14px;margin-bottom:9px;}
.lc-vi{font-size:22px;}
.lc-vt{flex:1;}
.lc-vt b{font-size:15px;display:block;}
.lc-vt span{font-size:12px;color:#8a8a9a;}
.lc-go{color:#7b4fc0;font-weight:800;font-size:18px;}
.lc-filter{position:sticky;top:0;background:#faf9fc;padding:2px 0 8px;z-index:2;}
.lc-search{width:100%;box-sizing:border-box;border:1px solid #e6e3ef;border-radius:12px;padding:11px 14px;font-size:15px;background:#fff;outline:none;}
.lc-search:focus{border-color:#b69ae0;}
.lc-chips{display:flex;gap:7px;margin-top:9px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.lc-chips::-webkit-scrollbar{display:none;}
.lc-chip{flex:0 0 auto;white-space:nowrap;border:1px solid #e6e3ef;background:#fff;color:#55556a;border-radius:999px;padding:7px 12px;font-size:19px;line-height:1;cursor:pointer;}
.lc-chip-on{background:#7b4fc0;border-color:#7b4fc0;color:#fff;}
.lc-talk-btn{position:fixed;right:14px;bottom:14px;z-index:5;background:#7b4fc0;color:#fff;border:none;border-radius:999px;padding:12px 18px;font-size:14px;font-weight:700;box-shadow:0 3px 12px rgba(0,0,0,.2);cursor:pointer;}
.lc-talk-pop{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;}
.lc-talk-backdrop{position:absolute;inset:0;background:rgba(20,16,30,.45);}
.lc-talk-card{position:relative;background:#fff;border-radius:20px;padding:18px 20px 22px;max-width:420px;width:88%;box-shadow:0 12px 44px rgba(0,0,0,.32);}
.lc-talk-head{display:flex;align-items:center;font-size:18px;font-weight:800;margin-bottom:14px;}
.lc-talk-x{margin-left:auto;background:none;border:none;font-size:18px;color:#8a8a9a;cursor:pointer;line-height:1;padding:2px 4px;}
.lc-talk-cols{display:flex;gap:18px;}
.lc-talk-col{flex:1;}
.lc-talk-ch{font-size:12px;color:#9a6bd0;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.lc-talk-ul{margin:0;padding-left:18px;font-size:15px;line-height:1.9;color:#444;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../" data-title="Learning Catalogue" data-instruction="what to teach · where to practise" data-no-links="parent reference page, no sibling activities"></div>
<div class="game-area">
  <div class="lc-scroll">
    <div class="lc-filter" id="lc-filter">
      <input id="lc-search" class="lc-search" type="search" placeholder="Search learnings…" aria-label="Search learnings">
      <div id="lc-chips" class="lc-chips"></div>
    </div>
    <div id="lc-list"></div>
    <div id="lc-detail" style="display:none"></div>
  </div>
  <button id="lc-talk-btn" class="lc-talk-btn" data-testid="lc-talk-btn" aria-label="Talk prompts">🗣 Talk prompts</button>
  <div id="lc-talk-pop" class="lc-talk-pop" data-testid="lc-talk-pop" role="dialog" aria-label="Talk prompts">
    <div id="lc-talk-backdrop" class="lc-talk-backdrop"></div>
    <div class="lc-talk-card">
      <div class="lc-talk-head">🗣 Talk prompts<button id="lc-talk-close" class="lc-talk-x" data-testid="lc-talk-close" aria-label="Close">✕</button></div>
      <div id="lc-talk-cols" class="lc-talk-cols" data-testid="lc-talk-cols"></div>
    </div>
  </div>
</div>
<script src="../../../core/learning-catalogue/learning-catalogue-core.js"></script>
<script src="../../../ui/learning-catalogue/learning-catalogue-ui.js"></script>
<script src="../../../components/menu.js" defer></script>
<script>window.addEventListener('load', initLearningCatalogue);</script>
</body>
</html>
