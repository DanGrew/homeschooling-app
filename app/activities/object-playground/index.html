<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Object Playground</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<style>
#obj-viewport{flex:1;position:relative;overflow:hidden;background:#fafafa;}
#obj-world{position:absolute;top:0;left:0;}
#obj-toolbox{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.72);border-radius:12px;padding:8px;display:none;flex-direction:column;gap:6px;z-index:10;}
.obj-tool-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;min-width:120px;user-select:none;}
.obj-tool-row:active{background:rgba(255,255,255,0.3);}
.obj-tool-label{color:rgba(255,255,255,0.7);font-size:12px;flex:1;}
.obj-tool-val{color:#fff;font-size:14px;font-weight:bold;text-transform:capitalize;}
#obj-toolbox[data-dragging]{opacity:0.45;}
.obj-stack-row{display:flex;align-items:center;justify-content:center;padding:4px;background:rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;}
.obj-stack-row:active{background:rgba(255,255,255,0.3);}
.obj-selected{filter:drop-shadow(0 0 8px #fff) drop-shadow(0 0 4px #333);}
@keyframes obj-dir-arrow-fade{from{opacity:1;}to{opacity:0;}}
.obj-dir-arrow{animation:obj-dir-arrow-fade 0.5s ease-out forwards;pointer-events:none;font-size:56px;text-anchor:middle;dominant-baseline:middle;fill:rgba(255,215,60,0.92);filter:drop-shadow(0 1px 4px rgba(0,0,0,0.55));}
@keyframes obj-edge-flash{0%{filter:drop-shadow(0 0 16px #F39C12) drop-shadow(0 0 8px #E74C3C);}100%{filter:none;}}
.obj-edge-flash{animation:obj-edge-flash 0.35s ease-out forwards;}
.obj-tool-delete{background:rgba(231,76,60,0.4);}
.obj-tool-delete:active{background:rgba(231,76,60,0.7);}
#obj-add-btn{position:absolute;bottom:16px;right:16px;width:52px;height:52px;border-radius:50%;font-size:30px;font-weight:bold;line-height:1;background:#2ECC71;color:#fff;border:none;cursor:pointer;z-index:10;box-shadow:0 3px 8px rgba(0,0,0,0.25);}
#obj-add-btn:disabled{background:#aaa;cursor:default;opacity:0.55;}
#obj-undo-btn{position:absolute;bottom:16px;right:76px;width:52px;height:52px;border-radius:50%;font-size:22px;line-height:1;background:#3498DB;color:#fff;border:none;cursor:pointer;z-index:10;box-shadow:0 3px 8px rgba(0,0,0,0.25);}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Object Playground" data-instruction="Explore the shapes!" data-no-links="standalone freeplay activity"></div>
<div class="game-area">
  <div id="obj-viewport">
    <svg id="obj-world" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="obj-toolbox"></div>
    <button id="obj-add-btn" data-testid="obj-add-btn">+</button>
    <button id="obj-undo-btn" data-testid="obj-undo-btn" style="display:none">&#8617;</button>
  </div>
</div>
<script>
window.ACTIVITY_ID='object-playground';
</script>
<script src="../../../core/object-playground/object-playground-core.js"></script>
<script src="../../../ui/object-playground/object-playground-ui.js"></script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
makeSpeakable(document.getElementById('obj-add-btn'), 'Add object');
makeSpeakable(document.getElementById('obj-undo-btn'), 'Undo delete');
</script>
<script>window.addEventListener('load', initObjectPlayground);</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
