<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colour Playground</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<style>
#title-bar{display:flex;justify-content:center;align-items:center;padding:6px 16px 8px;border-bottom:2px solid #eee;flex-shrink:0;position:relative;}
#reset-btn{position:absolute;right:16px;font-size:0.85em;background:#eee;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;color:#555;}
#pic-title{font-size:1em;font-weight:700;color:#666;line-height:1.5;cursor:pointer;user-select:none;border:none;background:none;font-family:inherit;text-shadow:0 0 10px rgba(150,80,220,0.85);}
#layout{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#ref-panel{width:140px;flex-shrink:0;display:flex;flex-direction:column;padding:8px;border-right:2px solid #eee;gap:6px;overflow:hidden;}
#ref-header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#ref-label{font-size:0.7em;color:#888;font-weight:bold;text-transform:uppercase;letter-spacing:0.04em;}
#ref-toggle{font-size:0.7em;background:#eee;border:none;border-radius:6px;padding:2px 7px;cursor:pointer;color:#555;}
#ref-svg{width:100%;flex:1;min-height:0;}
#palette-panel{width:190px;flex-shrink:0;display:flex;flex-direction:column;padding:10px;border-left:2px solid #eee;gap:8px;align-items:center;overflow:hidden;}
#cur-colour{width:100%;height:52px;border-radius:12px;border:2px solid #000;background:#e0e0e0;flex-shrink:0;box-sizing:border-box;}
#guided-pal{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:clamp(36px,8vh,72px);gap:5px;width:100%;flex-shrink:0;}
#free-pal{display:flex;flex-direction:column;gap:6px;width:100%;align-items:stretch;flex-shrink:0;}
#base-palette{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:clamp(36px,8vh,72px);gap:4px;}
.swatch{border-radius:8px;cursor:pointer;border:2px solid #000;box-sizing:border-box;}
.swatch.sel{outline:4px solid #2ECC71;outline-offset:2px;}
.pal-div{height:1px;background:#eee;flex-shrink:0;}
#active-mix-row{display:flex;align-items:center;gap:5px;justify-content:center;flex-shrink:0;}
.mix-slot{width:42px;height:42px;border-radius:10px;border:3px dashed #ccc;cursor:pointer;box-sizing:border-box;flex-shrink:0;background:#f5f5f5;}
.mix-slot.filled{border-style:solid;border-color:#555;}
.mix-op{color:#bbb;font-weight:bold;flex-shrink:0;font-size:0.9em;}
#mix-result{width:42px;height:42px;border-radius:10px;border:3px solid #eee;box-sizing:border-box;flex-shrink:0;background:#f5f5f5;}
#mix-result.filled{border-color:#555;cursor:pointer;}
#shade-pop{display:none;position:fixed;background:#fff;border:2px solid #ccc;border-radius:14px;padding:8px;gap:6px;flex-direction:row;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:200;align-items:center;}
#shade-pop.open{display:flex;}
.shade-sw{width:48px;height:48px;border-radius:10px;cursor:pointer;border:3px solid transparent;box-sizing:border-box;}
.shade-sw:hover{border-color:#555;}
.shade-sw.active-shade{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333;}
@media(orientation:portrait){
  #layout{
    display:grid;
    grid-template-areas:"canvas canvas" "ref palette";
    grid-template-columns:auto 1fr;
    grid-template-rows:1fr auto;
  }
  #canvas-wrap{grid-area:canvas;min-height:0;}
  #ref-panel{grid-area:ref;width:110px;border-right:1px solid #eee;border-top:2px solid #eee;border-left:none;}
  #palette-panel{grid-area:palette;width:auto;border-left:none;border-top:2px solid #eee;padding:8px;}
  #ref-svg{height:100px;flex:none;width:100%;}
  #guided-pal,#base-palette{grid-auto-rows:clamp(28px,6vh,44px);grid-template-columns:repeat(6,1fr);}
  #cur-colour{width:36px;height:36px;}
  .mix-slot,#mix-result{width:32px;height:32px;}
  #active-mix-row{gap:4px;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Colour Playground" data-instruction="Pick a colour and tap each shape to colour it in" data-no-links="no related activities yet"></div>
<div class="game-area">
  <div id="title-bar">
    <button id="pic-title"></button>
    <button id="reset-btn" style="display:none;">↺ Reset</button>
  </div>
  <div id="layout">
    <div id="ref-panel" data-speakable-container>
      <div id="ref-header">
        <span id="ref-label">Reference</span>
        <button id="ref-toggle">Hide</button>
      </div>
      <svg id="ref-svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="canvas-wrap" data-speakable-container>
      <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="palette-panel">
      <div id="cur-colour"></div>
      <div id="guided-pal"></div>
      <div id="free-pal">
        <div id="base-palette"></div>
        <div class="pal-div"></div>
        <div id="active-mix-row" data-speakable-container>
          <div class="mix-slot" id="mix-a"></div>
          <span class="mix-op">+</span>
          <div class="mix-slot" id="mix-b"></div>
          <span class="mix-op">=</span>
          <div id="mix-result"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="paginator-bar"></div>
</div>

<div id="shade-pop">
  <div class="shade-sw" id="sh-light"></div>
  <div class="shade-sw" id="sh-base"></div>
  <div class="shade-sw" id="sh-dark"></div>
</div>

<script src="../../../ui/colouring/colouring-common.js"></script>
<script type="module" src="../../../components/speech/speech-ui.js"></script>
<script>var pictures=[];</script>
<script src="../../../assets/colouring/pictures/sun.js"></script>
<script src="../../../assets/colouring/pictures/cat.js"></script>
<script src="../../../assets/colouring/pictures/fish.js"></script>
<script src="../../../assets/colouring/pictures/house.js"></script>
<script src="../../../assets/colouring/pictures/tree.js"></script>
<script type="module">
import '../../../components/speech/speakable.js';
import { initColouringPlayground } from '../../../ui/colouring-playground/colouring-playground-ui.js';
initColouringPlayground();
</script>
<script>window.ACTIVITY_ID='colouring-playground';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
