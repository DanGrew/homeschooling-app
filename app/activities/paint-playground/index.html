<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Paint Playground</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<style>
#paint-viewport{flex:1;position:relative;overflow:hidden;background:#f0f0f0;touch-action:none;outline:3px solid #bbb;}
#paint-bg,#paint-draw{position:absolute;top:0;left:0;}
#paint-toolbar{position:absolute;right:0;top:0;bottom:0;width:80px;background:rgba(0,0,0,0.75);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:6px;z-index:20;overflow-y:auto;scrollbar-width:none;}
#paint-toolbar::-webkit-scrollbar{display:none;}
.paint-tool-btn{width:48px;height:48px;border:none;border-radius:10px;font-size:24px;cursor:pointer;background:none;color:#fff;display:flex;align-items:center;justify-content:center;}
.paint-tool-btn[data-active]{background:#F39C12;}
#paint-brush-slot{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;width:100%;}
#paint-brush-slot .paint-tool-btn{width:36px;height:36px;font-size:18px;}
#paint-colour-slot{display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:4px;padding:4px 0;flex:1;align-content:flex-start;}
.paint-colour-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.paint-colour-swatch[data-active]{border-color:#fff;}
#paint-bg-panel{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);z-index:30;padding:12px;box-sizing:border-box;overflow-y:auto;}
#paint-bg-panel-inner{display:flex;flex-direction:column;gap:10px;align-items:center;}
#paint-bg-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Paint Playground" data-instruction="Paint and create!" data-no-links="standalone freeplay activity"></div>
<div class="game-area">
  <div id="paint-viewport">
    <canvas id="paint-bg" data-testid="paint-bg"></canvas>
    <canvas id="paint-draw" data-testid="paint-draw"></canvas>
    <div id="paint-bg-panel" data-testid="paint-bg-panel">
      <div id="paint-bg-panel-inner">
        <div id="paint-bg-grid"></div>
        <div style="display:flex;gap:8px;">
          <button class="paint-tool-btn" id="paint-bg-clear-btn" data-testid="paint-bg-clear-btn" style="background:rgba(255,255,255,0.15);color:#fff;width:auto;padding:0 16px;font-size:16px;">&#10006; Clear</button>
          <button class="paint-tool-btn" id="paint-bg-close-btn" data-testid="paint-bg-close-btn" style="background:rgba(255,255,255,0.15);color:#fff;width:auto;padding:0 16px;font-size:16px;">&#10005; Close</button>
        </div>
      </div>
    </div>
    <div id="paint-toolbar">
      <div id="paint-brush-slot">
        <button class="paint-tool-btn" data-paint-tool="pencil" id="paint-pencil-btn" data-testid="paint-pencil-btn">&#9999;&#65039;</button>
        <button class="paint-tool-btn" data-paint-tool="crayon" id="paint-crayon-btn" data-testid="paint-crayon-btn">&#128397;&#65039;</button>
        <button class="paint-tool-btn" data-paint-tool="paintbrush" id="paint-paintbrush-btn" data-testid="paint-paintbrush-btn">&#128396;&#65039;</button>
        <button class="paint-tool-btn" data-paint-tool="marker" id="paint-marker-btn" data-testid="paint-marker-btn">&#128394;&#65039;</button>
        <button class="paint-tool-btn" data-paint-tool="glitter" id="paint-glitter-btn" data-testid="paint-glitter-btn">&#10024;</button>
        <button class="paint-tool-btn" data-paint-tool="stamp" id="paint-stamp-btn" data-testid="paint-stamp-btn">&#11088;</button>
        <button class="paint-tool-btn" data-paint-tool="rainbow" id="paint-rainbow-btn" data-testid="paint-rainbow-btn">&#127752;</button>
        <button class="paint-tool-btn" data-paint-tool="eraser" id="paint-eraser-btn" data-testid="paint-eraser-btn">&#8955;</button>
      </div>
      <div id="paint-size-slot" style="display:flex;justify-content:center;gap:4px;padding:2px 0;">
        <button class="paint-tool-btn" data-paint-size="1" data-testid="paint-size-sm-btn" style="width:28px;height:28px;"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="4" fill="currentColor"/></svg></button>
        <button class="paint-tool-btn" data-paint-size="2" data-testid="paint-size-md-btn" style="width:28px;height:28px;"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="7" fill="currentColor"/></svg></button>
        <button class="paint-tool-btn" data-paint-size="3" data-testid="paint-size-lg-btn" style="width:28px;height:28px;"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="10" fill="currentColor"/></svg></button>
      </div>
      <div id="paint-colour-slot"></div>
      <div id="paint-util-slot" style="display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.65;">
        <button class="paint-tool-btn" id="paint-bg-btn" data-testid="paint-bg-btn">&#128444;&#65039;</button>
        <div style="display:flex;gap:2px;">
          <div style="position:relative;width:36px;height:36px;" data-speakable-container>
            <button class="paint-tool-btn" id="paint-bg-scale-dn-btn" data-testid="paint-bg-scale-dn-btn" style="position:absolute;top:0;left:0;width:36px;height:36px;font-size:18px;">&#8722;</button>
            <svg id="paint-bg-scale-dn-arc" style="position:absolute;top:-5px;left:-5px;width:46px;height:46px;pointer-events:none;transform:rotate(-90deg);" viewBox="0 0 46 46"><circle cx="23" cy="23" r="20" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3" stroke-dasharray="126" stroke-dashoffset="126"/></svg>
          </div>
          <div style="position:relative;width:36px;height:36px;" data-speakable-container>
            <button class="paint-tool-btn" id="paint-bg-scale-up-btn" data-testid="paint-bg-scale-up-btn" style="position:absolute;top:0;left:0;width:36px;height:36px;font-size:18px;">&#43;</button>
            <svg id="paint-bg-scale-up-arc" style="position:absolute;top:-5px;left:-5px;width:46px;height:46px;pointer-events:none;transform:rotate(-90deg);" viewBox="0 0 46 46"><circle cx="23" cy="23" r="20" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3" stroke-dasharray="126" stroke-dashoffset="126"/></svg>
          </div>
        </div>
        <button class="paint-tool-btn" id="paint-undo-btn" data-testid="paint-undo-btn">&#8617;</button>
        <div style="position:relative;width:48px;height:48px;" data-speakable-container>
          <button class="paint-tool-btn" id="paint-clear-btn" data-testid="paint-clear-btn" style="position:absolute;top:0;left:0;">&#128465;</button>
          <svg id="paint-clear-arc" style="position:absolute;top:-6px;left:-6px;width:60px;height:60px;pointer-events:none;transform:rotate(-90deg);" viewBox="0 0 60 60"><circle cx="30" cy="30" r="27" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3" stroke-dasharray="170" stroke-dashoffset="170"/></svg>
        </div>
      </div>
      <button class="paint-tool-btn" data-paint-tool="hand" id="paint-hand-btn" data-testid="paint-hand-btn">&#9995;</button>
    </div>
  </div>
</div>
<script src="../../../core/paint-playground/paint-playground-core.js"></script>
<script src="../../../ui/paint-playground/paint-playground-ui.js"></script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
import { makeLongPress } from '../../../ui/shared/long-press.js';
makeSpeakable(document.getElementById('paint-pencil-btn'), 'Pencil');
makeSpeakable(document.getElementById('paint-crayon-btn'), 'Crayon');
makeSpeakable(document.getElementById('paint-paintbrush-btn'), 'Paint brush');
makeSpeakable(document.getElementById('paint-marker-btn'), 'Marker');
makeSpeakable(document.getElementById('paint-glitter-btn'), 'Glitter brush');
makeSpeakable(document.getElementById('paint-stamp-btn'), 'Star stamp');
makeSpeakable(document.getElementById('paint-rainbow-btn'), 'Rainbow brush');
makeSpeakable(document.getElementById('paint-eraser-btn'), 'Eraser');
makeSpeakable(document.querySelector('[data-testid="paint-size-sm-btn"]'), 'Small brush');
makeSpeakable(document.querySelector('[data-testid="paint-size-md-btn"]'), 'Medium brush');
makeSpeakable(document.querySelector('[data-testid="paint-size-lg-btn"]'), 'Large brush');
makeSpeakable(document.getElementById('paint-undo-btn'), 'Undo');
makeSpeakable(document.getElementById('paint-clear-btn'), 'Clear canvas');
makeSpeakable(document.getElementById('paint-bg-btn'), 'Backgrounds');
makeSpeakable(document.getElementById('paint-bg-scale-dn-btn'), 'Shrink background');
makeSpeakable(document.getElementById('paint-bg-scale-up-btn'), 'Grow background');
var _scaleUpArc = document.querySelector('#paint-bg-scale-up-arc circle');
var _scaleDnArc = document.querySelector('#paint-bg-scale-dn-arc circle');
makeLongPress(document.getElementById('paint-bg-scale-up-btn'), function() { paintSetBgScale(1); }, 600,
  function() { _scaleUpArc.style.transition = 'stroke-dashoffset 600ms linear'; _scaleUpArc.setAttribute('stroke-dashoffset', '0'); },
  function() { _scaleUpArc.style.transition = 'none'; _scaleUpArc.setAttribute('stroke-dashoffset', '126'); }
);
makeLongPress(document.getElementById('paint-bg-scale-dn-btn'), function() { paintSetBgScale(-1); }, 600,
  function() { _scaleDnArc.style.transition = 'stroke-dashoffset 600ms linear'; _scaleDnArc.setAttribute('stroke-dashoffset', '0'); },
  function() { _scaleDnArc.style.transition = 'none'; _scaleDnArc.setAttribute('stroke-dashoffset', '126'); }
);
makeSpeakable(document.getElementById('paint-bg-clear-btn'), 'Clear background');
makeSpeakable(document.getElementById('paint-bg-close-btn'), 'Close backgrounds');
makeSpeakable(document.getElementById('paint-hand-btn'), 'Hand tool');
var _clearArc = document.querySelector('#paint-clear-arc circle');
makeLongPress(document.getElementById('paint-clear-btn'), function() { paintClearCanvas(); }, 800,
  function() { _clearArc.style.transition = 'stroke-dashoffset 800ms linear'; _clearArc.setAttribute('stroke-dashoffset', '0'); },
  function() { _clearArc.style.transition = 'none'; _clearArc.setAttribute('stroke-dashoffset', '170'); }
);
</script>
<script>window.addEventListener('load', initPaintPlayground);</script>
<script>window.ACTIVITY_ID = 'paint-playground';</script>
</body>
</html>
