<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shopping Game</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<link rel="stylesheet" href="../../../styles/pairs.css">
<link rel="stylesheet" href="../../../styles/shopping-game.css">
<script src="../../../components/menu.js" defer></script>
<script type="module" src="../../../components/success-banner.js"></script>
<script src="../../../core/pairs/pairs-content.js"></script>
<script src="../../../core/card-game/card-game-engine.js"></script>
<script src="../../../core/shopping-game/shopping-game-core.js"></script>
<script src="../../../ui/card-game/card-game-ui.js"></script>
<script src="../../../ui/shopping-game/shopping-game-ui.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Shopping Game" data-instruction="Find all the items on your list" data-no-links="standalone game"></div>

<div class="game-area" style="flex-direction:column;overflow:hidden;">
  <div id="shopping-setup" class="pairs-screen active"></div>
  <div id="shopping-game" class="pairs-screen"></div>
  <div id="shopping-summary" class="pairs-screen"></div>
</div>

<script>window.ACTIVITY_ID = 'shopping-game';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>

<script>
window.DICT_BASE = '../../../content/dictionary/entries/';

var MISMATCH_DELAY = 1000;
var COMPLETE_DELAY = 1200;
var MATCH_HANDOVER_DELAY = 1200;

var handoverDelay = 0;

var setupScreen   = document.getElementById('shopping-setup');
var gameScreen    = document.getElementById('shopping-game');
var summaryScreen = document.getElementById('shopping-summary');

var gameState;
var gameMode = 'shared';
var allEntries;
var animalEntries;
var conceptNames = {};

var SG_NOOP = function() {};
var SG_SCREEN_ACTIVE = { 'true': ' active', 'false': '' };
var SG_BLOCKED_PHASES = { resolving: true, complete: true };

function showScreen(name) {
  var screens = { setup: setupScreen, game: gameScreen, summary: summaryScreen };
  Object.keys(screens).forEach(function(k) {
    screens[k].className = 'pairs-screen' + SG_SCREEN_ACTIVE[String(k === name)];
  });
}

function reRenderGame() {
  renderShoppingGame(gameScreen, gameState, gameMode, handleFlip);
  shoppingMeasureCards(gameScreen);
}

function handleTurnChange() {
  var TURN_HANDLERS = {
    passplay: function() {
      var player = gameState.players[gameState.turnIndex];
      var delay = handoverDelay;
      handoverDelay = 0;
      setTimeout(function() { renderShoppingHandover(gameScreen, player.name, reRenderGame); }, delay);
    },
    shared: function() {
      var delay = handoverDelay;
      handoverDelay = 0;
      setTimeout(function() {
        shoppingApplyTurnChange(gameScreen, gameState.players, gameState.turnIndex);
      }, delay);
    }
  };
  [TURN_HANDLERS[gameMode]].filter(Boolean).concat([TURN_HANDLERS.shared])[0]();
}

fetch('../../../content/dictionary/dictionary.json')
  .then(function(r) { return r.json(); })
  .then(function(ids) {
    return Promise.all(ids.map(function(id) {
      return fetch(window.DICT_BASE + id + '/concept.json').then(function(r) { return r.json(); });
    }));
  })
  .then(function(concepts) {
    concepts.forEach(function(c) { conceptNames[c.id] = [c.name, c.id].filter(Boolean)[0]; });
    allEntries    = concepts;
    animalEntries = filterByTag(concepts, 'animals');
    renderShoppingSetup(setupScreen, allEntries, animalEntries, function(cfg) {
      startGame(cfg);
    });
  });

function startGame(cfg) {
  var contentEntries = filterByTags(allEntries, cfg.tags);
  var contentSet = buildContentSet(contentEntries, cfg.gridSize);
  var players = cfg.players.slice(0, cfg.playerCount).map(function(p, i) {
    return { id: 'p' + i, name: [p.name, 'Player ' + (i + 1)].filter(Boolean)[0], icon: p.icon, role: p.role };
  });
  gameMode = [cfg.mode, 'shared'].filter(Boolean)[0];
  handoverDelay = 0;
  gameState = createShoppingGame(players, cfg.gridSize, contentSet);
  showScreen('game');
  renderShoppingGame(gameScreen, gameState, gameMode, handleFlip);
  var START_ACTIONS = {
    passplay: function() { renderShoppingHandover(gameScreen, gameState.players[0].name, reRenderGame); },
    shared: SG_NOOP
  };
  [START_ACTIONS[gameMode]].filter(Boolean).concat([START_ACTIONS.shared])[0]();
}

window.addEventListener('resize', function() {
  [gameState].filter(Boolean).forEach(function() { shoppingMeasureCards(gameScreen); });
});

// arch: allow-pure-fn
function handleFlip(cardIndex) {
  [gameState].filter(Boolean).filter(function(s) { return !SG_BLOCKED_PHASES[s.phase]; }).forEach(function(s) {
    var result = flipShoppingCard(s, cardIndex);
    gameState = result.state;
    result.events.forEach(function(ev) { applyEvent(ev, cardIndex); });
  });
}

function applyEvent(ev, cardIndex) {
  var HANDLERS = {
    card_reveal: function() {
      shoppingApplyReveal(gameScreen, ev.data.cardIndex);
      speakCard(ev.data.cardIndex);
    },
    item_found: function() {
      shoppingApplyFound(gameScreen, ev.data.cardIndex, ev.data.playerId, ev.data.contentId);
      handoverDelay = MATCH_HANDOVER_DELAY;
    },
    tray_update: SG_NOOP,
    turn_start: function() {
      handleTurnChange();
    },
    not_found: function() {
      var idx = ev.data.cardIndex;
      setTimeout(function() {
        var result = resolveShoppingFlip(gameState);
        gameState = result.state;
        shoppingApplyMismatch(gameScreen, idx);
        result.events.forEach(function(e2) {
          var RESOLVE_HANDLERS = { turn_start: handleTurnChange };
          [RESOLVE_HANDLERS[e2.type]].filter(Boolean).concat([SG_NOOP])[0]();
        });
      }, MISMATCH_DELAY);
    },
    invalid_action: function() {
      shoppingFlashInvalid(gameScreen, cardIndex);
    },
    game_complete: function() {
      setTimeout(function() {
        showScreen('summary');
        renderShoppingSummary(summaryScreen, gameState, function() {
          showScreen('setup');
          renderShoppingSetup(setupScreen, allEntries, animalEntries, function(cfg) {
            startGame(cfg);
          });
        });
      }, COMPLETE_DELAY);
    }
  };
  [HANDLERS[ev.type]].filter(Boolean).concat([SG_NOOP])[0]();
}

function speakCard(cardIndex) {
  var el = gameScreen.querySelector('[data-testid="card-' + cardIndex + '"] .pairs-card-front img');
  var card = gameState.cards[cardIndex];
  var name = [conceptNames[card.contentId], card.contentId].filter(Boolean)[0];
  [el].filter(Boolean).forEach(function(e) {
    [window.__makeSpeakable].filter(Boolean).forEach(function(fn) { fn(e, name); });
    [window.__speakInterrupt].filter(Boolean).forEach(function(fn) { fn(name); });
  });
}
</script>

<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import { speakInterrupt } from '../../../components/speech/speech-ui.js';
document.querySelectorAll('[data-speak]').forEach(function(el) {
  makeSpeakable(el, el.getAttribute('data-speak'));
});
window.__makeSpeakable = makeSpeakable;
window.__speakInterrupt = speakInterrupt;
</script>
</body>
</html>
