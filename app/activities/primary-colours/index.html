<div class="game-area">
  <div class="game-title">Primary Colours</div>
  <div id="cm-root" style="flex:1;overflow:hidden;"></div>
</div>
<script src="../../shared/menu.js"></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script>window.CM_CONFIG={palette:['red','yellow','blue'],targets:['orange','green','purple']};</script>
<script type="module" src="../../../ui/colour-mixing/colour-mixing-ui.js"></script>
<script>window.ADULT_PROMPTS=[
  {type:'word',text:'The three colours shown are "primary colours" — red, yellow and blue. Mixing two makes a "secondary colour".'},
  {type:'ask', text:'When a target appears, ask first: "I wonder which two colours will make [target]?" — give them time to think before they touch.'},
  {type:'say', text:'On a correct answer, say together: "[colour A] and [colour B] make [result]!" — say it slowly and let them echo it back.'},
  {type:'ask', text:'If they get it wrong, don\'t tell them — ask: "What could we swap? Should we try a different one?"'}
];</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js"></script>
