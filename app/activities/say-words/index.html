<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Say Words</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<script src="../../shared/menu.js" defer></script>
<style>
#tile-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 6px;
  padding: 6px;
  flex: 1;
  min-height: 0;
}
@media (orientation: portrait) {
  #tile-grid {
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
  }
}
.tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #fff;
  border-radius: 10px;
  border: 2px solid #eee;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  padding: 4px 4px 2px;
  overflow: hidden;
  min-height: 0;
}
.tile:active { background: #e8f8ef; border-color: #2ECC71; }
.tile-img {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}
.tile-label {
  font-size: clamp(0.55em, 1.8vmin, 0.95em);
  font-weight: bold;
  color: #333;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  padding-top: 2px;
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Say Words" data-links='[{"href":"../word-match/","label":"Word Match"}]'></div>
<div class="game-area" style="display:flex;flex-direction:column;overflow:hidden;">
  <div id="filter-bar"></div>
  <div id="tile-grid"></div>
  <div style="display:flex;justify-content:center;align-items:center;gap:16px;padding:6px 16px 44px;">
    <button id="btn-prev" onclick="prevPage()" style="font-size:clamp(0.9em,3vmin,1.4em);padding:clamp(6px,1.2vmin,12px) clamp(14px,2.5vw,24px);border:none;border-radius:14px;background:#2ECC71;color:#fff;font-family:inherit;cursor:pointer;touch-action:manipulation;user-select:none;">&#8592; Prev</button>
    <span id="page-indicator" style="font-size:clamp(0.85em,2.5vmin,1.2em);color:#555;min-width:90px;text-align:center;"></span>
    <button id="btn-next" onclick="nextPage()" style="font-size:clamp(0.9em,3vmin,1.4em);padding:clamp(6px,1.2vmin,12px) clamp(14px,2.5vw,24px);border:none;border-radius:14px;background:#2ECC71;color:#fff;font-family:inherit;cursor:pointer;touch-action:manipulation;user-select:none;">Next &#8594;</button>
  </div>
</div>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import {loadImages} from '../../../core/dictionary/dictionary-helpers-core.js';
import {buildFilterBar} from '../../../ui/filter-bar/filter-bar-ui.js';
import {speak as speakWord} from '../../../ui/speech/speech-ui.js';
Dictionary.init('../../dictionary/');

var all=[], filtered=[], page=0;
var PER_PAGE=20;

function pageCount(){return Math.max(1,Math.ceil(filtered.length/PER_PAGE));}

function render(){
  var grid=document.getElementById('tile-grid');
  grid.innerHTML='';
  var slice=filtered.slice(page*PER_PAGE,(page+1)*PER_PAGE);
  slice.forEach(function(w){
    var tile=document.createElement('div');
    tile.className='tile';
    tile.onclick=function(){speakWord(w.name);};
    var imgDiv=document.createElement('div');
    imgDiv.className='tile-img';
    var img=document.createElement('img');
    img.src=w.url;
    img.alt=w.name;
    img.style.cssText='width:100%;height:100%;object-fit:contain;';
    imgDiv.appendChild(img);
    var label=document.createElement('div');
    label.className='tile-label';
    label.textContent=w.name;
    tile.appendChild(imgDiv);
    tile.appendChild(label);
    grid.appendChild(tile);
  });
  var pc=pageCount();
  document.getElementById('page-indicator').textContent='Page '+(page+1)+' of '+pc;
  document.getElementById('btn-prev').disabled=page===0;
  document.getElementById('btn-next').disabled=page>=pc-1;
}

function prevPage(){page=Math.max(0,page-1);render();}
function nextPage(){page=Math.min(pageCount()-1,page+1);render();}
window.prevPage=prevPage;
window.nextPage=nextPage;

loadImages(all,function(){
  buildFilterBar(all,function(f){filtered=f;page=0;render();});
});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='say-words';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
