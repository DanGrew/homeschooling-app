<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Say Words</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/theme.css">
<link rel="stylesheet" href="/homeschooling-app/app/shared/style.css">
<script src="/homeschooling-app/app/shared/menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-home="/homeschooling-app/app/lessons/"></div>
<div class="game-area">
  <div id="filter-bar" style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;"></div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,2vmin,16px);padding:8px;">
    <div id="picture" style="width:clamp(200px,55vmin,420px);height:clamp(200px,55vmin,420px);display:flex;align-items:center;justify-content:center;"></div>
    <div id="label" style="font-size:clamp(2em,8vmin,4em);font-weight:bold;color:#333;letter-spacing:0.05em;"></div>
    <div id="phonetic" style="font-size:clamp(1em,4vmin,2em);color:#888;letter-spacing:0.08em;"></div>
  </div>
  <div style="display:flex;justify-content:center;gap:clamp(12px,3vw,24px);padding:20px 20px 44px;">
    <button onclick="prev()" style="font-size:clamp(0.9em,3vmin,1.4em);padding:clamp(8px,1.5vmin,14px) clamp(16px,3vw,28px);border:none;border-radius:16px;background:#2ECC71;color:#fff;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">&#8592;</button>
    <button onclick="speak()" style="font-size:clamp(0.9em,3vmin,1.4em);padding:clamp(8px,1.5vmin,14px) clamp(16px,3vw,28px);border:none;border-radius:16px;background:#3498DB;color:#fff;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">&#128266; Say it!</button>
    <button onclick="next()" style="font-size:clamp(0.9em,3vmin,1.4em);padding:clamp(8px,1.5vmin,14px) clamp(16px,3vw,28px);border:none;border-radius:16px;background:#2ECC71;color:#fff;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">&#8594;</button>
  </div>
</div>
<script src="/homeschooling-app/app/dictionary/dictionary.js"></script>
<script src="/homeschooling-app/app/dictionary/dictionary-helpers.js"></script>
<script src="/homeschooling-app/app/shared/filter-bar.js"></script>
<script>
Dictionary.init('/homeschooling-app/app/dictionary/');
var filtered=[],idx=0;

function show(){
  var w=filtered[idx];
  if(!w)return;
  var pic=document.getElementById('picture');
  pic.innerHTML=w.svg;
  var svg=pic.querySelector('svg');
  if(svg){
    svg.style.cssText='width:clamp(200px,55vmin,420px);height:clamp(200px,55vmin,420px);';
    if(w.viewBox)svg.setAttribute('viewBox',w.viewBox);
  }
  document.getElementById('label').textContent=w.name;
  document.getElementById('phonetic').textContent=w.phonetic||'';
}

function bestVoice(){
  var voices=speechSynthesis.getVoices();
  return voices.find(function(v){return v.lang==='en-GB'&&v.name.match(/female|woman|girl|karen|serena|moira|kate/i);})
    ||voices.find(function(v){return v.lang==='en-GB';})
    ||voices.find(function(v){return v.lang.startsWith('en');})
    ||null;
}

function speak(){
  if(!filtered[idx])return;
  var u=new SpeechSynthesisUtterance(filtered[idx].name);
  u.rate=1.0;u.pitch=1.1;
  var v=bestVoice();if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function prev(){idx=(idx-1+filtered.length)%filtered.length;show();}
function next(){idx=(idx+1)%filtered.length;show();}

loadImages(filtered=[],function(){buildFilterBar(filtered,function(f){filtered=f;idx=0;show();});});
</script>
</body>
</html>
