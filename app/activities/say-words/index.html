<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Say Words</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<style>
#tile-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 6px;
  padding: 6px;
  flex: 1;
  min-height: 0;
}
@media (orientation: portrait) {
  #tile-grid {
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
  }
}
.tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #fff;
  border-radius: 10px;
  border: 2px solid #eee;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  padding: 4px 4px 2px;
  overflow: hidden;
  min-height: 0;
}
.tile-img {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}
.tile-label {
  font-size: clamp(0.55em, 1.8vmin, 0.95em);
  font-weight: bold;
  color: #333;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  padding-top: 2px;
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Say Words" data-instruction="Tap a picture and say the word" data-links='[{"href":"../word-match/","label":"Word Match"}]'></div>
<div class="game-area" style="display:flex;flex-direction:column;overflow:hidden;">
  <div id="tile-grid"></div>
  <div id="paginator-bar"></div>
</div>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import {loadImages} from '../../../core/dictionary/dictionary-helpers-core.js';
import {buildFilterBar} from '../../../components/filter-bar/filter-bar-ui.js';
import {makeSpeakable} from '../../../components/speech/speakable.js';
import {createPaginator} from '../../../components/pagination/paginator-ui.js';
Dictionary.init('../../../content/dictionary/');

var all=[];

var paginator=createPaginator({
  container: document.getElementById('paginator-bar'),
  items: [],
  perPage: 20,
  wrap: false,
  onRender: function(slice){
    var grid=document.getElementById('tile-grid');
    grid.innerHTML='';
    slice.forEach(function(w){
      var tile=document.createElement('div');
      tile.className='tile';
      makeSpeakable(tile, w.name);
      tile.addEventListener('click', function() {
        window.dispatchEvent(new CustomEvent('guidance:event', { detail: { type: w.id.replace(/-/g, '_').toUpperCase() + '_SPOKEN' } }));
      });
      var imgDiv=document.createElement('div');
      imgDiv.className='tile-img';
      var img=document.createElement('img');
      img.src=w.url;
      img.alt=w.name;
      img.style.cssText='width:100%;height:100%;object-fit:contain;';
      imgDiv.appendChild(img);
      var label=document.createElement('div');
      label.className='tile-label';
      label.textContent=w.name;
      tile.appendChild(imgDiv);
      tile.appendChild(label);
      grid.appendChild(tile);
    });
  }
});

loadImages(all,function(){
  buildFilterBar(all,function(f){paginator.reset(f);});
});
</script>
<script>
  window.DICT_BASE='../../../content/dictionary/entries/';
  window.ACTIVITY_ID='say-words';
  window.LESSONS=[
    {id:'say-words-lesson-farm_animals',number:1,title:'Farm Animals'},
    {id:'say-words-lesson-safari_animals',number:2,title:'Safari Animals'},
    {id:'say-words-lesson-core_emotions',number:3,title:'How Are You Feeling?'},
    {id:'say-words-lesson-fruit_shop',number:4,title:'Fruit Shop'},
    {id:'say-words-lesson-vehicles',number:5,title:'Things That Go'},
    {id:'say-words-lesson-exotic_fruit',number:6,title:'Exotic Fruits'}
  ];
</script>
<script type="module">
  import{GuidanceService}from'../../../components/guidance/guidance-service.js';
  window.LEARNINGS_BASE='../../../content/learnings/';
  window.guidanceService=new GuidanceService();
</script>
<script>
  window.addEventListener('guidance:start', function() {
    [window.guidanceService].filter(Boolean)
      .map(function(s) { return s._lesson; })
      .filter(Boolean)
      .filter(function(l) { return l.filter; })
      .forEach(function(l) {
        var btn = document.querySelector('#nav-filter-slot button[data-tag="' + l.filter + '"]');
        [btn].filter(Boolean).forEach(function(b) { b.click(); });
      });
  });
  window.addEventListener('guidance:stop', function() {
    var btn = document.querySelector('#nav-filter-slot button[data-tag="all"]');
    [btn].filter(Boolean).forEach(function(b) { b.click(); });
  });
</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">import '../../../components/speech/speech-ui.js';</script>
</body>
</html>
