<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Shape</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script src="../../../core/shapes/shapes-core.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Match Shape" data-instruction="Find the matching shape" data-no-links="standalone game"></div>
<div class="game-area">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div id="shape"></div>
  </div>
  <div id="options" style="display:flex;justify-content:center;gap:18px;padding:20px 20px 44px;flex-wrap:wrap;"></div>
</div>
<script>
var current,locked;
var DO_SPEAK={'true':function(btn,text){window.__makeSpeakable(btn,text);},'false':function(){}};

var CHECK_RESULT={
  'true': function(btn){locked=true;btn.classList.add('feedback-correct');showBanner(newRound);},
  'false':function(btn){btn.classList.add('feedback-wrong');setTimeout(function(){btn.classList.remove('feedback-wrong');},500);}
};

function check(btn){
  ({'true':function(){},'false':function(){CHECK_RESULT[String(btn.dataset.type===current.type)](btn);}})[String(locked)]();
}

function makeOption(t,col){
  var btn=document.createElement('button');
  btn.dataset.type=t;
  btn.style.cssText='background:none;border:4px solid rgba(0,0,0,0.08);border-radius:18px;padding:8px;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;';
  btn.innerHTML=svg(t,col,'clamp(60px,13vmin,96px)');
  btn.addEventListener('click',function(){check(btn);});
  DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn,t);
  return btn;
}

function newRound(){
  locked=false;
  var col=pickCol();
  current={col:col,type:types[Math.floor(Math.random()*types.length)]};
  document.getElementById('shape').innerHTML=svg(current.type,col);
  var optContainer=document.getElementById('options');
  optContainer.innerHTML='';
  types.slice().sort(function(){return Math.random()-0.5;}).forEach(function(t){
    optContainer.appendChild(makeOption(t,col));
  });
}

newRound();
window.addEventListener('load',function(){
  document.querySelectorAll('#options button:not(.speakable)').forEach(function(btn){
    DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn,btn.dataset.type);
  });
});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='match-shape';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">import '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';</script>
</body>
</html>
