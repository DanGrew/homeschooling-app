<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piano</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/theme.css">
<link rel="stylesheet" href="/homeschooling-app/app/shared/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;flex-direction:column;}
.nav-bar{flex-direction:row;justify-content:space-between;border-right:none;border-bottom:2px solid #ddd;padding:8px 16px;}
#stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#note-display{font-size:clamp(3em,15vw,7em);line-height:1;transition:color 0.15s;}
#note-hint{font-size:clamp(1em,3vw,1.4em);color:#bbb;}
#keys-wrap{height:min(220px,30vh);flex-shrink:0;padding:0 4px 4px;gap:3px;}
</style>
</head>
<body>
<div class="nav-bar" data-home="/homeschooling-app/app/lessons/" data-title="&#127929; Piano" data-links='[{"label":"Game &#9654;","href":"./game.html"}]'></div>
<div class="game-area">
  <div id="stage">
    <div id="note-display">&#9834;</div>
    <div id="note-hint">Tap a key!</div>
  </div>
  <div id="keys-wrap"></div>
</div>
<script src="/homeschooling-app/app/shared/menu.js" defer></script>
<script src="/homeschooling-app/app/shared/piano-shared.js"></script>
<script>
var display = document.getElementById('note-display');
var hint = document.getElementById('note-hint');
renderKeys(document.getElementById('keys-wrap'), function(i, note, keyEl) {
  initAudio().then(function() { playNote(note, 1.0); }).catch(function(){});
  glowKey(keyEl, 'hit');
  display.textContent = PIANO_CONFIG.NOTE_LABELS[i] + ' \u266a';
  display.style.color = PIANO_CONFIG.KEY_COLORS[i];
  hint.style.display = 'none';
});
</script>
</body>
</html>
