<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piano</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;flex-direction:column;}
.nav-bar{flex-direction:row;justify-content:space-between;border-right:none;border-bottom:2px solid #ddd;padding:8px 16px;}
#song-selector-wrap{display:flex;align-items:center;justify-content:center;padding:6px 12px;flex-shrink:0;border-bottom:1px solid #eee;background:#fff8f0;}
#song-select{font-size:clamp(13px,3.5vw,16px);font-family:inherit;padding:4px 8px;border:2px solid #ddd;border-radius:8px;background:#fff;color:#333;cursor:pointer;}
#stage{flex:1;display:flex;flex-direction:row;align-items:stretch;overflow:hidden;}
.nav-arrow{flex-shrink:0;width:44px;display:flex;align-items:center;justify-content:center;font-size:1.8em;color:#bbb;cursor:pointer;user-select:none;touch-action:manipulation;transition:color 0.15s;}
.nav-arrow:active{color:#888;}
.nav-arrow.hidden{visibility:hidden;}
#section-display{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:8px 0;overflow:hidden;}
.song-line{display:flex;flex-wrap:wrap;gap:4px 8px;justify-content:center;align-items:flex-end;}
.word-group{display:flex;flex-direction:column;align-items:center;gap:4px;}
.note-chips{display:flex;gap:2px;}
.note-chip{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:clamp(22px,5vw,30px);height:clamp(20px,4.5vw,26px);
  border-radius:6px;font-size:clamp(9px,2.2vw,12px);font-weight:bold;color:#333;
  border:1.5px solid rgba(0,0,0,0.12);padding:0 3px;white-space:nowrap;
  transition:transform 0.1s,filter 0.1s;
}
.note-chip.playable{cursor:pointer;touch-action:none;}
.note-chip.no-audio{opacity:0.35;cursor:default;}
.lyric{font-size:clamp(12px,3vw,16px);color:#444;text-align:center;white-space:nowrap;}
#verse-indicator{display:flex;gap:6px;align-items:center;justify-content:center;padding:4px;flex-shrink:0;}
.verse-dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:background 0.2s;}
.verse-dot.active{background:#aaa;}
#keys-wrap{height:min(220px,30vh);flex-shrink:0;padding:0 4px 4px;gap:3px;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="&#127929; Piano" data-links='[{"label":"Songs &#9834;","href":"./songs.html"},{"label":"Game &#9654;","href":"./game.html"}]'></div>
<div id="song-selector-wrap">
  <select id="song-select"></select>
</div>
<div class="game-area">
  <div id="stage">
    <div class="nav-arrow" id="btn-prev">&#9664;</div>
    <div id="section-display"></div>
    <div class="nav-arrow" id="btn-next">&#9654;</div>
  </div>
  <div id="verse-indicator"></div>
  <div id="keys-wrap"></div>
</div>
<script src="../../shared/menu.js" defer></script>
<script src="../../../core/shared/utils.js"></script>
<script src="../../../core/piano/piano-core.js"></script>
<script src="../../../ui/shared/audio-ctx.js"></script>
<script src="../../../ui/piano/piano-ui.js"></script>
<script>
var NOTE_MAP = {
  'C':  {note:'C4', color:'#FFB3B3'},
  'D':  {note:'D4', color:'#FFCBA4'},
  'E':  {note:'E4', color:'#FFF0A3'},
  'F':  {note:'F4', color:'#B3FFB3'},
  'G':  {note:'G4', color:'#A3D9FF'},
  'A':  {note:'A4', color:'#B3C6FF'},
  'B':  {note:'B4', color:'#E0B3FF'},
  '^C': {note:'C5', color:'#FFB3E6'},
  '^D': {note:'D5', color:'#B3FFEE'},
  '^E': {note:'E5', color:'#D4FFB3'},
  '^F': {note:'F5', color:'#FFCCF2'},
  '^G': {note:'G5', color:'#C5F2CC'},
  '^A': {note:null, color:'#ccc'},
  'Bb': {note:null, color:'#ccc'}
};

var SONGS = [
  {
    title: 'Twinkle Twinkle Little Star',
    verses: [
      [
        [{n:['C','C'],t:'Twinkle,'},{n:['G','G'],t:'twinkle,'},{n:['A','A'],t:'little'},{n:['G'],t:'star'}],
        [{n:['F'],t:'How'},{n:['F'],t:'I'},{n:['E','E'],t:'wonder'},{n:['D'],t:'what'},{n:['D'],t:'you'},{n:['C'],t:'are!'}]
      ],
      [
        [{n:['G'],t:'Up'},{n:['G','F'],t:'above'},{n:['F'],t:'the'},{n:['E'],t:'world'},{n:['E'],t:'so'},{n:['D'],t:'high,'}],
        [{n:['G'],t:'Like'},{n:['G'],t:'a'},{n:['F','F'],t:'diamond'},{n:['E'],t:'in'},{n:['E'],t:'the'},{n:['D'],t:'sky...'}]
      ],
      [
        [{n:['C','C'],t:'Twinkle,'},{n:['G','G'],t:'twinkle,'},{n:['A','A'],t:'little'},{n:['G'],t:'star'}],
        [{n:['F'],t:'How'},{n:['F'],t:'I'},{n:['E','E'],t:'wonder'},{n:['D'],t:'what'},{n:['D'],t:'you'},{n:['C'],t:'are!'}]
      ]
    ]
  },
  {
    title: 'Old MacDonald Had a Farm',
    verses: [
      [
        [{n:['G'],t:'Old'},{n:['G','G','D'],t:'MacDonald'},{n:['E'],t:'had'},{n:['E'],t:'a'},{n:['D'],t:'farm'}],
        [{n:['B','B','A','A','G'],t:'E-I-E-I-O!'}],
        [{n:['D'],t:'And'},{n:['G'],t:'on'},{n:['G'],t:'that'},{n:['G'],t:'farm'},{n:['D'],t:'he'},{n:['E'],t:'had'},{n:['E'],t:'a'},{n:['D'],t:'cow'}],
        [{n:['B','B','A','A','G'],t:'E-I-E-I-O!'}]
      ],
      [
        [{n:['D'],t:'With'},{n:['D'],t:'a'},{n:['G'],t:'moo'},{n:['G'],t:'moo'},{n:['G'],t:'here'}],
        [{n:['D'],t:'And'},{n:['D'],t:'a'},{n:['G'],t:'moo'},{n:['G'],t:'moo'},{n:['G'],t:'there'}],
        [{n:['G'],t:'Here'},{n:['G'],t:'a'},{n:['G'],t:'moo'}],
        [{n:['G'],t:'There'},{n:['G'],t:'a'},{n:['G'],t:'moo'}],
        [{n:['G','G','G'],t:'Everywhere'},{n:['G'],t:'a'},{n:['G'],t:'moo'},{n:['G'],t:'moo'}]
      ],
      [
        [{n:['G'],t:'Old'},{n:['G','G','D'],t:'MacDonald'},{n:['E'],t:'had'},{n:['E'],t:'a'},{n:['D'],t:'farm'}],
        [{n:['B','B','A','A','G'],t:'E-I-E-I-O!'}]
      ]
    ]
  }
];

var currentSong = 0;
var currentVerse = 0;

function makeChip(token) {
  var info = NOTE_MAP[token] || {note:null, color:'#ccc'};
  var chip = document.createElement('span');
  chip.className = 'note-chip ' + (info.note ? 'playable' : 'no-audio');
  chip.textContent = token.replace('^', '\u2191');
  chip.style.background = info.color;
  if (info.note) {
    chip.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      initAudio().then(function() { playNote(info.note, 1.0); }).catch(function(){});
      chip.style.transform = 'scale(1.2)';
      chip.style.filter = 'brightness(1.35) drop-shadow(0 0 6px ' + info.color + ')';
      clearTimeout(chip._t);
      chip._t = setTimeout(function() { chip.style.transform = ''; chip.style.filter = ''; }, 220);
    });
  }
  return chip;
}

function renderVerse(verse) {
  var display = document.getElementById('section-display');
  display.innerHTML = '';
  verse.forEach(function(line) {
    var lineEl = document.createElement('div');
    lineEl.className = 'song-line';
    line.forEach(function(group) {
      var groupEl = document.createElement('div');
      groupEl.className = 'word-group';
      var chipsEl = document.createElement('div');
      chipsEl.className = 'note-chips';
      group.n.forEach(function(token) { chipsEl.appendChild(makeChip(token)); });
      var lyricEl = document.createElement('div');
      lyricEl.className = 'lyric';
      lyricEl.textContent = group.t;
      groupEl.appendChild(chipsEl);
      groupEl.appendChild(lyricEl);
      lineEl.appendChild(groupEl);
    });
    display.appendChild(lineEl);
  });
}

function renderDots() {
  var verses = SONGS[currentSong].verses;
  var ind = document.getElementById('verse-indicator');
  ind.innerHTML = '';
  verses.forEach(function(_, i) {
    var dot = document.createElement('div');
    dot.className = 'verse-dot' + (i === currentVerse ? ' active' : '');
    ind.appendChild(dot);
  });
}

function goTo(i) {
  var verses = SONGS[currentSong].verses;
  currentVerse = i;
  renderVerse(verses[currentVerse]);
  renderDots();
  document.getElementById('btn-prev').className = 'nav-arrow' + (currentVerse === 0 ? ' hidden' : '');
  document.getElementById('btn-next').className = 'nav-arrow' + (currentVerse === verses.length - 1 ? ' hidden' : '');
}

function loadSong(idx) {
  currentSong = idx;
  goTo(0);
}

function buildSelector() {
  var sel = document.getElementById('song-select');
  SONGS.forEach(function(song, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = song.title;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function() { loadSong(Number(sel.value)); });
}

document.getElementById('btn-prev').addEventListener('pointerdown', function(e) { e.preventDefault(); if (currentVerse > 0) goTo(currentVerse - 1); });
document.getElementById('btn-next').addEventListener('pointerdown', function(e) { e.preventDefault(); if (currentVerse < SONGS[currentSong].verses.length - 1) goTo(currentVerse + 1); });

buildSelector();
loadSong(0);

renderKeys(document.getElementById('keys-wrap'), function(i, note, keyEl) {
  initAudio().then(function() { playNote(note, 1.0); }).catch(function(){});
  glowKey(keyEl, 'hit');
});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='piano-lesson';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
