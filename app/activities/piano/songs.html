<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piano Songs</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;flex-direction:column;}
.nav-bar{flex-direction:row;justify-content:space-between;border-right:none;border-bottom:2px solid #ddd;padding:8px 16px;}
#song-selector-wrap{display:flex;align-items:center;justify-content:center;padding:6px 12px;flex-shrink:0;border-bottom:1px solid #eee;background:#fff8f0;}
#song-select{font-size:clamp(13px,3.5vw,16px);font-family:inherit;padding:4px 8px;border:2px solid #ddd;border-radius:8px;background:#fff;color:#333;cursor:pointer;}
#song-sheet{flex:1;overflow-y:auto;padding:16px 12px 32px;}
.verse{margin-bottom:24px;}
.verse+.verse{border-top:1px dashed #ddd;padding-top:20px;}
.song-line{display:flex;flex-wrap:wrap;gap:4px 8px;margin-bottom:10px;align-items:flex-end;justify-content:center;}
.word-group{display:flex;flex-direction:column;align-items:center;gap:4px;}
.note-chips{display:flex;gap:2px;}
.note-chip{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;border-radius:6px;font-size:10px;font-weight:bold;color:#333;border:1.5px solid rgba(0,0,0,0.12);padding:0 4px;white-space:nowrap;transition:transform 0.1s,filter 0.1s;}
.note-chip.playable{cursor:pointer;touch-action:none;}
.note-chip.no-audio{opacity:0.35;cursor:default;}
.lyric{font-size:clamp(13px,3.5vw,16px);color:#444;text-align:center;white-space:nowrap;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="&#127929; Songs" data-links='[{"label":"Lesson","href":"./lesson.html"},{"label":"Game &#9654;","href":"./game.html"}]'></div>
<div id="song-selector-wrap"><select id="song-select"></select></div>
<div id="song-sheet"></div>
<script src="../../shared/menu.js" defer></script>
<script src="../../../core/shared/utils.js"></script>
<script src="../../../core/piano/piano-core.js"></script>
<script src="../../../ui/shared/audio-ctx.js"></script>
<script src="../../../ui/piano/piano-ui.js"></script>
<script src="../../../ui/piano/piano-song-ui.js"></script>
<script>
loadPianoSongs('../../../assets/audio/songs/', function(songs) {
  initSongSheet(songs, document.getElementById('song-select'), document.getElementById('song-sheet'));
});
</script>
</body>
</html>
