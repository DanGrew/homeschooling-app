<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piano Game</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;}
.nav-bar{background:#16213e;border-right-color:#333;}
.nav-btn{background:#2a2a3e;color:#ccc;}
.activity-title{color:#eee;}
#controls{display:flex;gap:10px;align-items:center;justify-content:center;padding:6px 16px;flex-shrink:0;}
.ctrl-btn{font-size:1.3em;padding:8px 18px;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:bold;touch-action:manipulation;-webkit-touch-callout:none;}
#game-area{flex:1;position:relative;overflow:hidden;border-radius:12px;background:#16213e;margin:0 4px;min-height:80px;}
#hit-line{position:absolute;bottom:2px;left:0;right:0;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;}
#score-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:12px;}
#keys-wrap{height:min(220px,30vh);flex-shrink:0;padding:4px 4px 4px;gap:3px;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Piano Game" data-links='[{"label":"Lesson","href":"./lesson.html"}]' data-links-icon="lesson"></div>
<div class="game-area">
  <div id="controls">
    <button class="ctrl-btn" id="btn-play" style="background:#2ECC71;color:#fff;">&#9654; Play</button>
    <button class="ctrl-btn" id="btn-pause" style="background:#F39C12;color:#fff;display:none;">&#9646;&#9646; Pause</button>
    <button class="ctrl-btn" id="btn-stop" style="background:#E74C3C;color:#fff;display:none;">&#9646; Stop</button>
    <span id="score-display" style="font-size:1.2em;color:#eee;min-width:60px;text-align:center;"></span>
  </div>
  <div id="game-area">
    <div id="hit-line"></div>
    <div id="score-overlay">
      <div id="score-emoji" style="font-size:4em;"></div>
      <div id="score-text" style="font-size:1.8em;font-weight:bold;color:#fff;"></div>
      <div id="score-sub" style="font-size:1.1em;color:#ccc;"></div>
      <button id="btn-play-again" style="margin-top:8px;font-size:1.2em;padding:10px 28px;border:none;border-radius:12px;background:#2ECC71;color:#fff;font-family:inherit;font-weight:bold;cursor:pointer;touch-action:manipulation;">Play Again</button>
    </div>
  </div>
  <div id="keys-wrap"></div>
</div>
<script src="../../shared/menu.js" defer></script>
<script src="../../../core/shared/utils.js"></script>
<script src="../../../core/piano/piano-core.js"></script>
<script src="../../../ui/shared/audio-ctx.js"></script>
<script src="../../../ui/piano/piano-ui.js"></script>
<script type="module">
import '../../shared/speech-ui.js';
import { init } from '../../../ui/piano/piano-game-ui.js';
window.addEventListener('load', init);
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='piano-game';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
