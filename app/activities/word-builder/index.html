<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Word Builder</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Word Builder" data-instruction="Build the word you hear" data-no-links="lesson links coming soon"></div>
<div class="game-area" style="display:flex;flex-direction:column;align-items:center;gap:clamp(12px,3vmin,24px);padding:clamp(12px,3vmin,24px) 16px;">
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button id="wb-mode-distractors" style="padding:8px 18px;border-radius:20px;border:2px solid #1976d2;background:#1976d2;color:#fff;font-size:clamp(0.85em,2.5vmin,1.1em);font-weight:bold;cursor:pointer;">Word Letters</button>
    <button id="wb-mode-alphabet" style="padding:8px 18px;border-radius:20px;border:2px solid #bbb;background:#fff;color:#555;font-size:clamp(0.85em,2.5vmin,1.1em);font-weight:bold;cursor:pointer;">All Letters</button>
    <button id="wb-picture-toggle" style="padding:8px 18px;border-radius:20px;border:2px solid #bbb;background:#fff;color:#555;font-size:clamp(0.85em,2.5vmin,1.1em);font-weight:bold;cursor:pointer;">Hide picture</button>
  </div>
  <div id="wb-picture" style="display:flex;justify-content:center;">
    <img style="max-height:clamp(80px,20vmin,160px);max-width:clamp(80px,20vmin,160px);border-radius:12px;object-fit:contain;" src="" alt="">
  </div>
  <div id="wb-slots" style="display:flex;flex-wrap:wrap;gap:clamp(6px,2vmin,12px);justify-content:center;align-items:center;"></div>
  <div id="wb-tiles" style="display:flex;flex-wrap:wrap;gap:clamp(6px,1.5vmin,10px);justify-content:center;max-width:600px;"></div>
  <div id="wb-actions" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;"></div>
  <div id="paginator-bar"></div>
</div>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import { loadImages } from '../../../core/dictionary/dictionary-helpers-core.js';
import { buildFilterBar } from '../../../components/filter-bar/filter-bar-ui.js';
import { createPaginator } from '../../../components/pagination/paginator-ui.js';
import { init, startRound, setMode, togglePicture, setPicture } from '../../../ui/word-builder/word-builder-ui.js';
import { speak } from '../../../components/speech/speech-ui.js';
import { makeSpeakable } from '../../../components/speech/speakable.js';
import { initAudio, loadGraphemes } from '../../../components/phonics/phonics-service.js';
import { GuidanceService } from '../../../components/guidance/guidance-service.js';

Dictionary.init('../../../content/dictionary/');
initAudio();
loadGraphemes();
var all = [];
var currentFilter = [];

var PAGE_CTRL = {};
PAGE_CTRL['MODE_DISTRACTORS']   = function() { setModeUI('distractors'); };
PAGE_CTRL['MODE_ALPHABET']      = function() { setModeUI('alphabet'); };
PAGE_CTRL['SHOW_PICTURE']       = function() { setPicture(true); };
PAGE_CTRL['HIDE_PICTURE']       = function() { setPicture(false); };
PAGE_CTRL['PAGE_CONTROL_RESET'] = function() { setModeUI('distractors'); setPicture(true); paginator.reset(currentFilter); };

window.addEventListener('page:control', function(e) {
  [PAGE_CTRL[e.detail.type]].filter(Boolean).forEach(function(fn) { fn(); });
});

var paginator = createPaginator({
  container: document.getElementById('paginator-bar'),
  items: [],
  perPage: 1,
  wrap: true,
  onRender: function(item) { startRound(item); }
});

init(function(text) { speak(text); }, function() { paginator.next(); });
window.guidanceService = new GuidanceService();

loadImages(all, function() {
  all.forEach(function(item) {
    PAGE_CTRL['SET_WORD_' + item.name.toLowerCase().replace(/\s+/g, '_')] = function() { startRound(item); };
  });
  buildFilterBar(all, function(f) { currentFilter = f; paginator.reset(f); });
});

var modeD = document.getElementById('wb-mode-distractors');
var modeA = document.getElementById('wb-mode-alphabet');
var picBtn = document.getElementById('wb-picture-toggle');

var MODE_STYLES = {
  'true':  { background: '#1976d2', color: '#fff', borderColor: '#1976d2' },
  'false': { background: '#fff',    color: '#555', borderColor: '#bbb' }
};
var MODE_BTNS = {
  distractors: { active: function() { return modeD; }, inactive: function() { return modeA; } },
  alphabet:    { active: function() { return modeA; }, inactive: function() { return modeD; } }
};

function applyBtn(btn, isActive) { Object.assign(btn.style, MODE_STYLES[String(isActive)]); }

function setModeUI(mode) {
  applyBtn(MODE_BTNS[mode].active(), true);
  applyBtn(MODE_BTNS[mode].inactive(), false);
  setMode(mode);
}

makeSpeakable(modeD, 'Word Letters');
makeSpeakable(modeA, 'All Letters');
makeSpeakable(picBtn, function() { return picBtn.textContent; });

modeD.addEventListener('click', function() { setModeUI('distractors'); });
modeA.addEventListener('click', function() { setModeUI('alphabet'); });
picBtn.addEventListener('click', function() { togglePicture(); });
</script>
<script>window.ACTIVITY_ID = 'word-builder'; window.LEARNINGS_BASE = '../../../content/learnings/';</script>
<script type="module">import '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';</script>
</body>
</html>
