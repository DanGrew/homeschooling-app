<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Clocks — Set the Time</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<link rel="stylesheet" href="../../shared/speakable.css">
<script src="../../shared/menu.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#222;}
.nav-bar{flex-shrink:0;z-index:10;width:100%;background:#fff;border-bottom:2px solid #eee;}
#sky-area{flex:1;display:flex;flex-direction:row;overflow:hidden;background:linear-gradient(to bottom,#78909C,#CFD8DC);}
#clock-panel{flex:0 0 55%;position:relative;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
#sky-sun{position:absolute;display:none;width:clamp(44px,8vw,70px);height:clamp(44px,8vw,70px);border-radius:50%;background:radial-gradient(circle,#FFF176 30%,#FFD54F);box-shadow:0 0 clamp(20px,4vw,40px) #FFD54F;transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;}
#sky-moon{position:absolute;display:none;width:clamp(36px,6vw,56px);height:clamp(36px,6vw,56px);border-radius:50%;background:radial-gradient(circle,#FFFDE7 40%,#B0BEC5);box-shadow:0 0 clamp(12px,2.5vw,24px) rgba(255,255,255,0.5);transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;}
#arc-zone{flex:0 0 32%;width:100%;}
#clock-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(6px,1.5vh,14px);padding:0 8px 16px;}
#clock-container{border-radius:50%;}
#digital{display:flex;gap:16px;align-items:center;}
#digital-12h,#digital-24h{font-size:clamp(1.1em,4vw,1.8em);font-weight:bold;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.5);border-radius:8px;padding:2px 8px;}
#digital-sep{color:rgba(255,255,255,0.5);font-size:1.1em;}
#target-label{font-size:clamp(1em,3.5vw,1.4em);font-weight:bold;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.6);text-align:center;padding:6px 12px;background:rgba(0,0,0,0.25);border-radius:10px;margin-top:4px;}
#preset-buttons{flex:1;display:flex;flex-wrap:wrap;gap:8px;align-content:center;justify-content:center;padding:12px 12px 12px 4px;}
.preset-btn{width:calc(50% - 4px);padding:10px 6px;font-size:clamp(0.78em,2.4vw,0.98em);font-family:inherit;font-weight:bold;border:none;border-radius:14px;background:rgba(255,255,255,0.88);color:#333;cursor:pointer;touch-action:manipulation;user-select:none;text-align:center;transition:transform 0.1s;}
.preset-btn:active{transform:scale(0.95);}
.btn-wrong{animation:shake 0.35s ease-in-out;}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}100%{transform:translateX(0)}}
@media (max-width:500px){
  #sky-area{flex-direction:column;}
  #clock-panel{flex:0 0 auto;width:100%;}
  #arc-zone{flex:0 0 22%;}
  #clock-content{flex:0 0 auto;padding:8px 16px;}
  #preset-buttons{flex:0 0 auto;width:100%;padding:8px 16px 16px;align-content:flex-start;}
  .preset-btn{width:auto;padding:10px 12px;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Set the Time"></div>
<div id="sky-area">
  <div id="clock-panel">
    <div id="sky-sun"></div>
    <div id="sky-moon"></div>
    <div id="arc-zone"></div>
    <div id="clock-content">
      <div id="clock-container"></div>
      <div id="digital">
        <span id="digital-12h">--:-- --</span>
        <span id="digital-sep">|</span>
        <span id="digital-24h">--:--</span>
      </div>
      <div id="target-label">Loading…</div>
    </div>
  </div>
  <div id="preset-buttons"></div>
</div>
<script type="module">
import {hourToSky, nextDegrees} from '../../../core/clock/clock-core.js';
import {init as clockInit, setHandDeg} from '../../../ui/clock/clock-ui.js';
import {render as skyRender} from '../../../ui/clock/sky-ui.js';
import {render as digitalRender} from '../../../ui/clock/digital-ui.js';
import {speakInterrupt} from '../../../ui/speech/speech-ui.js';
import {showBanner, hideBanner} from '../../../ui/shared/success-banner.js';

var currentHour = 0;
var totalDeg = 0;
var targetIdx = 0;
var locked = false;
var presets = [];

clockInit(document.getElementById('clock-container'));

var LOCK = {
  'true':  function() {},
  'false': function(btn, preset) { CORRECT[String(presets.indexOf(preset) === targetIdx)](btn, preset); }
};

var CORRECT = {
  'true':  function(btn, preset) {
    locked = true;
    applyPreset(preset);
    speakInterrupt(preset.spoken);
    showBanner({ buttons: [{ label: 'Next →', onClick: function() { hideBanner(); nextRound(); } }] });
  },
  'false': function(btn) {
    btn.classList.remove('btn-wrong');
    void btn.offsetWidth;
    btn.classList.add('btn-wrong');
    btn.addEventListener('animationend', function h() { btn.classList.remove('btn-wrong'); btn.removeEventListener('animationend', h); });
  }
};

function applyPreset(preset) {
  totalDeg += nextDegrees(currentHour, preset.hour);
  currentHour = preset.hour;
  setHandDeg(totalDeg, 0);
  skyRender(hourToSky(preset.hour));
  digitalRender(preset.hour);
}

function nextRound() {
  locked = false;
  targetIdx = Math.floor(Math.random() * presets.length);
  var p = presets[targetIdx];
  document.getElementById('target-label').textContent = p.emoji + ' ' + p.label;
  speakInterrupt('Can you set the clock to ' + p.spoken + '?');
}

fetch('../../../assets/clock/presets.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    presets = data;
    var btns = document.getElementById('preset-buttons');
    presets.forEach(function(preset) {
      var btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = preset.emoji + ' ' + preset.label;
      btn.addEventListener('click', function() { LOCK[String(locked)](btn, preset); });
      btns.appendChild(btn);
    });
    nextRound();
  });
</script>
</body>
</html>
