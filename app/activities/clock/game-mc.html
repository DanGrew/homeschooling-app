<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Clocks — What Time Is It?</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#sky-area{flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;background:linear-gradient(to bottom,#78909C,#CFD8DC);}
#clock-panel{flex:0 0 55%;position:relative;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
#sky-sun{position:absolute;display:none;width:clamp(44px,8vw,70px);height:clamp(44px,8vw,70px);border-radius:50%;background:radial-gradient(circle,#FFF176 30%,#FFD54F);box-shadow:0 0 clamp(20px,4vw,40px) #FFD54F;transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;cursor:pointer;}
#sky-moon{position:absolute;display:none;width:clamp(36px,6vw,56px);height:clamp(36px,6vw,56px);border-radius:50%;background:radial-gradient(circle,#FFFDE7 40%,#B0BEC5);box-shadow:0 0 clamp(12px,2.5vw,24px) rgba(255,255,255,0.5);transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;cursor:pointer;}
#arc-zone{flex:0 0 32%;width:100%;}
#clock-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(6px,1.5vh,14px);padding:0 8px 16px;}
#clock-container{cursor:pointer;border-radius:50%;}
#digital{display:flex;gap:16px;align-items:center;}
#digital-12h,#digital-24h{font-size:clamp(1.1em,4vw,1.8em);font-weight:bold;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.5);cursor:pointer;border-radius:8px;padding:2px 8px;}
#digital-24h{border-left:2px solid rgba(255,255,255,0.5);padding-left:16px;}
#prompt{font-size:clamp(1em,3.5vw,1.4em);font-weight:bold;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.6);text-align:center;padding:6px 12px;background:rgba(0,0,0,0.25);border-radius:10px;margin-top:4px;cursor:pointer;}
#choice-panel{flex:1;display:flex;flex-direction:column;padding:12px 12px 12px 4px;gap:8px;justify-content:center;}
#choice-grid{display:flex;flex-wrap:wrap;gap:8px;flex:1;align-content:center;}
.btn-wrong{animation:shake 0.35s ease-in-out;}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}100%{transform:translateX(0)}}
@media (max-width:560px){
  #sky-area{flex-direction:column;}
  #clock-panel{flex:0 0 auto;width:100%;}
  #arc-zone{flex:0 0 22%;}
  #clock-content{flex:0 0 auto;padding:8px 16px;}
  #choice-panel{flex:0 0 auto;width:100%;padding:8px 16px 16px;}
  #choice-grid{align-content:flex-start;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="What Time Is It?" data-instruction="Tap the clock that shows the right time" data-links='[{"href":"./","label":"Clocks Lesson"}]' data-links-icon="lesson"></div>
<div class="game-area">
  <div id="sky-area">
    <div id="clock-panel">
      <div id="sky-sun"></div>
      <div id="sky-moon"></div>
      <div id="arc-zone"></div>
      <div id="clock-content">
        <div id="clock-container"></div>
        <div id="digital">
          <span id="digital-12h">--:-- --</span>
          <span id="digital-24h">--:--</span>
        </div>
        <div id="prompt">Choose the right time</div>
      </div>
    </div>
    <div id="choice-panel">
      <div id="choice-grid"></div>
    </div>
  </div>
</div>
<script type="module">
import {hourToSky, nextDegrees, generateChoices} from '../../../core/clock/clock-core.js';
import {init as clockInit, setHandDeg} from '../../../ui/clock/clock-ui.js';
import {render as skyRender} from '../../../ui/clock/sky-ui.js';
import {render as digitalRender} from '../../../ui/clock/digital-ui.js';
import {renderChoices} from '../../../ui/clock/choice-ui.js';
import {makeSpeakable, makeInteractive} from '../../../components/speech/speakable.js';
import {speak} from '../../../components/speech/speech-ui.js';
import {showBanner, hideBanner} from '../../../components/success-banner.js';

var currentHour = 0;
var totalDeg = 0;
var currentSpoken = 'Twelve o\'clock';
var currentSpoken24 = 'Twelve hundred';
var locked = false;
var presets = [];

clockInit(document.getElementById('clock-container'));

makeSpeakable(document.getElementById('sky-sun'),  'Sun');
makeSpeakable(document.getElementById('sky-moon'), 'Moon');
makeSpeakable(document.getElementById('prompt'),   'Choose the right time');
makeInteractive(document.getElementById('clock-container'), function() { speak(currentSpoken); });
makeInteractive(document.getElementById('digital-12h'),     function() { speak(currentSpoken); });
makeInteractive(document.getElementById('digital-24h'),     function() { speak(currentSpoken24); });

var LOCK = {
  'true':  function() {},
  'false': function(tile, isCorrect) { CORRECT[String(isCorrect)](tile); }
};

var CORRECT = {
  'true':  function() {
    locked = true;
    showBanner({ buttons: [{ label: 'Next →', onClick: function() { hideBanner(); nextRound(); } }] });
  },
  'false': function(tile) {
    tile.classList.remove('btn-wrong');
    void tile.offsetWidth;
    tile.classList.add('btn-wrong');
    tile.addEventListener('animationend', function h() { tile.classList.remove('btn-wrong'); tile.removeEventListener('animationend', h); });
  }
};

var PRESET_SPOKEN   = {'true': function(p){return p.spoken;},   'false': function(p){return p.label;}};
var PRESET_SPOKEN24 = {'true': function(p){return p.spoken24;}, 'false': function(p){return p.time;}};

function showPreset(preset) {
  var hour = parseInt(preset.time.split(':')[0], 10);
  totalDeg += nextDegrees(currentHour, hour);
  currentHour = hour;
  currentSpoken   = PRESET_SPOKEN[String(!!preset.spoken)](preset);
  currentSpoken24 = PRESET_SPOKEN24[String(!!preset.spoken24)](preset);
  setHandDeg(totalDeg, 0);
  skyRender(hourToSky(hour));
  digitalRender(hour);
}

function nextRound() {
  locked = false;
  var correctIdx = Math.floor(Math.random() * presets.length);
  var indices = generateChoices(presets, correctIdx, 4);
  showPreset(presets[correctIdx]);
  renderChoices(
    document.getElementById('choice-grid'),
    presets, indices, correctIdx,
    function(tile, isCorrect) { LOCK[String(locked)](tile, isCorrect); }
  );
}

var DEFAULT_PROFILE = 'times_of_day';

fetch('../../../content/clock/profiles/' + DEFAULT_PROFILE + '.json')
  .then(function(r) { return r.json(); })
  .then(function(profile) {
    presets = profile.presets;
    nextRound();
  });
</script>
</body>
</html>
