<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Clocks</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script>
  window.ACTIVITY_ID = 'clock';
  window.DICT_BASE = '../../../content/dictionary/entries/';
</script>
<script src="../../../components/menu.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#sky-area{flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;background:linear-gradient(to bottom,#78909C,#CFD8DC);}
#clock-panel{flex:0 0 55%;position:relative;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
#sky-sun{position:absolute;display:none;width:clamp(44px,8vw,70px);height:clamp(44px,8vw,70px);border-radius:50%;background:radial-gradient(circle,#FFF176 30%,#FFD54F);box-shadow:0 0 clamp(20px,4vw,40px) #FFD54F;transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;cursor:pointer;}
#sky-moon{position:absolute;display:none;width:clamp(36px,6vw,56px);height:clamp(36px,6vw,56px);border-radius:50%;background:radial-gradient(circle,#FFFDE7 40%,#B0BEC5);box-shadow:0 0 clamp(12px,2.5vw,24px) rgba(255,255,255,0.5);transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;cursor:pointer;}
#arc-zone{flex:0 0 32%;width:100%;}
#clock-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(6px,1.5vh,14px);padding:0 8px 16px;}
#clock-container{cursor:pointer;border-radius:50%;}
#digital{display:flex;gap:16px;align-items:center;}
#digital-12h,#digital-24h{font-size:clamp(1.1em,4vw,1.8em);font-weight:bold;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.5);cursor:pointer;border-radius:8px;padding:2px 8px;}
#digital-24h{border-left:2px solid rgba(255,255,255,0.5);padding-left:16px;}
#preset-panel{flex:1;display:flex;flex-direction:column;}
#profile-title{width:100%;text-align:center;font-weight:bold;color:#fff;font-size:clamp(1em,3.5vw,1.3em);padding:6px 8px;cursor:pointer;user-select:none;-webkit-touch-callout:none;}
#preset-buttons{flex:1;display:flex;flex-wrap:wrap;gap:8px;align-content:center;justify-content:center;padding:12px 12px 12px 4px;}
.preset-btn{width:calc(50% - 4px);padding:10px 6px;font-size:clamp(0.78em,2.4vw,0.98em);font-family:inherit;font-weight:bold;border:none;border-radius:14px;background:rgba(255,255,255,0.88);color:#333;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.preset-btn:active{transform:scale(0.95);}
@media (max-width:560px){
  #sky-area{flex-direction:column;}
  #clock-panel{flex:0 0 auto;width:100%;}
  #arc-zone{flex:0 0 22%;}
  #clock-content{flex:0 0 auto;padding:8px 16px;}
  #preset-panel{flex:0 0 auto;width:100%;}
  #preset-buttons{padding:4px 16px 16px;align-content:flex-start;}
  .preset-btn{width:auto;padding:10px 12px;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Clocks" data-instruction="Watch and learn how to read the time" data-no-links="game removed"></div>
<div class="game-area">
  <div id="sky-area">
    <div id="clock-panel">
      <div id="sky-sun"></div>
      <div id="sky-moon"></div>
      <div id="arc-zone"></div>
      <div id="clock-content">
        <div id="profile-title" class="speakable"></div>
        <div id="clock-container"></div>
        <div id="digital">
          <span id="digital-12h">--:-- --</span>
          <span id="digital-24h">--:--</span>
        </div>
      </div>
    </div>
    <div id="preset-panel">
      <div id="preset-buttons"></div>
    </div>
  </div>
</div>
<script type="module">
import {hourToSky, nextDegrees, parseTime, nextMinuteDeg, presetSkyColour} from '../../../core/clock/clock-core.js';
import {init as clockInit, setHandDeg} from '../../../ui/clock/clock-ui.js';
import {render as skyRender} from '../../../ui/clock/sky-ui.js';
import {render as digitalRender} from '../../../ui/clock/digital-ui.js';
import {makeSpeakable, makeInteractive} from '../../../components/speech/speakable.js';
import {speakInterrupt} from '../../../components/speech/speech-ui.js';
import {buildSimpleFilterBar} from '../../../components/filter-bar/filter-bar-ui.js';

var currentHour = 0;
var currentMinute = 0;
var totalDeg = 0;
var totalMinuteDeg = 0;
var defaultPresets = [];
var _HOUR12_WORDS  = ['twelve','one','two','three','four','five','six','seven','eight','nine','ten','eleven'];
var _HOUR24_WORDS  = ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty','twenty one','twenty two','twenty three'];
var _MIN_WORDS     = ['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty','twenty one','twenty two','twenty three','twenty four','twenty five','twenty six','twenty seven','twenty eight','twenty nine','thirty','thirty one','thirty two','thirty three','thirty four','thirty five','thirty six','thirty seven','thirty eight','thirty nine','forty','forty one','forty two','forty three','forty four','forty five','forty six','forty seven','forty eight','forty nine','fifty','fifty one','fifty two','fifty three','fifty four','fifty five','fifty six','fifty seven','fifty eight','fifty nine'];
var _MIN_OCLOCK    = {0: 'o\'clock'};
var _MIN_HUNDRED   = {0: 'hundred'};
var _AMPM_WORDS    = ['AM','AM','AM','AM','AM','AM','AM','AM','AM','AM','AM','AM','PM','PM','PM','PM','PM','PM','PM','PM','PM','PM','PM','PM'];
function _clockSpoken12() { return _HOUR12_WORDS[currentHour%12]+' '+[_MIN_OCLOCK[currentMinute],_MIN_WORDS[currentMinute]].filter(Boolean)[0]+' '+_AMPM_WORDS[currentHour]; }
function _clockSpoken24() { return _HOUR24_WORDS[currentHour]+' '+[_MIN_HUNDRED[currentMinute],_MIN_WORDS[currentMinute]].filter(Boolean)[0]; }

clockInit(document.getElementById('clock-container'));

function tapNumeral(n) {
  var targetMin = (parseInt(n, 10) % 12) * 5;
  var prevRev = Math.floor(totalMinuteDeg / 360);
  totalMinuteDeg += nextMinuteDeg(currentMinute, targetMin);
  currentMinute = targetMin;
  var hourSteps = Math.floor(totalMinuteDeg / 360) - prevRev;
  totalDeg += hourSteps * 30;
  currentHour = (currentHour + hourSteps) % 24;
  setHandDeg(totalDeg, totalMinuteDeg);
  digitalRender(currentHour, currentMinute);
}

document.querySelectorAll('[data-num]').forEach(function(el) {
  makeInteractive(el, function() {
    speakInterrupt(el.dataset.num);
    tapNumeral(el.dataset.num);
  });
  el.addEventListener('click', function(e) { e.stopPropagation(); });
});

makeSpeakable(document.getElementById('sky-sun'),  'Sun');
makeSpeakable(document.getElementById('sky-moon'), 'Moon');
makeInteractive(document.getElementById('digital-12h'),     function() { speakInterrupt(_clockSpoken12()); });
makeInteractive(document.getElementById('digital-24h'),     function() { speakInterrupt(_clockSpoken24()); });
makeInteractive(document.getElementById('clock-container'), function() { speakInterrupt(_clockSpoken12()); });

function showPresetTime(preset) {
  var parsed = parseTime(preset.time);
  var hour = parsed.hour;
  var minute = parsed.minute;
  totalDeg += nextDegrees(currentHour, hour);
  currentHour = hour;
  var minuteDelta = nextMinuteDeg(currentMinute, minute);
  currentMinute = minute;
  totalMinuteDeg += minuteDelta;
  setHandDeg(totalDeg, totalMinuteDeg);
  skyRender(hourToSky(hour));
  digitalRender(hour, minute);
}

function pressPreset(preset) {
  showPresetTime(preset);
}

function renderPresetButtons(presets) {
  var btns = document.getElementById('preset-buttons');
  btns.innerHTML = '';
  presets.forEach(function(preset) {
    var btn = document.createElement('button');
    btn.className = 'preset-btn';
    var sky = presetSkyColour(preset.time);
    btn.style.background = sky.bg;
    btn.style.color = sky.fg;
    [preset.emoji].filter(Boolean).forEach(function(e) {
      var span = document.createElement('span');
      span.style.fontSize = '2em';
      span.style.lineHeight = '1';
      span.textContent = e;
      btn.appendChild(span);
    });
    var label = document.createElement('span');
    label.textContent = preset.label;
    btn.appendChild(label);
    makeSpeakable(btn, preset.label);
    btn.addEventListener('click', function() { pressPreset(preset); });
    btns.appendChild(btn);
  });
}

var DEFAULT_PROFILE = 'times_of_day';
var _manifestOptions = [];
var _profileLoaders = {};

function buildProfileFilter() {
  buildSimpleFilterBar(_manifestOptions, function(profileId) {
    _profileLoaders[profileId]();
    [_manifestOptions.find(function(o) { return o.value === profileId; })].filter(Boolean).forEach(function(o) {
      profileTitleEl.textContent = o.label;
    });
  }, DEFAULT_PROFILE);
  profileTitleEl.textContent = _manifestOptions[0].label;
}

fetch('../../../content/clock/profiles/manifest.json')
  .then(function(r) { return r.json(); })
  .then(function(manifest) {
    _manifestOptions = manifest.map(function(m) { return {value: m.id, label: m.label, icon: m.icon}; });
    manifest.forEach(function(m) {
      _profileLoaders[m.id] = function() {
        fetch('../../../content/clock/profiles/' + m.id + '.json')
          .then(function(r) { return r.json(); })
          .then(function(profile) { renderPresetButtons(profile.presets); });
      };
    });
    return fetch('../../../content/clock/profiles/' + DEFAULT_PROFILE + '.json');
  })
  .then(function(r) { return r.json(); })
  .then(function(profile) {
    defaultPresets = profile.presets;
    renderPresetButtons(defaultPresets);
    buildProfileFilter();
  });

var profileTitleEl = document.getElementById('profile-title');
makeInteractive(profileTitleEl, function() { speakInterrupt(profileTitleEl.textContent); });
</script>
</body>
</html>
