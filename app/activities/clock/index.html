<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Clocks — Lesson</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script>
  window.DICT_BASE = '../../../content/dictionary/entries/';
  window.LESSONS = [
    {id:'count_the_clock',  number:1, title:'Count the Clock'},
    {id:'find_the_number',  number:2, title:'Find the Number'},
    {id:'long_and_short',   number:3, title:'Long Hand, Short Hand'},
    {id:'times_of_day',     number:4, title:'Times of Day'},
    {id:'morning_to_night', number:5, title:'Morning to Night'}
  ];
</script>
<script src="../../../components/menu.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#sky-area{flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;background:linear-gradient(to bottom,#78909C,#CFD8DC);}
#clock-panel{flex:0 0 55%;position:relative;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
#sky-sun{position:absolute;display:none;width:clamp(44px,8vw,70px);height:clamp(44px,8vw,70px);border-radius:50%;background:radial-gradient(circle,#FFF176 30%,#FFD54F);box-shadow:0 0 clamp(20px,4vw,40px) #FFD54F;transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;cursor:pointer;}
#sky-moon{position:absolute;display:none;width:clamp(36px,6vw,56px);height:clamp(36px,6vw,56px);border-radius:50%;background:radial-gradient(circle,#FFFDE7 40%,#B0BEC5);box-shadow:0 0 clamp(12px,2.5vw,24px) rgba(255,255,255,0.5);transform:translate(-50%,-50%);transition:left 0.8s ease-in-out,top 0.8s ease-in-out;cursor:pointer;}
#arc-zone{flex:0 0 32%;width:100%;}
#clock-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(6px,1.5vh,14px);padding:0 8px 16px;}
#clock-container{cursor:pointer;border-radius:50%;}
#digital{display:flex;gap:16px;align-items:center;}
#digital-12h,#digital-24h{font-size:clamp(1.1em,4vw,1.8em);font-weight:bold;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.5);cursor:pointer;border-radius:8px;padding:2px 8px;}
#digital-sep{color:rgba(255,255,255,0.5);font-size:1.1em;}
#preset-buttons{flex:1;display:flex;flex-wrap:wrap;gap:8px;align-content:center;justify-content:center;padding:12px 12px 12px 4px;}
.preset-btn{width:calc(50% - 4px);padding:10px 6px;font-size:clamp(0.78em,2.4vw,0.98em);font-family:inherit;font-weight:bold;border:none;border-radius:14px;background:rgba(255,255,255,0.88);color:#333;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;text-align:center;}
.preset-btn:active{transform:scale(0.95);}
@media (max-width:560px){
  #sky-area{flex-direction:column;}
  #clock-panel{flex:0 0 auto;width:100%;}
  #arc-zone{flex:0 0 22%;}
  #clock-content{flex:0 0 auto;padding:8px 16px;}
  #preset-buttons{flex:0 0 auto;width:100%;padding:8px 16px 16px;align-content:flex-start;}
  .preset-btn{width:auto;padding:10px 12px;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Clocks" data-links='[{"href":"game-mc.html","label":"What Time Is It?"}]'></div>
<div class="game-area">
  <div id="sky-area">
    <div id="clock-panel">
      <div id="sky-sun"></div>
      <div id="sky-moon"></div>
      <div id="arc-zone"></div>
      <div id="clock-content">
        <div id="clock-container"></div>
        <div id="digital">
          <span id="digital-12h">--:-- --</span>
          <span id="digital-sep">|</span>
          <span id="digital-24h">--:--</span>
        </div>
      </div>
    </div>
    <div id="preset-buttons"></div>
  </div>
</div>
<script type="module">
import {hourToSky, nextDegrees} from '../../../core/clock/clock-core.js';
import {init as clockInit, setHandDeg} from '../../../ui/clock/clock-ui.js';
import {render as skyRender} from '../../../ui/clock/sky-ui.js';
import {render as digitalRender} from '../../../ui/clock/digital-ui.js';
import {makeSpeakable, makeInteractive} from '../../../components/speech/speakable.js';
import {speak} from '../../../components/speech/speech-ui.js';
import {GuidanceService} from '../../../components/guidance/guidance-service.js';

var currentHour = 0;
var totalDeg = 0;
var currentSpoken = 'Twelve o\'clock';
var currentSpoken24 = 'Twelve hundred';

function emit(type) {
  window.dispatchEvent(new CustomEvent('guidance:event', {detail: {type: type}}));
}

clockInit(document.getElementById('clock-container'));

var SPEAK_NUM = {
  '0': function(num) { speak(num); },
  '1': function()    {}
};

document.querySelectorAll('[data-num]').forEach(function(el) {
  makeInteractive(el, function() {
    var n = [window.guidanceService].filter(Boolean).map(function(s) { return s._lesson; }).filter(Boolean).length;
    SPEAK_NUM[String(n)](el.dataset.num);
    emit('NUMBER_' + el.dataset.num + '_TAPPED');
  });
  el.addEventListener('click', function(e) { e.stopPropagation(); });
});

document.querySelector('[data-hand="minute"]').addEventListener('click', function(e) {
  e.stopPropagation();
  emit('MINUTE_HAND_TAPPED');
});
document.querySelector('[data-hand="hour"]').addEventListener('click', function(e) {
  e.stopPropagation();
  emit('HOUR_HAND_TAPPED');
});

makeSpeakable(document.getElementById('sky-sun'),  'Sun');
makeSpeakable(document.getElementById('sky-moon'), 'Moon');
makeInteractive(document.getElementById('digital-12h'),     function() { speak(currentSpoken); });
makeInteractive(document.getElementById('digital-24h'),     function() { speak(currentSpoken24); });
makeInteractive(document.getElementById('clock-container'), function() { speak(currentSpoken); });

function pressPreset(preset) {
  totalDeg += nextDegrees(currentHour, preset.hour);
  currentHour = preset.hour;
  currentSpoken = preset.spoken;
  currentSpoken24 = preset.spoken24;
  setHandDeg(totalDeg, 0);
  skyRender(hourToSky(preset.hour));
  digitalRender(preset.hour);
  emit('PRESET_' + preset.label.toUpperCase() + '_SELECTED');
}

fetch('../../../content/clock/presets.json')
  .then(function(r) { return r.json(); })
  .then(function(presets) {
    var btns = document.getElementById('preset-buttons');
    presets.forEach(function(preset) {
      var btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = preset.emoji + ' ' + preset.label;
      makeSpeakable(btn, preset.label);
      btn.addEventListener('click', function() { pressPreset(preset); });
      btns.appendChild(btn);
    });
  });

fetch('../../../content/lessons/clock.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    window.LESSON_MAP = {};
    data.lessons.forEach(function(l) { window.LESSON_MAP[l.id] = l; });
    window.guidanceService = new GuidanceService();
  });
</script>
</body>
</html>
