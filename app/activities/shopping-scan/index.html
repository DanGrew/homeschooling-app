<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shopping Scan</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/theme.css">
<link rel="stylesheet" href="/homeschooling-app/app/shared/style.css">
<link rel="stylesheet" href="/homeschooling-app/app/shared/shopping-shared.css">
<script src="/homeschooling-app/app/shared/menu.js" defer></script>
<style>
#btn-scan-it{background:#9B59B6;}
#scan-unavailable{font-size:0.75em;color:#bbb;text-align:center;}
#phase-scan{display:none;flex:1;flex-direction:row;overflow:hidden;}
#scan-video-wrap{flex:1;background:#111;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#scan-video{width:100%;height:100%;object-fit:cover;}
#scan-aim{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:110px;border:3px solid #27AE60;border-radius:10px;pointer-events:none;}
#scan-stub{display:none;flex-direction:column;align-items:center;gap:14px;padding:24px;color:#fff;text-align:center;}
#scan-stub p{font-size:0.95em;opacity:0.8;max-width:260px;}
#scan-stub-row{display:flex;gap:8px;}
#stub-input{padding:10px 12px;border:none;border-radius:10px;font-family:inherit;font-size:1em;width:160px;}
#stub-btn{padding:10px 16px;border:none;border-radius:10px;font-family:inherit;font-size:1em;cursor:pointer;background:#27AE60;color:#fff;}
#scan-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);background:rgba(39,174,96,0.96);color:#fff;padding:20px 36px;border-radius:20px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;text-align:center;}
#scan-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#scan-toast-icon{font-size:2.2em;line-height:1.2;}
#scan-toast-name{font-size:1em;font-weight:bold;margin-top:6px;}
#scan-toast-tick{font-size:1.6em;margin-top:4px;}
#scan-checklist{width:220px;display:flex;flex-direction:column;border-left:2px solid #eee;background:#fffdf8;overflow:hidden;}
#scan-checklist-title{padding:12px 14px 6px;font-size:1.1em;font-weight:bold;color:#333;flex-shrink:0;}
#scan-checklist-items{flex:1;overflow-y:auto;padding:6px 10px;}
.sc-row{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:6px;border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.sc-row.found{background:#f0fff4;}
.sc-row.crossed{background:#fff5f5;}
.sc-tick{font-size:1.1em;width:20px;text-align:center;flex-shrink:0;color:#bbb;}
.sc-row.found .sc-tick{color:inherit;}
.sc-row.crossed .sc-tick{color:#E74C3C;}
.sc-icon{font-size:1.3em;flex-shrink:0;}
.sc-name{flex:1;font-size:0.9em;color:#333;}
.sc-row.found .sc-name{text-decoration:line-through;color:#aaa;}
.sc-row.crossed .sc-name{text-decoration:line-through;color:#aaa;}
.btn-not-here{padding:3px 7px;border:none;border-radius:8px;font-family:inherit;font-size:0.75em;cursor:pointer;background:#E74C3C;color:#fff;flex-shrink:0;}
.sc-row.found .btn-not-here{display:none;}
@media(orientation:portrait){
  #scan-checklist{width:160px;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="/homeschooling-app/app/games/"></div>
<div class="game-area">
  <div id="filter-bar"></div>
  <div id="phase1">
    <div id="game-body">
      <div id="catalog-area">
        <div id="catalog-title">Choose items for your list:</div>
        <div id="tiles-scroll"><div id="tiles"></div></div>
      </div>
      <div id="list-panel">
        <div id="list-header">🛒 My List</div>
        <div id="list-items"><div id="empty-list">Tap items to add them</div></div>
      </div>
    </div>
    <div id="go-bar">
      <button class="btn-go" id="btn-find" disabled>Find it! 🔍</button>
      <button class="btn-go" id="btn-scan-it" disabled>Scan it! 📷</button>
      <div id="scan-unavailable"></div>
    </div>
  </div>
  <div id="phase2">
    <div id="phase2-title">Find each item! 🔍</div>
    <div id="find-list"></div>
  </div>
  <div id="phase-scan">
    <div id="scan-video-wrap">
      <video id="scan-video" autoplay playsinline muted></video>
      <div id="scan-aim"></div>
      <div id="scan-stub">
        <p>No camera/BarcodeDetector — type a barcode to simulate a scan:</p>
        <div id="scan-stub-row">
          <input id="stub-input" type="text" placeholder="e.g. 00348188">
          <button id="stub-btn">Scan</button>
        </div>
      </div>
      <div id="scan-toast"><div id="scan-toast-icon"></div><div id="scan-toast-name"></div><div id="scan-toast-tick">✅</div></div>
    </div>
    <div id="scan-checklist">
      <div id="scan-checklist-title">Scan each item! 📷</div>
      <div id="scan-checklist-items"></div>
    </div>
  </div>
</div>
<div id="success-banner">
  ✅
  <span style="font-size:0.65em;margin-top:8px;">Well done!</span>
  <button id="btn-again">Play Again!</button>
</div>
<script src="/homeschooling-app/app/shared/shopping-shared.js"></script>
<script type="module">
import { buildFilterBar } from '/homeschooling-app/app/shared/filter-bar.js';
var hasDetector=typeof BarcodeDetector!=='undefined';
var CATALOGS=[{"name":"My Catalog","items":[{"barcode":"00348188","name":"Milk","icon":"🥛"},{"barcode":"00907897","name":"Sauce - BBQ","icon":"🥫"},{"barcode":"00556293","name":"Boule","icon":"🍞"},{"barcode":"00580458","name":"Organic Butter","icon":"🧈"},{"barcode":"5010044005126","name":"Crumpets","icon":"🛒"},{"barcode":"5000157150974","name":"Beans","icon":"🥫"},{"barcode":"5060107330764","name":"Orange Breakie","icon":"🍊"},{"barcode":"5060107330740","name":"Purple Breakie","icon":"🛒"},{"barcode":"5060503504073","name":"Pouch - Pulled Pork","icon":"🥩"},{"barcode":"5060107337879","name":"Pouch - Cottage Pie","icon":"🥣"}]}];
var scanStream=null,scanInterval=null,scanFound=0,scanCrossed=0,scanTotal=0;

document.getElementById('btn-find').onclick=startFindPhase;

document.getElementById('btn-scan-it').onclick=function(){
  hidePhase1();
  var ps=document.getElementById('phase-scan');
  ps.style.display='flex';
  var ci=document.getElementById('scan-checklist-items');
  ci.innerHTML='';
  var barcodeMap={};
  scanFound=0;scanCrossed=0;
  scanTotal=listItems.length;
  listItems.slice().sort(byName).forEach(function(it){
    var row=document.createElement('div');
    row.className='sc-row';
    row.innerHTML='<span class="sc-tick">☐</span><span class="sc-icon">'+it.icon+'</span><span class="sc-name">'+escHtml(it.name)+'</span><button class="btn-not-here">Not here ✕</button>';
    var notHereBtn=row.querySelector('.btn-not-here');
    notHereBtn.onclick=function(){
      if(row.classList.contains('found'))return;
      if(row.classList.contains('crossed')){
        row.classList.remove('crossed');row.querySelector('.sc-tick').textContent='☐';
        scanCrossed--;notHereBtn.textContent='Not here ✕';
      }else{
        row.classList.add('crossed');row.querySelector('.sc-tick').textContent='✕';
        scanCrossed++;notHereBtn.textContent='Undo';
        if(scanFound+scanCrossed===scanTotal){stopScan();setTimeout(showSuccess,600);}
      }
    };
    barcodeMap[it.barcode]={row:row,name:it.name,icon:it.icon};
    ci.appendChild(row);
  });

  function matchBarcode(value){
    var entry=barcodeMap[value];
    if(entry&&!entry.row.classList.contains('found')){
      entry.row.classList.add('found');
      entry.row.querySelector('.sc-tick').textContent='✅';
      beep();
      showScanToast(entry.icon,entry.name);
      scanFound++;
      if(scanFound+scanCrossed===scanTotal){stopScan();setTimeout(showSuccess,600);}
    }
  }

  if(!hasDetector){
    document.getElementById('scan-stub').style.display='flex';
    var input=document.getElementById('stub-input');
    input.value='';
    document.getElementById('stub-btn').onclick=function(){
      matchBarcode(input.value.trim());
      input.value='';
      input.focus();
    };
    input.onkeydown=function(e){if(e.key==='Enter')document.getElementById('stub-btn').click();};
    return;
  }

  var detector=new BarcodeDetector();
  var v=document.getElementById('scan-video');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(s){
    scanStream=s;
    v.srcObject=s;
    scanInterval=setInterval(function(){
      if(v.readyState<2)return;
      detector.detect(v).then(function(codes){
        codes.forEach(function(c){matchBarcode(c.rawValue);});
      }).catch(function(){});
    },500);
  }).catch(function(e){
    document.getElementById('scan-checklist-title').textContent='Camera error: '+e.message;
  });
};

function stopScan(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(function(t){t.stop();});scanStream=null;}
  document.getElementById('scan-video').srcObject=null;
}

function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start();o.stop(ctx.currentTime+0.25);
  }catch(e){}
}

var _toastTimer=null;
function showScanToast(icon,name){
  var t=document.getElementById('scan-toast');
  document.getElementById('scan-toast-icon').textContent=icon;
  document.getElementById('scan-toast-name').textContent=name;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('show');},1500);
}

document.getElementById('btn-again').onclick=function(){
  stopScan();
  document.getElementById('success-banner').style.display='none';
  document.getElementById('phase2').style.display='none';
  document.getElementById('phase-scan').style.display='none';
  document.getElementById('scan-stub').style.display='none';
  listItems=[];scanFound=0;scanCrossed=0;
  showPhase1();
  renderList();
  renderTiles(allItems);
};

if(!hasDetector){
  document.getElementById('scan-unavailable').textContent='No camera — stub mode active';
}

function initGame(){
  allItems=flattenCatalogs(CATALOGS);
  buildFilterBar(CATALOGS.map(function(c){return{tags:c.tags||[],name:c.name};}),function(filtered){
    var items=[];
    filtered.forEach(function(c){
      CATALOGS.forEach(function(cat){
        if(cat.name===c.name)items=items.concat(cat.items.map(function(it){return{name:it.name,barcode:it.barcode,icon:it.icon,tags:cat.tags||[],catalog:cat.name};}));
      });
    });
    allItems=items;
    listItems=listItems.filter(function(li){return items.some(function(i){return i.barcode===li.barcode;});});
    renderTiles(allItems);
    renderList();
  });
}

initGame();
</script>
</body>
</html>
