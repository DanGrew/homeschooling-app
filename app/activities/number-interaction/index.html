<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Number Play</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Numbers" data-instruction="Use + and − to change each group. See how the total changes!" data-instruction-id="ni-instruction" data-no-links="standalone lesson"></div>
<div class="game-area">
<div style="flex:1;display:flex;flex-direction:row;overflow:hidden;">

  <div id="area-a" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-right:2px solid #DDD;padding:12px 10px;">
    <div id="lbl-a" style="font-size:0.9em;font-weight:bold;color:#AAA;letter-spacing:3px;touch-action:manipulation;user-select:none;"></div>
    <div id="objects-a" style="background:#EBEBEB;border:6px solid transparent;border-radius:20px;height:min(300px,42vh);width:calc(100% - 16px);display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:6px;overflow:hidden;padding:10px;box-sizing:border-box;transition:border-color 0.3s;"></div>
    <div id="num-a" style="font-size:min(3.2em,8vw);font-weight:bold;line-height:1;color:#333;">0</div>
    <div style="display:flex;gap:8px;">
      <button id="btn-a-plus" style="width:min(58px,7.5vw);height:min(58px,7.5vw);font-size:min(1.9em,4.8vw);border:none;border-radius:14px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;">+</button>
      <button id="btn-a-minus" style="width:min(58px,7.5vw);height:min(58px,7.5vw);font-size:min(1.9em,4.8vw);border:none;border-radius:14px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;">−</button>
    </div>
  </div>

  <div id="area-b" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-right:2px solid #DDD;padding:12px 10px;">
    <div id="lbl-b" style="font-size:0.9em;font-weight:bold;color:#AAA;letter-spacing:3px;touch-action:manipulation;user-select:none;"></div>
    <div id="objects-b" style="background:#EBEBEB;border:6px solid transparent;border-radius:20px;height:min(300px,42vh);width:calc(100% - 16px);display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:6px;overflow:hidden;padding:10px;box-sizing:border-box;transition:border-color 0.3s;"></div>
    <div id="num-b" style="font-size:min(3.2em,8vw);font-weight:bold;line-height:1;color:#333;">0</div>
    <div style="display:flex;gap:8px;">
      <button id="btn-b-plus" style="width:min(58px,7.5vw);height:min(58px,7.5vw);font-size:min(1.9em,4.8vw);border:none;border-radius:14px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;">+</button>
      <button id="btn-b-minus" style="width:min(58px,7.5vw);height:min(58px,7.5vw);font-size:min(1.9em,4.8vw);border:none;border-radius:14px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;">−</button>
    </div>
  </div>

  <div id="area-total" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px 10px;">
    <div id="lbl-total" style="font-size:0.9em;font-weight:bold;color:#AAA;letter-spacing:3px;touch-action:manipulation;user-select:none;">Total</div>
    <div id="objects-total" style="background:#EBEBEB;border-radius:20px;height:min(300px,42vh);width:calc(100% - 16px);display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:5px;overflow:hidden;padding:10px;box-sizing:border-box;"></div>
    <div id="num-total" style="font-size:min(3.2em,8vw);font-weight:bold;line-height:1;color:#333;">0</div>
    <div style="height:min(58px,7.5vw);"></div>
  </div>

</div>
</div>
<script type="module">
import '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import { loadImages } from '../../../core/dictionary/dictionary-helpers-core.js';
import { pickFruitPair, pluralize } from '../../../core/number-interaction/number-interaction-core.js';
import { init, change, countAll } from '../../../ui/number-interaction/number-interaction-ui.js';

Dictionary.init('../../../content/dictionary/');

const all = [];
loadImages(all, () => {
  const fruits = all.filter(w => w.tags.includes('fruit'));
  const [a, b] = pickFruitPair(fruits);
  init(a, b, 10);
  window.LESSON_VARS = {
    fruit_a: a.name.toLowerCase(),
    fruit_b: b.name.toLowerCase(),
    fruit_a_p: pluralize(a.name.toLowerCase()),
    fruit_b_p: pluralize(b.name.toLowerCase())
  };
  document.body.dataset.ready = 'true';
});

window.change = change;
window.countAll = countAll;
</script>
<script>
  window.DICT_BASE='../../../content/dictionary/entries/';
  window.ACTIVITY_ID='number-interaction';
  window.LESSONS=[
    {id:'make_three',number:1,title:'Make Three'},
    {id:'make_five',number:2,title:'Make Five'},
    {id:'equal_groups',number:3,title:'Equal Groups'},
    {id:'count_to_ten',number:4,title:'Count to Ten'},
    {id:'more_and_fewer',number:5,title:'More and Fewer'}
  ];
</script>
<script type="module">
  import{GuidanceService}from'../../../components/guidance/guidance-service.js';
  fetch('../../../content/lessons/number-interaction.json')
    .then(function(r){return r.json();})
    .then(function(data){
      window.LESSON_MAP={};
      data.lessons.forEach(function(l){window.LESSON_MAP[l.id]=l;});
      window.guidanceService=new GuidanceService();
    });
</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
