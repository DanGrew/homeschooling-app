<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Colour</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<script src="../../shared/menu.js" defer></script>
<script src="../../shared/colouring-common.js"></script>
<script src="../../shared/shapes.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/"></div>
<div class="game-area">
  <div class="game-title">Match the colour!</div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div id="shape"></div>
  </div>
  <div id="swatches" style="display:flex;justify-content:center;gap:22px;padding:20px 20px 44px;flex-wrap:wrap;"></div>
</div>
<script>
var current,locked;

function newRound(){
  locked=false;
  current={col:pickCol(),type:types[Math.floor(Math.random()*types.length)]};
  document.getElementById('shape').innerHTML=svg(current.type,current.col);
  var shuffled=colours.slice().sort(function(){return Math.random()-0.5;});
  document.getElementById('swatches').innerHTML=shuffled.map(function(c){
    return '<button data-col="'+c+'" onclick="check(this)" style="width:clamp(60px,13vmin,96px);height:clamp(60px,13vmin,96px);background:'+c+';border:4px solid rgba(0,0,0,0.12);border-radius:50%;cursor:pointer;transition:transform 0.1s;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;"></button>';
  }).join('');
}

function check(btn){
  if(locked)return;
  if(btn.dataset.col===current.col){
    locked=true;
    btn.classList.add('feedback-correct');
    showBanner(newRound);
  }else{
    btn.classList.add('feedback-wrong');
    setTimeout(function(){btn.classList.remove('feedback-wrong');},500);
  }
}

newRound();
</script>
</body>
</html>
