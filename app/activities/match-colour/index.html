<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Colour</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script src="../../../core/shapes/shapes-core.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Match Colour" data-instruction="Find the matching colour" data-no-links="standalone game"></div>
<div class="game-area">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div id="shape"></div>
  </div>
  <div id="swatches" style="display:flex;justify-content:center;gap:22px;padding:20px 20px 44px;flex-wrap:wrap;"></div>
</div>
<script>
var current,locked;

var CHECK_RESULT={
  'true': function(btn){locked=true;btn.classList.add('feedback-correct');showBanner(newRound);},
  'false':function(btn){btn.classList.add('feedback-wrong');setTimeout(function(){btn.classList.remove('feedback-wrong');},500);}
};

function doCheck(btn){CHECK_RESULT[String(btn.dataset.col===current.col)](btn);}

function check(btn){
  [doCheck].filter(function(){return !locked;}).forEach(function(f){f(btn);});
}

function newRound(){
  locked=false;
  current={col:pickCol(),type:types[Math.floor(Math.random()*types.length)]};
  document.getElementById('shape').innerHTML=svg(current.type,current.col);
  var shuffled=colours.slice().sort(function(){return Math.random()-0.5;});
  document.getElementById('swatches').innerHTML=shuffled.map(function(c){
    return '<button data-col="'+c+'" data-no-speak onclick="check(this)" style="width:clamp(60px,13vmin,96px);height:clamp(60px,13vmin,96px);background:'+c+';border:4px solid rgba(0,0,0,0.12);border-radius:50%;cursor:pointer;transition:transform 0.1s;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;"></button>';
  }).join('');
}

newRound();
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='match-colour';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">import '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';</script>
</body>
</html>
