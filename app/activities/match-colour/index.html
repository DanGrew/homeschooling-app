<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Colour</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script src="../../../core/shapes/shapes-core.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Match Colour" data-instruction="Find the matching colour" data-no-links="standalone game"></div>
<div class="game-area">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div id="shape"></div>
  </div>
  <div id="swatches" style="display:flex;justify-content:center;gap:22px;padding:20px 20px 44px;flex-wrap:wrap;"></div>
</div>
<script>
var current,locked;
var DO_SPEAK={'true':function(btn,text){window.__makeSpeakable(btn,text);},'false':function(){}};

var CHECK_RESULT={
  'true': function(btn){locked=true;btn.classList.add('feedback-correct');showBanner(newRound);},
  'false':function(btn){btn.classList.add('feedback-wrong');setTimeout(function(){btn.classList.remove('feedback-wrong');},500);}
};

function check(btn){
  ({'true':function(){},'false':function(){CHECK_RESULT[String(btn.dataset.col===current.col)](btn);}})[String(locked)]();
}

function makeSwatch(c){
  var btn=document.createElement('button');
  btn.dataset.col=c;
  btn.style.cssText='width:clamp(60px,13vmin,96px);height:clamp(60px,13vmin,96px);background:'+c+';border:4px solid rgba(0,0,0,0.12);border-radius:50%;cursor:pointer;transition:transform 0.1s;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;';
  btn.addEventListener('click',function(){check(btn);});
  DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn,colourNames[c]);
  return btn;
}

function newRound(){
  locked=false;
  current={col:pickCol(),type:types[Math.floor(Math.random()*types.length)]};
  document.getElementById('shape').innerHTML=svg(current.type,current.col);
  var swatchContainer=document.getElementById('swatches');
  swatchContainer.innerHTML='';
  colours.slice().sort(function(){return Math.random()-0.5;}).forEach(function(c){
    swatchContainer.appendChild(makeSwatch(c));
  });
}

newRound();
window.addEventListener('load',function(){
  document.querySelectorAll('#swatches button:not(.speakable)').forEach(function(btn){
    DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn,colourNames[btn.dataset.col]);
  });
});
</script>
<script>window.ACTIVITY_ID='match-colour';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
makeSpeakable(document.getElementById('shape'), function(){ return window.colourNames[window.current.col]; });
</script>
</body>
</html>
