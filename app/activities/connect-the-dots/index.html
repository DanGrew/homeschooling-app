<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Connect the Dots</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<script src="../../shared/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<style>
@keyframes wrong{0%,100%{fill:white}50%{fill:#E74C3C}}
.wrong-flash{animation:wrong 0.4s ease}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/"></div>
<div class="game-area">
  <div id="filter-bar" style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;"></div>
  <div class="game-title"><span id="title"></span></div>
  <div id="instruction" style="text-align:center;font-size:1.1em;color:#888;padding:0 16px 8px;"></div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="paginator-bar"></div>
</div>
<script>var shapes=[];</script>
<script src="../../../assets/connect-the-dots/shapes/triangle.js"></script>
<script src="../../../assets/connect-the-dots/shapes/square.js"></script>
<script src="../../../assets/connect-the-dots/shapes/ball.js"></script>
<script src="../../../assets/connect-the-dots/shapes/star.js"></script>
<script src="../../../assets/connect-the-dots/shapes/house.js"></script>
<script src="../../../assets/connect-the-dots/shapes/bottle.js"></script>
<script src="../../../assets/connect-the-dots/shapes/pencil.js"></script>
<script src="../../../assets/connect-the-dots/shapes/bike.js"></script>
<script src="../../../assets/connect-the-dots/shapes/pentagon.js"></script>
<script src="../../../assets/connect-the-dots/shapes/hexagon.js"></script>
<script src="../../../assets/connect-the-dots/shapes/guitar.js"></script>
<script src="../../../assets/connect-the-dots/shapes/car.js"></script>
<script src="../../../assets/connect-the-dots/shapes/heptagon.js"></script>
<script src="../../../assets/connect-the-dots/shapes/desk.js"></script>
<script src="../../../assets/connect-the-dots/shapes/octagon.js"></script>
<script src="./free-svg/fish/dot-to-dot-10.js"></script>
<script type="module" src="../../../ui/shared/success-banner.js"></script>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import { loadConnectDots } from '../../../core/dictionary/dictionary-helpers-core.js';
import { buildFilterBar } from '../../../ui/filter-bar/filter-bar-ui.js';
import { createPaginator } from '../../../ui/pagination/paginator-ui.js';
var nextDot,prevDot,complete,paginator,currentShape;

function ns(tag,attrs){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});
  return el;
}

function tightVB(shape){
  var pad=60;
  var xs=shape.dots.map(function(d){return d.cx;});
  var ys=shape.dots.map(function(d){return d.cy;});
  var parts=shape.vb.split(' ').map(Number);
  var minX=Math.max(0,Math.min.apply(null,xs)-pad);
  var maxX=Math.min(parts[2],Math.max.apply(null,xs)+pad);
  var vbW=maxX-minX;
  var r=Math.round(vbW*0.055);
  var minY=Math.min(0,Math.min.apply(null,ys)-r);
  var maxY=Math.max(parts[3],Math.max.apply(null,ys)+r);
  return minX+' '+minY+' '+vbW+' '+(maxY-minY);
}

function dotR(vbW,vbH){
  var rect=document.getElementById('svg').getBoundingClientRect();
  var scale=Math.min(rect.width/vbW,rect.height/vbH);
  return Math.round(Math.min(rect.width,rect.height)*0.04/scale);
}

var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){render(currentShape);},150);
});

function render(shape){
  currentShape=shape;
  var svg=document.getElementById('svg');
  svg.innerHTML='';
  [shape.decor].filter(Boolean).forEach(function(decor){var bg=document.createElementNS('http://www.w3.org/2000/svg','g');bg.id='bg';bg.setAttribute('opacity','0.4');bg.innerHTML=decor;Array.from(bg.children).forEach(function(el){el.removeAttribute('opacity');});svg.appendChild(bg);});
  nextDot=1;prevDot=null;complete=false;
  document.getElementById('title').textContent=shape.name+[shape.level].filter(function(v){return v!==undefined;}).map(function(v){return ' [Level '+v+']';}).concat([''])[0];
  hideBanner();
  document.getElementById('instruction').innerHTML='Tap dot <b>1</b> to start!';

  var vb=tightVB(shape);
  svg.setAttribute('viewBox',vb);
  var vbParts=vb.split(' ').map(Number);
  var r=dotR(vbParts[2],vbParts[3]);
  var fontSize=Math.round(r*0.85);

  var guidesG=ns('g',{id:'guides'});
  shape.guides.forEach(function(g){
    guidesG.appendChild(ns('line',{x1:g.x1,y1:g.y1,x2:g.x2,y2:g.y2,stroke:'#ddd','stroke-width':String(Math.max(1,Math.round(r*0.12))),'stroke-dasharray':'10 6'}));
  });
  svg.appendChild(guidesG);

  svg.appendChild(ns('g',{id:'lines'}));

  var dotsG=ns('g',{id:'dots'});
  shape.dots.forEach(function(d){
    var g=ns('g',{});
    g.style.cursor='pointer';
    var c=ns('circle',{cx:d.cx,cy:d.cy,r:r,fill:'white',stroke:'#444','stroke-width':String(Math.max(1,Math.round(r*0.15))),id:'c'+d.n});
    var t=ns('text',{x:d.cx,y:d.cy,'font-size':fontSize,'font-weight':'bold','text-anchor':'middle','dominant-baseline':'central',fill:'#333'});
    t.textContent=d.n;
    g.appendChild(c);g.appendChild(t);
    g.addEventListener('click',function(){tap(d.n);});
    dotsG.appendChild(g);
  });
  svg.appendChild(dotsG);
}

function doWrong(n){
  var c=document.getElementById('c'+n);
  c.classList.remove('wrong-flash');
  void c.offsetWidth;
  c.classList.add('wrong-flash');
  setTimeout(function(){c.classList.remove('wrong-flash');},400);
}

function doCorrect(n){
  var shape=currentShape;
  document.getElementById('c'+n).setAttribute('fill','#2ECC71');
  document.getElementById('c'+n).setAttribute('stroke','#27AE60');
  [prevDot].filter(function(p){return p!==null;}).forEach(function(p){
    var f=shape.dots[p-1],t=shape.dots[n-1];
    drawLine(f.cx,f.cy,t.cx,t.cy);
  });
  prevDot=n;nextDot++;
  ({'true':function(){
    complete=true;
    var f=shape.dots[shape.dots.length-1],t=shape.dots[0];
    drawLine(f.cx,f.cy,t.cx,t.cy);
    document.getElementById('instruction').textContent='';
    revealImage();
  },'false':function(){
    document.getElementById('instruction').innerHTML='Now tap dot <b>'+nextDot+'</b>!';
  }})[String(nextDot>shape.dots.length)]();
}

var TAP_CASE={
  'correct':function(n){doCorrect(n);},
  'wrong':  function(n){doWrong(n);},
  'early':  function(){}
};

function tapKey(n){
  return [['correct',n===nextDot],['wrong',n>nextDot],['early',true]]
    .filter(function(e){return e[1];}).map(function(e){return e[0];})[0];
}

function doTap(n){TAP_CASE[tapKey(n)](n);}

function tap(n){
  ({'true':function(){doTap(n);},'false':function(){}})[String(!complete)]();
}

function drawLine(x1,y1,x2,y2){
  var g=document.getElementById('lines');
  var len=Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));
  var vbArr=document.getElementById('svg').getAttribute('viewBox').split(' ').map(Number);
  var r=dotR(vbArr[2],vbArr[3]);
  var line=ns('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:'#3498DB','stroke-width':String(Math.max(1,Math.round(r*0.3))),'stroke-linecap':'round','stroke-dasharray':len,'stroke-dashoffset':len});
  g.appendChild(line);
  line.getBoundingClientRect();
  line.style.transition='stroke-dashoffset 0.35s ease';
  line.setAttribute('stroke-dashoffset','0');
}

function revealImage(){
  var bg=document.getElementById('bg');
  var guides=document.getElementById('guides');
  var lines=document.getElementById('lines');
  var dots=document.getElementById('dots');
  var start=null;
  var ANIM_END={
    'true':function(){[bg].filter(Boolean).forEach(function(el){el.setAttribute('opacity','1');});showBanner(function(){paginator.next();});},
    'false':function(){requestAnimationFrame(animFrame);}
  };
  function animFrame(ts){
    start=[start,ts].filter(Boolean)[0];
    var t=Math.min((ts-start)/900,1);
    [bg].filter(Boolean).forEach(function(el){el.setAttribute('opacity',String(0.4+0.6*t));});
    [guides].filter(Boolean).forEach(function(el){el.setAttribute('opacity',String(1.0-0.8*t));});
    [lines].filter(Boolean).forEach(function(el){el.setAttribute('opacity',String(1.0-0.8*t));});
    [dots].filter(Boolean).forEach(function(el){el.setAttribute('opacity',String(1.0-0.8*t));});
    ANIM_END[String(t>=1)]();
  }
  requestAnimationFrame(animFrame);
}

paginator=createPaginator({
  container: document.getElementById('paginator-bar'),
  items: [],
  perPage: 1,
  wrap: true,
  onRender: function(shape){ render(shape); }
});

Dictionary.init('../../dictionary/');
loadConnectDots(shapes,function(){
  buildFilterBar(shapes,function(f){paginator.reset(f);});
},function(){document.getElementById('title').textContent='⚠️ Failed to load — check connection';});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='connect-the-dots';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
