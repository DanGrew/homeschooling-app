<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace Words</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script>
  window.DICT_BASE = '../../../content/dictionary/entries/';
  window.LESSONS = [
    {id:'farm_animals',         number:1, title:'Farm Animals'},
    {id:'wild_animals',         number:2, title:'Wild Animals'},
    {id:'how_are_you_feeling',  number:3, title:'How Are You Feeling?'},
    {id:'fruit_shop',           number:4, title:'Fruit Shop'},
    {id:'things_that_go',       number:5, title:'Things That Go'}
  ];
</script>
<script src="../../../components/menu.js" defer></script>
<style>
  .mode-btns{display:flex;gap:12px;justify-content:center;padding:10px 16px 0;flex-wrap:wrap;}
  .mode-btn{border:none;border-radius:16px;padding:12px 28px;font-size:1.1em;font-family:inherit;font-weight:bold;cursor:pointer;}
  .mode-btn:disabled{opacity:0.35;cursor:default;}
  #btn-watch{background:#9B59B6;color:white;}
  #btn-sayit{background:#3498DB;color:white;}
  #btn-tryit{background:#2ECC71;color:white;}
  #btn-stop{background:#E74C3C;color:white;}
  #custom-input{padding:10px 20px 0;gap:10px;justify-content:center;align-items:center;}
  #custom-word-input{font-size:1.2em;font-family:inherit;padding:8px 14px;border:2px solid #ddd;border-radius:12px;width:200px;outline:none;}
  #custom-word-input:focus{border-color:#3498DB;}
  #btn-generate{background:#E74C3C;color:white;border:none;border-radius:12px;padding:10px 20px;font-size:1.1em;font-family:inherit;cursor:pointer;font-weight:bold;}
  #word-container{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Trace Words" data-instruction="Trace the words with your finger" data-no-links="standalone lesson"></div>
<div class="game-area">
  <div id="custom-input" style="display:none;">
    <input type="text" id="custom-word-input" placeholder="Type a word..." maxlength="15"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="btn-generate">&#8635; Go</button>
  </div>
  <div id="word-label" style="display:none;"></div>
  <div class="mode-btns">
    <button class="mode-btn" id="btn-watch">&#128218; Watch</button>
    <button class="mode-btn" id="btn-sayit">&#128264; Say It</button>
    <button class="mode-btn" id="btn-tryit" disabled>Try It &#8594;</button>
    <button class="mode-btn" id="btn-stop" style="display:none;">&#9632; Reset</button>
  </div>
  <div id="word-container"></div>
  <div id="paginator-bar"></div>
</div>

<script src="../../../core/trace/trace-core.js"></script>
<script src="../../../ui/trace/trace-ui.js"></script>
<script type="module">
import { init } from '../../../ui/word-lesson/word-lesson-ui.js';
import { GuidanceService } from '../../../components/guidance/guidance-service.js';
init();
fetch('../../../content/lessons/word-lesson.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    window.LESSON_MAP = {};
    data.lessons.forEach(function(l) { window.LESSON_MAP[l.id] = l; });
    window.guidanceService = new GuidanceService();
  });
</script>
<script>window.ACTIVITY_ID='word-lesson';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
[['btn-watch','Watch'],['btn-tryit','Try It'],['btn-stop','Reset'],['btn-generate','Go']].forEach(function(pair) {
  makeSpeakable(document.getElementById(pair[0]), pair[1]);
});
</script>
</body>
</html>
