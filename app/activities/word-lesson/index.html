<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace Words</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/theme.css">
<link rel="stylesheet" href="/homeschooling-app/app/shared/style.css">
<script src="/homeschooling-app/app/shared/menu.js" defer></script>
<style>
  .filter-bar{display:flex;gap:8px;justify-content:center;padding:8px 16px 0;flex-wrap:wrap;}
  .filter-btn{background:#f0f0f0;border:2px solid #ddd;border-radius:20px;padding:6px 18px;font-size:1em;font-family:inherit;cursor:pointer;color:#555;}
  .filter-btn.active{background:#3498DB;border-color:#3498DB;color:white;}
  .nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 0;}
  .nav-btn{background:#eee;border:none;border-radius:14px;font-size:1.6em;padding:8px 22px;cursor:pointer;font-family:inherit;color:#333;}
  .nav-btn:disabled{opacity:0.3;cursor:default;}
  .word-label{font-size:2em;font-weight:bold;color:#333;letter-spacing:0.05em;}
  .mode-btns{display:flex;gap:12px;justify-content:center;padding:10px 16px 0;flex-wrap:wrap;}
  .mode-btn{border:none;border-radius:16px;padding:12px 28px;font-size:1.1em;font-family:inherit;font-weight:bold;cursor:pointer;}
  .mode-btn:disabled{opacity:0.35;cursor:default;}
  #btn-watch{background:#9B59B6;color:white;}
  #btn-sayit{background:#3498DB;color:white;}
  #btn-tryit{background:#2ECC71;color:white;}
  #btn-stop{background:#E74C3C;color:white;}
  #custom-input{padding:10px 20px 0;gap:10px;justify-content:center;align-items:center;}
  #custom-word-input{font-size:1.2em;font-family:inherit;padding:8px 14px;border:2px solid #ddd;border-radius:12px;width:200px;outline:none;}
  #custom-word-input:focus{border-color:#3498DB;}
  #btn-generate{background:#E74C3C;color:white;border:none;border-radius:12px;padding:10px 20px;font-size:1.1em;font-family:inherit;cursor:pointer;font-weight:bold;}
  #word-container{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;}
  #success-banner{position:fixed;bottom:0;left:0;right:0;background:#2ECC71;color:white;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;transform:translateY(100%);transition:transform 0.3s ease;z-index:100;box-sizing:border-box;}
  #success-banner.visible{transform:translateY(0);}
  #banner-btns{display:flex;gap:12px;}
  #banner-btns button{background:white;border:none;font-size:1.1em;padding:10px 20px;border-radius:12px;font-family:inherit;cursor:pointer;font-weight:bold;}
  #btn-banner-again{color:#E74C3C;}
  #btn-banner-next{color:#2ECC71;}
</style>
</head>
<body>
<div class="nav-bar" data-home="/homeschooling-app/app/lessons/"></div>
<div class="game-area">
  <div class="filter-bar" id="filter-bar"></div>
  <div id="custom-input" style="display:none;">
    <input type="text" id="custom-word-input" placeholder="Type a word..." maxlength="15"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="btn-generate">&#8635; Go</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <span class="word-label" id="word-label"></span>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>
  <div class="mode-btns">
    <button class="mode-btn" id="btn-watch">&#128218; Watch</button>
    <button class="mode-btn" id="btn-sayit">&#128264; Say It</button>
    <button class="mode-btn" id="btn-tryit" disabled>Try It &#8594;</button>
    <button class="mode-btn" id="btn-stop" style="display:none;">&#9632; Reset</button>
  </div>
  <div id="word-container"></div>
</div>

<div id="success-banner">
  <span style="font-size:1.6em;">&#11088; Well done!</span>
  <div id="banner-btns">
    <button id="btn-banner-again">&#8635; Again</button>
    <button id="btn-banner-next">Next &#8594;</button>
  </div>
</div>

<script src="/homeschooling-app/app/shared/trace.js"></script>
<script src="/homeschooling-app/app/shared/trace-engine.js"></script>
<script>
const CHAR_BASE = '/homeschooling-app/app/language-characters/';
const DICT_BASE = '/homeschooling-app/app/dictionary/';
const NS = 'http://www.w3.org/2000/svg';

let words = [];
let filtered = [];
let currentIdx = 0;
let isCustom = false;
let currentWord = '';
let isTracing = false;
let lessonAnimating = false;
let charSvgs = [];
let charBases = [];
let charBalls = [];
let charDots = [];
let charEngines = [];

function validWord(w) {
  return w.length > 0 && w.split('').every(c =>
    (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || (c >= '0' && c <= '9')
  );
}

function charFile(c) {
  if (c >= 'a' && c <= 'z') return 'lower-' + c + '.svg';
  if (c >= 'A' && c <= 'Z') return 'upper-' + c.toLowerCase() + '.svg';
  return c + '.svg';
}

function stopAllEngines() {
  charEngines.forEach(e => { if (e) { e.done = true; e.stopAnimation(); } });
  charEngines = [];
  lessonAnimating = false;
}

function loadDictionary() {
  return fetch(DICT_BASE + 'dictionary.json')
    .then(r => r.json())
    .then(ids => Promise.all(ids.map(id =>
      fetch(DICT_BASE + 'entries/' + id + '/concept.json').then(r => r.json())
    )))
    .then(concepts => {
      words = concepts.map(c => ({word: c.name.toLowerCase(), tags: c.tags || [], id: c.id}));
    });
}

function setupFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const tags = ['all'];
  words.forEach(w => w.tags.forEach(t => { if (!tags.includes(t)) tags.push(t); }));
  [...tags, 'custom'].forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag === 'all' ? 'All' : tag.charAt(0).toUpperCase() + tag.slice(1);
    btn.addEventListener('click', () => onFilterClick(tag));
    bar.appendChild(btn);
  });
  setActiveFilter('all');
}

function setActiveFilter(tag) {
  document.querySelectorAll('#filter-bar .filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tag === tag)
  );
}

function onFilterClick(tag) {
  setActiveFilter(tag);
  hideBanner();
  if (tag === 'custom') {
    isCustom = true;
    stopAllEngines();
    document.getElementById('custom-input').style.display = 'flex';
    document.getElementById('word-label').textContent = '';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    document.getElementById('word-container').innerHTML = '';
    charSvgs = []; charBases = []; charBalls = []; charDots = [];
    setLessonUI();
  } else {
    isCustom = false;
    document.getElementById('custom-input').style.display = 'none';
    filtered = tag === 'all' ? words.slice() : words.filter(w => w.tags.includes(tag));
    navTo(0);
  }
}

function navTo(idx) {
  if (isCustom || !filtered.length) return;
  currentIdx = ((idx % filtered.length) + filtered.length) % filtered.length;
  currentWord = filtered[currentIdx].word;
  document.getElementById('word-label').textContent = currentWord;
  const multi = filtered.length > 1;
  document.getElementById('btn-prev').disabled = !multi;
  document.getElementById('btn-next').disabled = !multi;
  hideBanner();
  setLessonUI();
  loadWord(currentWord);
}

function setLessonUI() {
  isTracing = false;
  document.getElementById('btn-watch').disabled = false;
  document.getElementById('btn-tryit').style.display = '';
  document.getElementById('btn-tryit').disabled = true;
  document.getElementById('btn-stop').style.display = '';
}

function setTraceUI() {
  isTracing = true;
  document.getElementById('btn-watch').disabled = false;
  document.getElementById('btn-tryit').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'none';
}

function bestVoice() {
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'en-GB' && /female|woman|girl|karen|serena|moira|kate/i.test(v.name))
    || voices.find(v => v.lang === 'en-GB')
    || voices.find(v => v.lang.startsWith('en'))
    || null;
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0; u.pitch = 1.1;
  const v = bestVoice();
  if (v) u.voice = v;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function showBanner() {
  document.getElementById('btn-banner-next').style.display = isCustom ? 'none' : '';
  document.getElementById('success-banner').classList.add('visible');
}

function hideBanner() {
  document.getElementById('success-banner').classList.remove('visible');
}

function fetchCharData(c) {
  return fetch(CHAR_BASE + charFile(c))
    .then(r => r.text())
    .then(svgText => {
      const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
      const d = doc.getElementById('trace-path').getAttribute('d');
      const circle = doc.querySelector('circle');
      const dot = circle ? {
        cx: circle.getAttribute('cx'),
        cy: circle.getAttribute('cy'),
        r:  circle.getAttribute('r')
      } : null;
      return {d, dot};
    });
}

async function loadWord(word) {
  stopAllEngines();
  const chars = word.split('');
  const charData = await Promise.all(chars.map(fetchCharData));
  renderWord(chars, charData);
}

function renderWord(chars, charData) {
  stopAllEngines();
  const n = chars.length;
  const GAP = 10;
  const container = document.getElementById('word-container');
  container.innerHTML = '';
  charSvgs = []; charBases = []; charBalls = []; charDots = [];

  const containerW = container.clientWidth || (window.innerWidth - 32);
  const maxCharH = Math.min(260, window.innerHeight * 0.38);
  const maxCharW = maxCharH * (200 / 270);
  const charW = Math.max(72, Math.min(maxCharW, (containerW - (n - 1) * GAP) / n));
  const charH = Math.round(charW * (270 / 200));

  const wrap = document.createElement('div');
  wrap.style.cssText = `display:flex;gap:${GAP}px;align-items:center;justify-content:center;`;

  chars.forEach((c, i) => {
    const {d, dot} = charData[i];

    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 200 270');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.style.cssText = `width:${charW}px;height:${charH}px;display:block;touch-action:none;flex-shrink:0;`;

    const base = document.createElementNS(NS, 'path');
    base.setAttribute('d', d);
    base.setAttribute('fill', 'none');
    base.setAttribute('stroke', '#ddd');
    base.setAttribute('stroke-width', '18');
    base.setAttribute('stroke-linecap', 'butt');
    base.setAttribute('stroke-linejoin', 'round');

    let dc = null;
    if (dot) {
      dc = document.createElementNS(NS, 'circle');
      dc.setAttribute('cx', dot.cx);
      dc.setAttribute('cy', dot.cy);
      dc.setAttribute('r', dot.r);
      dc.setAttribute('fill', '#ddd');
      dc.setAttribute('stroke', 'none');
      dc.style.pointerEvents = 'none';
    }

    const ball = document.createElementNS(NS, 'circle');
    ball.setAttribute('r', '16');
    ball.setAttribute('fill', '#E74C3C');
    ball.setAttribute('stroke', 'white');
    ball.setAttribute('stroke-width', '3');
    ball.style.display = 'none';

    svg.appendChild(base);
    if (dc) svg.appendChild(dc);
    svg.appendChild(ball);
    wrap.appendChild(svg);

    charSvgs.push(svg);
    charBases.push(base);
    charDots.push(dc);
    charBalls.push(ball);
  });

  container.appendChild(wrap);
}

function clearProgress() {
  charSvgs.forEach(svg => svg.querySelectorAll('.progress-path').forEach(p => p.remove()));
  charBalls.forEach(b => { b.style.display = 'none'; b.style.filter = ''; b.setAttribute('fill', '#E74C3C'); });
  charDots.forEach(d => { if (d) { if (d._tapListener) { d.removeEventListener('pointerdown', d._tapListener); d._tapListener = null; } d.setAttribute('fill', '#ddd'); d.setAttribute('stroke', 'none'); d.style.pointerEvents = 'none'; d.style.cursor = ''; d.style.filter = ''; } });
}

function startWatch() {
  if (!charSvgs.length) return;
  stopAllEngines();
  clearProgress();
  setLessonUI();
  document.getElementById('btn-watch').disabled = true;
  document.getElementById('btn-tryit').disabled = true;
  lessonAnimating = true;
  animateLessonChar(0, charBases.length);
}

function animateLessonChar(i, total) {
  if (!lessonAnimating || i >= total) {
    if (lessonAnimating) onLessonComplete();
    return;
  }

  const svg = charSvgs[i];
  const base = charBases[i];
  const ball = charBalls[i];
  const dot = charDots[i];
  ball.style.display = '';
  if (dot) { dot.setAttribute('fill', '#E74C3C'); }

  const engine = new TraceEngine(svg, base, ball, null, {
    interactive: false,
    progressStroke: '#FFD700',
    progressWidth: 20,
    progressStyle: 'filter:drop-shadow(0 0 10px #FFD700) drop-shadow(0 0 5px #FFA500)'
  });
  engine.progressPaths.forEach(pp => pp.classList.add('progress-path'));
  charEngines[i] = engine;

  engine.onComplete = () => {
    ball.style.display = 'none';
    if (dot) {
      dot.setAttribute('fill', '#FFD700');
      dot.style.filter = 'drop-shadow(0 0 8px #FFD700)';
      setTimeout(() => animateLessonChar(i + 1, total), 400);
    } else {
      setTimeout(() => animateLessonChar(i + 1, total), 300);
    }
  };

  engine.startAnimation(1250);
}

function onLessonComplete() {
  lessonAnimating = false;
  document.getElementById('btn-watch').disabled = false;
  document.getElementById('btn-tryit').disabled = false;
}

function startTrace() {
  if (!charSvgs.length) return;
  stopAllEngines();
  clearProgress();
  setTraceUI();
  traceChar(0);
}

function traceChar(charIdx) {
  if (charIdx >= charBases.length) { onWordComplete(); return; }

  const svg = charSvgs[charIdx];
  const base = charBases[charIdx];
  const ball = charBalls[charIdx];
  const dot = charDots[charIdx];

  ball.style.display = '';
  ball.setAttribute('fill', '#E74C3C');
  ball.style.filter = '';

  const engine = new TraceEngine(svg, base, ball, null, {
    interactive: true,
    progressStroke: '#FFD700',
    progressWidth: 20,
    progressStyle: 'filter:drop-shadow(0 0 10px #FFD700) drop-shadow(0 0 5px #FFA500)',
    onComplete: () => {
      ball.style.display = 'none';
      if (dot) {
        dot.setAttribute('fill', '#E74C3C');
        dot.style.pointerEvents = 'auto';
        dot.style.cursor = 'pointer';
        const onDotTap = () => {
          dot.removeEventListener('pointerdown', onDotTap);
          dot._tapListener = null;
          dot.style.pointerEvents = 'none';
          dot.style.cursor = '';
          dot.setAttribute('fill', '#FFD700');
          traceChar(charIdx + 1);
        };
        dot._tapListener = onDotTap;
        dot.addEventListener('pointerdown', onDotTap);
      } else {
        setTimeout(() => traceChar(charIdx + 1), 300);
      }
    }
  });
  engine.progressPaths.forEach(pp => pp.classList.add('progress-path'));
  charEngines[charIdx] = engine;
}

function onWordComplete() { isTracing = false; showBanner(); }

function handleGenerate() {
  const val = document.getElementById('custom-word-input').value.trim();
  if (!validWord(val)) {
    const el = document.getElementById('custom-word-input');
    el.style.borderColor = '#E74C3C';
    setTimeout(() => { el.style.borderColor = '#ddd'; }, 800);
    return;
  }
  currentWord = val;
  document.getElementById('word-label').textContent = val;
  hideBanner();
  setLessonUI();
  loadWord(currentWord);
}

document.getElementById('btn-watch').addEventListener('click', startWatch);
document.getElementById('btn-tryit').addEventListener('click', startTrace);
document.getElementById('btn-stop').addEventListener('click', startWatch);
document.getElementById('btn-sayit').addEventListener('click', () => { if (currentWord) speak(currentWord); });
document.getElementById('btn-prev').addEventListener('click', () => navTo(currentIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => navTo(currentIdx + 1));
document.getElementById('btn-generate').addEventListener('click', handleGenerate);
document.getElementById('custom-word-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleGenerate(); });
document.getElementById('btn-banner-again').addEventListener('click', () => { hideBanner(); startTrace(); });
document.getElementById('btn-banner-next').addEventListener('click', () => navTo(currentIdx + 1));

loadDictionary().then(() => {
  setupFilterBar();
  filtered = words.slice();
  navTo(0);
});
</script>
</body>
</html>
