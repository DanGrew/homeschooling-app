<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace Words</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<script src="../../shared/menu.js" defer></script>
<style>
  .filter-bar{display:flex;gap:8px;justify-content:center;padding:8px 16px 0;flex-wrap:wrap;}
  .filter-btn{background:#f0f0f0;border:2px solid #ddd;border-radius:20px;padding:6px 18px;font-size:1em;font-family:inherit;cursor:pointer;color:#555;}
  .filter-btn.active{background:#3498DB;border-color:#3498DB;color:white;}
  .nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 0;}
  .nav-btn{background:#eee;border:none;border-radius:14px;font-size:1.6em;padding:8px 22px;cursor:pointer;font-family:inherit;color:#333;}
  .nav-btn:disabled{opacity:0.3;cursor:default;}
  .word-label{font-size:2em;font-weight:bold;color:#333;letter-spacing:0.05em;}
  .mode-btns{display:flex;gap:12px;justify-content:center;padding:10px 16px 0;flex-wrap:wrap;}
  .mode-btn{border:none;border-radius:16px;padding:12px 28px;font-size:1.1em;font-family:inherit;font-weight:bold;cursor:pointer;}
  .mode-btn:disabled{opacity:0.35;cursor:default;}
  #btn-watch{background:#9B59B6;color:white;}
  #btn-sayit{background:#3498DB;color:white;}
  #btn-tryit{background:#2ECC71;color:white;}
  #btn-stop{background:#E74C3C;color:white;}
  #custom-input{padding:10px 20px 0;gap:10px;justify-content:center;align-items:center;}
  #custom-word-input{font-size:1.2em;font-family:inherit;padding:8px 14px;border:2px solid #ddd;border-radius:12px;width:200px;outline:none;}
  #custom-word-input:focus{border-color:#3498DB;}
  #btn-generate{background:#E74C3C;color:white;border:none;border-radius:12px;padding:10px 20px;font-size:1.1em;font-family:inherit;cursor:pointer;font-weight:bold;}
  #word-container{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;}
  #success-banner{position:fixed;bottom:0;left:0;right:0;background:#2ECC71;color:white;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;transform:translateY(100%);transition:transform 0.3s ease;z-index:100;box-sizing:border-box;}
  #success-banner.visible{transform:translateY(0);}
  #banner-btns{display:flex;gap:12px;}
  #banner-btns button{background:white;border:none;font-size:1.1em;padding:10px 20px;border-radius:12px;font-family:inherit;cursor:pointer;font-weight:bold;}
  #btn-banner-again{color:#E74C3C;}
  #btn-banner-next{color:#2ECC71;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/"></div>
<div class="game-area">
  <div class="filter-bar" id="filter-bar"></div>
  <div id="custom-input" style="display:none;">
    <input type="text" id="custom-word-input" placeholder="Type a word..." maxlength="15"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="btn-generate">&#8635; Go</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <span class="word-label" id="word-label"></span>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>
  <div class="mode-btns">
    <button class="mode-btn" id="btn-watch">&#128218; Watch</button>
    <button class="mode-btn" id="btn-sayit">&#128264; Say It</button>
    <button class="mode-btn" id="btn-tryit" disabled>Try It &#8594;</button>
    <button class="mode-btn" id="btn-stop" style="display:none;">&#9632; Reset</button>
  </div>
  <div id="word-container"></div>
</div>

<div id="success-banner">
  <span style="font-size:1.6em;">&#11088; Well done!</span>
  <div id="banner-btns">
    <button id="btn-banner-again">&#8635; Again</button>
    <button id="btn-banner-next">Next &#8594;</button>
  </div>
</div>

<script src="../../../core/trace/trace-core.js"></script>
<script src="../../../ui/trace/trace-ui.js"></script>
<script type="module">
import { init } from '../../../ui/word-lesson/word-lesson-ui.js';
init();
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='word-lesson';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
