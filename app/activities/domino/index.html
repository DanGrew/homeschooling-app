<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dominoes</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<link rel="stylesheet" href="../../../styles/pairs.css">
<link rel="stylesheet" href="../../../styles/domino.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../core/pairs/pairs-content.js"></script>
<script src="../../../core/domino/domino-core.js"></script>
<script src="../../../ui/card-game/card-game-ui.js"></script>
<script src="../../../ui/domino/domino-ui.js"></script>
<script src="../../../ui/domino/domino-board-ui.js"></script>
<script src="../../../ui/domino/domino-tray-ui.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Dominoes" data-instruction="Match the tiles" data-no-links="standalone game"></div>

<div class="game-area" style="flex-direction:column;overflow:hidden;">
  <div id="domino-setup" class="pairs-screen active"></div>
  <div id="domino-game" class="pairs-screen" style="flex-direction:column;">
    <div id="domino-board-viewport" class="domino-board-viewport" data-testid="domino-board-viewport"></div>
    <div id="domino-tray" class="domino-tray" data-testid="domino-tray"></div>
  </div>
  <div id="domino-summary" class="pairs-screen"></div>
</div>

<script>window.ACTIVITY_ID = 'domino';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>

<script>
window.DICT_BASE = '../../../content/dictionary/entries/';

var setupScreen   = document.getElementById('domino-setup');
var gameScreen    = document.getElementById('domino-game');
var summaryScreen = document.getElementById('domino-summary');
var boardViewport = document.getElementById('domino-board-viewport');
var trayEl        = document.getElementById('domino-tray');

var DOMINO_SCREEN_ACTIVE = { 'true': ' active', 'false': '' };

var gameState;

function showScreen(name) {
  var screens = { setup: setupScreen, game: gameScreen, summary: summaryScreen };
  Object.keys(screens).forEach(function(k) {
    screens[k].className = 'pairs-screen' + DOMINO_SCREEN_ACTIVE[String(k === name)];
  });
}

fetch('../../../content/dictionary/dictionary.json')
  .then(function(r) { return r.json(); })
  .then(function(ids) {
    return Promise.all(ids.map(function(id) {
      return fetch(window.DICT_BASE + id + '/concept.json').then(function(r) { return r.json(); });
    }));
  })
  .then(function(concepts) {
    var animalEntries = filterByTag(concepts, 'animals');
    renderDominoSetup(setupScreen, animalEntries, function(setupState) {
      startGame(setupState);
    });
  });

function startGame(setupState) {
  gameState = createDominoGame(setupState);
  showScreen('game');
  renderDominoBoard(boardViewport, gameState);
  renderDominoTray(trayEl, gameState);
}

window.addEventListener('resize', function() {
  [gameState].filter(Boolean).forEach(function() {
    renderDominoBoard(boardViewport, gameState);
  });
});
</script>

<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import { speakInterrupt } from '../../../components/speech/speech-ui.js';
document.querySelectorAll('[data-speak]').forEach(function(el) {
  makeSpeakable(el, el.getAttribute('data-speak'));
});
window.__makeSpeakable = makeSpeakable;
window.__speakInterrupt = speakInterrupt;
</script>
</body>
</html>
