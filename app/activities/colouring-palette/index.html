<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colour with Palette</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<script src="../../shared/menu.js" defer></script>
<style>
#layout{flex:1;display:flex;overflow:hidden;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#sidebar{width:160px;display:flex;flex-direction:column;gap:8px;padding:8px;overflow:hidden;}
#ref-wrap{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;}
#ref-label{font-size:0.7em;color:#888;margin-bottom:2px;}
#ref{width:100%;flex:1;min-height:0;}
#palette{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.swatch{aspect-ratio:1;border-radius:10px;cursor:pointer;border:3px solid transparent;box-sizing:border-box;}
.swatch.selected{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333;}
@media(orientation:portrait){
  #layout{flex-direction:column;}
  #sidebar{width:100%;flex-direction:row;height:120px;box-sizing:border-box;}
  #ref-wrap{flex:1;min-width:0;}
  #palette{grid-template-columns:repeat(5,1fr);grid-auto-rows:min(48px,11vw);flex:2;min-width:0;align-content:center;}
  .swatch{aspect-ratio:unset;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-prev="prevPicture" data-next="nextPicture"></div>
<div class="game-area">
  <div id="filter-bar" style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;"></div>
  <div class="game-title"><span id="title"></span></div>
  <div id="layout">
    <div id="canvas-wrap">
      <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="sidebar">
      <div id="ref-wrap">
        <div id="ref-label">Reference</div>
        <svg id="ref" style="width:100%;flex:1;min-height:0;" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div id="palette"></div>
    </div>
  </div>
</div>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script>var pictures=[];</script>
<script src="../../../resources/colouring/pictures/sun.js"></script>
<script src="../../../resources/colouring/pictures/cat.js"></script>
<script src="../../../resources/colouring/pictures/fish.js"></script>
<script src="../../../resources/colouring/pictures/house.js"></script>
<script src="../../../resources/colouring/pictures/tree.js"></script>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import { loadColouringPictures } from '../../../core/dictionary/dictionary-helpers-core.js';
import { buildFilterBar } from '../../../ui/filter-bar/filter-bar-ui.js';
var filtIdx=0,selectedColour=null,filledEls,filtered=[];

function selectColour(c){
  selectedColour=c;
  document.querySelectorAll('.swatch').forEach(function(s){
    s.classList.toggle('selected',s.dataset.colour===c);
  });
}

function checkComplete(){
  var done=filledEls.every(function(el){return el.getAttribute('fill')===el.dataset.target;});
  ({'true':function(){showBanner(nextPicture);},'false':function(){}})[String(done)]();
}

function render(){
  var pic=filtered[filtIdx];
  document.getElementById('title').textContent=pic.name;
  hideBanner();
  selectedColour=null;
  filledEls=[];

  var svg=document.getElementById('svg');
  svg.innerHTML='';
  svg.setAttribute('viewBox',pic.vb);
  injectDotPattern(svg);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:'url(#dots)',stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    var el=ns(s.tag,attrs);
    ({'true':function(){svg.appendChild(el);},'false':function(){
      el.style.cursor='pointer';
      el.dataset.target=s.colour;
      filledEls.push(el);
      el.addEventListener('click',function(){
        [selectedColour].filter(Boolean).forEach(function(){
          el.setAttribute('fill',selectedColour);
          checkComplete();
        });
      });
      svg.appendChild(el);
    }})[String(!!s.noColour)]();
  });

  var ref=document.getElementById('ref');
  ref.innerHTML='';
  ref.setAttribute('viewBox',pic.vb);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:s.colour,stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    ref.appendChild(ns(s.tag,attrs));
  });

  var seen={},cols=[];
  pic.shapes.filter(function(s){return !s.noColour;}).forEach(function(s){
    [s.colour].filter(function(c){return !seen[c];}).forEach(function(c){seen[c]=1;cols.push(c);});
  });
  var palette=document.getElementById('palette');
  palette.innerHTML='';
  cols.forEach(function(c){
    var d=document.createElement('div');
    d.className='swatch';
    d.dataset.colour=c;
    d.style.background=c;
    d.addEventListener('click',function(){selectColour(c);});
    palette.appendChild(d);
  });
}

function nextPicture(){filtIdx=(filtIdx+1)%filtered.length;render();}
function prevPicture(){filtIdx=(filtIdx+filtered.length-1)%filtered.length;render();}
window.nextPicture=nextPicture;window.prevPicture=prevPicture;

Dictionary.init('../../dictionary/');
loadColouringPictures(pictures,function(){
  buildFilterBar(pictures,function(f){filtered=f;filtIdx=0;render();});
},function(){document.getElementById('title').textContent='⚠️ Failed to load — check connection';});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='colouring-palette';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
