<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Word Match</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Word Match" data-links='[{"href":"../say-words/","label":"Say Words"}]' data-links-icon="lesson"></div>
<div class="game-area">
  <div id="filter-bar"></div>
<div id="wm-word" style="font-size:clamp(2em,10vmin,5em);font-weight:bold;color:#333;text-align:center;padding:clamp(8px,2vmin,16px) 16px;letter-spacing:0.04em;touch-action:manipulation;user-select:none;"></div>
  <div id="wm-choices" style="display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(12px,3vmin,24px);padding:0 16px clamp(12px,3vmin,24px);flex:1;align-content:center;"></div>
</div>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import {loadImages} from '../../../core/dictionary/dictionary-helpers-core.js';
import {buildFilterBar} from '../../../components/filter-bar/filter-bar-ui.js';
import {init,getCurrentTarget,renderRound} from '../../../ui/word-match/word-match-ui.js';
Dictionary.init('../../../content/dictionary/');
var allItems=[],filtered=[];
window.__wmTarget=function(){return getCurrentTarget();};
loadImages(allItems,function(){
  init(allItems);
  buildFilterBar(allItems,function(f){filtered=f;renderRound(filtered);});
});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='word-match';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
