<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Move the Block</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
<script src="../../../core/move-blocks/move-blocks-core.js"></script>
<script src="../../../ui/move-blocks/move-blocks-ui.js"></script>
<style>
#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:#ccc;border:3px solid #ccc;border-radius:8px;overflow:hidden;width:min(62vmin,310px);height:min(62vmin,310px);}
.cell{background:#fff8f0;border-radius:2px;}
.cell.player{background:#3498DB;border-radius:4px;}
.cell.target{background:#2ECC71;border-radius:4px;}
.cell.obstacle{background:#E67E22;border-radius:4px;}
#arrows{display:grid;grid-template-areas:". up ." "left . right" ". down .";grid-template-columns:1fr 1fr 1fr;gap:10px;width:min(48vmin,240px);}
.arr{background:#e0e0e0;border:none;border-radius:14px;font-size:clamp(1.6em,6vmin,2.4em);padding:10px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-touch-callout:none;font-family:inherit;line-height:1;}
.arr:active{background:#bbb;transform:scale(0.93);}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Move Blocks" data-instruction="Move the blue block to the green square!" data-no-links="standalone game"></div>
<div class="game-area">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,4vmin,32px);position:relative;">
    <div id="grid"></div>
    <div id="arrows">
      <button class="arr" style="grid-area:up" data-dx="0" data-dy="-1">&#8593;</button>
      <button class="arr" style="grid-area:left" data-dx="-1" data-dy="0">&#8592;</button>
      <button class="arr" style="grid-area:right" data-dx="1" data-dy="0">&#8594;</button>
      <button class="arr" style="grid-area:down" data-dx="0" data-dy="1">&#8595;</button>
    </div>
  </div>
</div>
<script>
document.querySelectorAll('.arr').forEach(function(btn) {
  btn.addEventListener('click', function() { move(Number(btn.dataset.dx), Number(btn.dataset.dy)); });
});
newGame();
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='move-blocks';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
