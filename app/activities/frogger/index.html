<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Crossing Playground</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../components/speech/speakable.js" defer></script>
<script src="../../../components/speech/speech-ui.js" defer></script>
<script src="../../../core/frogger/frogger-core.js"></script>
<script src="../../../core/frogger/frogger-loader.js"></script>
<script src="../../../ui/frogger/frogger-renderer.js"></script>
<script src="../../../ui/frogger/frogger-game-loop.js"></script>
<script type="module">
import { makeSpeakable, makeSpeakableButton } from '../../../components/speech/speakable.js';
window.__makeSpeakable = makeSpeakable;

var CONTROL_BTNS = [
  { id: 'btn-up', label: 'up' }, { id: 'btn-down', label: 'down' },
  { id: 'btn-left', label: 'left' }, { id: 'btn-right', label: 'right' },
  { id: 'frogger-reset-btn', label: 'Try Again' }
];
CONTROL_BTNS.forEach(function(d) {
  [document.querySelector('[data-testid="' + d.id + '"]')].filter(Boolean)
    .forEach(function(b) { makeSpeakable(b, d.label); });
});
[document.querySelector('[data-testid="frogger-reset-msg"]')].filter(Boolean)
  .forEach(function(el) { makeSpeakable(el, 'Oops! Try a different way!'); });

function showGame() {
  document.getElementById('frogger-picker').style.display = 'none';
  document.getElementById('frogger-game-wrap').style.display = 'flex';
}

function fetchJson(path) { return fetch(path).then(function(r) { return r.json(); }); }

function loadEntry(entry) {
  var themeFiles = [entry.theme].filter(Boolean);
  Promise.all([
    fetchJson('../../../content/frogger/scenarios/' + entry.file)
  ].concat(themeFiles.map(function(t) { return fetchJson('../../../content/frogger/scenarios/' + t); })))
    .then(function(results) {
      var scenario = parseScenario(results[0]);
      var theme = [results[1]].filter(Boolean)[0];
      showGame();
      window.startGame(scenario, theme);
    });
}

var list = document.getElementById('frogger-scenario-list');
fetchJson('../../../content/frogger/scenarios/index.json')
  .then(function(index) {
    index.forEach(function(entry) {
      var btn = makeSpeakableButton(entry.title);
      btn.setAttribute('data-testid', 'scenario-btn');
      btn.setAttribute('data-scenario-file', entry.file);
      btn.style.cssText = 'font-size:1.2rem;padding:16px 32px;border-radius:12px;border:none;background:#4488cc;color:#fff;cursor:pointer;font-weight:bold;min-width:200px;';
      list.appendChild(btn);
      btn.addEventListener('click', function() { loadEntry(entry); });
    });
  });
</script>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Crossing Playground" data-no-links="standalone game" data-no-instruction="tap arrows to move"></div>

<div class="game-area" style="flex-direction:column;align-items:center;justify-content:center;padding:8px;gap:8px;">
  <div id="frogger-picker" data-testid="frogger-picker" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;">
    <div id="frogger-scenario-list" data-testid="frogger-scenario-list" style="display:flex;flex-direction:column;align-items:center;gap:12px;"></div>
  </div>
  <div id="frogger-game-wrap" style="display:none;flex-direction:column;align-items:center;gap:6px;flex:1;min-height:0;width:100%;">
    <div id="frogger-tray" data-testid="frogger-tray" style="display:none;flex-direction:row;align-items:center;gap:10px;justify-content:center;padding:6px 12px;background:rgba(0,0,0,0.1);border-radius:12px;flex-wrap:wrap;"></div>
    <div id="frogger-container" data-testid="frogger-container" style="flex:1;min-height:0;width:100%;max-width:600px;display:flex;align-items:center;justify-content:center;"></div>
    <div id="frogger-controls" data-testid="frogger-controls" style="display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,56px);gap:6px;">
      <div></div>
      <button data-testid="btn-up"    style="font-size:1.6rem;border-radius:10px;border:none;background:#e0e0e0;cursor:pointer;" aria-label="Up">▲</button>
      <div></div>
      <button data-testid="btn-left"  style="font-size:1.6rem;border-radius:10px;border:none;background:#e0e0e0;cursor:pointer;" aria-label="Left">◀</button>
      <button data-testid="btn-down"  style="font-size:1.6rem;border-radius:10px;border:none;background:#e0e0e0;cursor:pointer;" aria-label="Down">▼</button>
      <button data-testid="btn-right" style="font-size:1.6rem;border-radius:10px;border:none;background:#e0e0e0;cursor:pointer;" aria-label="Right">▶</button>
    </div>
  </div>
</div>

<script>
var DEV_THEME = {
  id: 'dev',
  assets: {},
  tiles: {
    ground:  { fill: '#7ec850' },
    hazard:  { fill: '#4488cc' },
    wall:    { fill: '#888888' }
  },
  map: { player: '', platform: '', obstacle: '', collectible: '' }
};

var state, rState, loop;
var activeScenario = null;
var KEY_MAP = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
var collectSlots = [];
var collectFilled = 0;
var collectResetBtn = null;

function onCollision(collision) {
  loop.stop();
  showCollisionHighlight(rState, collision);
  setTimeout(function() { showResetPrompt(rState); }, 400);
}

function onResetClick() {
  hideResetPrompt(rState);
  resetPlayer(state, activeScenario, 'start');
  loop.start();
}

function makeCollectSlot() {
  var slot = document.createElement('div');
  slot.setAttribute('data-testid', 'frogger-collect-slot');
  slot.style.cssText = 'width:40px;height:40px;border-radius:50%;border:3px solid #aaa;box-sizing:border-box;background:transparent;transition:transform 0.2s;';
  return slot;
}

function makeCollectResetBtn() {
  var btn = document.createElement('button');
  btn.setAttribute('data-testid', 'frogger-collect-reset-btn');
  btn.textContent = 'Play Again';
  btn.style.cssText = 'display:none;font-size:1.1rem;padding:10px 24px;border-radius:10px;border:none;background:#4488cc;color:#fff;cursor:pointer;font-weight:bold;';
  btn.addEventListener('click', onCollectReset);
  [window.__makeSpeakable].filter(Boolean).forEach(function(fn) { fn(btn, 'Play Again'); });
  return btn;
}

function clearCollectTray() {
  var tray = document.getElementById('frogger-tray');
  tray.style.display = 'none';
  collectSlots = [];
  collectFilled = 0;
  collectResetBtn = null;
}

function initActiveTray(scenario, total) {
  var tray = document.getElementById('frogger-tray');
  tray.innerHTML = '';
  collectSlots = Array.from({ length: total }, makeCollectSlot);
  collectSlots.forEach(function(slot) { tray.appendChild(slot); });
  collectResetBtn = makeCollectResetBtn();
  tray.appendChild(collectResetBtn);
  collectFilled = 0;
  tray.style.display = 'flex';
}

var TRAY_BUILD = { 'true': initActiveTray, 'false': clearCollectTray };

function buildCollectTray(scenario) {
  var total = countCollectibles(scenario);
  var key = String(!![scenario.collectGoal].filter(Boolean).filter(function() { return total > 0; }).length);
  TRAY_BUILD[key](scenario, total);
}

function applySlotAsset(slot, assetPath) {
  var img = document.createElement('img');
  img.src = assetPath;
  img.style.cssText = 'width:100%;height:100%;border-radius:50%;object-fit:contain;';
  slot.appendChild(img);
}

function applySlotFallback(slot) {
  slot.style.background = '#ffcc00';
  slot.style.border = '3px solid #cc8800';
}

var SLOT_FILL = { 'true': applySlotAsset, 'false': applySlotFallback };

function fillCollectSlot(theme) {
  [collectSlots[collectFilled]].filter(Boolean).forEach(function(slot) {
    var assetPath = getCollectAssetPath(theme);
    SLOT_FILL[String(!!assetPath)](slot, assetPath);
    slot.style.transform = 'scale(1.3)';
    setTimeout(function() { slot.style.transform = 'scale(1)'; }, 200);
    collectFilled++;
    [collectResetBtn].filter(Boolean)
      .filter(function() { return collectFilled >= collectSlots.length; })
      .forEach(function(btn) { btn.style.display = ''; });
  });
}

function resetCollectSlot(slot) {
  slot.innerHTML = '';
  slot.style.background = 'transparent';
  slot.style.border = '3px solid #aaa';
  slot.style.transform = '';
}

function unCollectEntity(e) { e.collected = false; }

function onCollectReset() {
  resetPlayer(state, activeScenario, 'start');
  state.entities.filter(function(e) { return e.type === 'collectible'; }).forEach(unCollectEntity);
  collectSlots.forEach(resetCollectSlot);
  collectFilled = 0;
  [collectResetBtn].filter(Boolean).forEach(function(btn) { btn.style.display = 'none'; });
}

window.startGame = function(scenario, theme) {
  activeScenario = scenario;
  var resolvedTheme = [theme, DEV_THEME].filter(Boolean)[0];
  state = createSimulation(scenario);
  addPlayer(state, createPlayer(scenario.resetPoints[0].position.x, scenario.resetPoints[0].position.y));
  var container = document.getElementById('frogger-container');
  container.innerHTML = '';
  rState = initFroggerRenderer(container, scenario, resolvedTheme);
  rState.resetBtn.addEventListener('click', onResetClick);
  buildCollectTray(scenario);
  var EV_HANDLER = {
    collectiblePickedUp: function(ev) { collectEntity(state, ev.entityId); fillCollectSlot(resolvedTheme); },
    obstacle: onCollision,
    hazard: onCollision
  };
  [loop].filter(Boolean).forEach(function(l) { l.stop(); });
  loop = createGameLoop(state, scenario, rState, function(s) {
    [detectCollisions(s, activeScenario)].filter(Boolean).forEach(function(ev) {
      [EV_HANDLER[ev.type]].filter(Boolean).forEach(function(fn) { fn(ev); });
    });
  });
  loop.start();
};

function onKeyDown(e) {
  e.preventDefault();
  applyInput(state, activeScenario, KEY_MAP[e.key]);
}

function bindControls() {
  var dirs = { 'btn-up': 'up', 'btn-down': 'down', 'btn-left': 'left', 'btn-right': 'right' };
  Object.keys(dirs).forEach(function(id) {
    var dir = dirs[id];
    var btn = document.querySelector('[data-testid="' + id + '"]');
    btn.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      [activeScenario].filter(Boolean).forEach(function() { applyInput(state, activeScenario, dir); });
    });
  });
  document.addEventListener('keydown', function(e) {
    [KEY_MAP[e.key]].filter(Boolean).forEach(function() { onKeyDown(e); });
  });
}

bindControls();
</script>
</body>
</html>
