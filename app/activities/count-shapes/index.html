<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Count Shapes</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script src="../../../components/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script src="../../../core/count-shapes/count-shapes-core.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Count Shapes" data-instruction="Count how many shapes you can see" data-no-links="standalone game"></div>
<div class="game-area">
  <div id="shapes" style="flex:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:min(18px,3vw);padding:10px 24px;"></div>
  <div style="display:flex;justify-content:center;gap:min(14px,2vw);padding:20px 20px 44px;">
    <button id="b1" onclick="check(1,this)" style="width:min(78px,17vw);height:min(78px,17vw);font-size:min(2.5em,7vw);border:none;border-radius:16px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">1</button>
    <button id="b2" onclick="check(2,this)" style="width:min(78px,17vw);height:min(78px,17vw);font-size:min(2.5em,7vw);border:none;border-radius:16px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">2</button>
    <button id="b3" onclick="check(3,this)" style="width:min(78px,17vw);height:min(78px,17vw);font-size:min(2.5em,7vw);border:none;border-radius:16px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">3</button>
    <button id="b4" onclick="check(4,this)" style="width:min(78px,17vw);height:min(78px,17vw);font-size:min(2.5em,7vw);border:none;border-radius:16px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">4</button>
    <button id="b5" onclick="check(5,this)" style="width:min(78px,17vw);height:min(78px,17vw);font-size:min(2.5em,7vw);border:none;border-radius:16px;background:#E8E8E8;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;">5</button>
  </div>
</div>
<script>
var types=['circle','square','triangle'];
var count,locked,currentType;
var DO_SPEAK={'true':function(el,text){window.__makeSpeakable(el,text);},'false':function(){}};

function reset(){
  locked=false;
  ['b1','b2','b3','b4','b5'].forEach(function(id){
    var el=document.getElementById(id);
    el.classList.remove('feedback-correct','feedback-wrong');
  });
}

var CHECK_RESULT={
  'true': function(btn){btn.classList.add('feedback-correct');showBanner(newRound);},
  'false':function(btn){btn.classList.add('feedback-wrong');setTimeout(reset,600);}
};

function check(n,btn){
  ({'true':function(){},'false':function(){locked=true;CHECK_RESULT[String(n===count)](btn);}})[String(locked)]();
}

function newRound(){
  count=Math.floor(Math.random()*5)+1;
  currentType=types[Math.floor(Math.random()*types.length)];
  var container=document.getElementById('shapes');
  container.innerHTML='';
  Array.from({length:count},function(){
    var btn=document.createElement('button');
    btn.style.cssText='background:none;border:none;padding:4px;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;';
    btn.innerHTML=svg(currentType);
    DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn,currentType);
    container.appendChild(btn);
  });
  reset();
}

window.addEventListener('load',function(){
  document.querySelectorAll('#shapes button:not(.speakable)').forEach(function(btn){
    DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn,currentType);
  });
});

newRound();
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='count-shapes';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
['b1','b2','b3','b4','b5'].forEach(function(id) {
  var el = document.getElementById(id);
  makeSpeakable(el, el.textContent);
});
</script>
</body>
</html>
