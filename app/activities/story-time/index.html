<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Time</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/panel.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#panel{width:180px;min-width:180px;}
#panel-header a{color:#9B59B6;}
#panel-header h2{font-size:1.05em;line-height:1.3;}
#panel-controls{padding:16px;display:flex;flex-direction:column;gap:10px;}
.ctrl-btn{font-family:inherit;font-size:1em;padding:12px 10px;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation;width:100%;text-align:center;}
#playbtn{background:#9B59B6;color:#fff;}
#stopbtn{background:#E74C3C;color:#fff;}
#speed-btns{display:flex;gap:6px;}
.speed-btn{font-family:inherit;font-size:0.85em;padding:8px 0;border:2px solid #ccc;border-radius:8px;cursor:pointer;touch-action:manipulation;flex:1;background:#fff;color:#555;}
.speed-btn.active{border-color:#9B59B6;background:#9B59B6;color:#fff;}
#main{flex:1;overflow-y:auto;background:#fff8f0;}
#player-area{padding:35vh 24px;display:flex;justify-content:center;}
#words-card{background:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08);padding:32px 28px;width:min(80%,900px);}
#words{font-size:min(2em,5.5vw);line-height:2.2;text-align:center;}
@media (orientation:portrait){
  body{flex-direction:column;}
  #panel{width:100%;min-width:0;border-right:none;border-bottom:2px solid #ddd;flex-direction:row;align-items:center;overflow-x:auto;flex-shrink:0;}
  #panel-header{border-bottom:none;padding:10px 14px;flex-shrink:0;}
  #panel-header h2{display:none;}
  #panel-controls{flex-direction:row;padding:10px 14px;gap:8px;align-items:center;flex-shrink:0;flex-wrap:nowrap;}
  .ctrl-btn{width:auto;padding:10px 14px;flex-shrink:0;}
  .speed-btn{flex-shrink:0;}
  #player-area{padding:20vh 16px;}
  #words{font-size:min(1.6em,5vw);}
}
.dict-word{background:#f0e6fa;color:#6c2fa0;cursor:pointer;}
.dict-word:hover{background:#e0ccf5;}
#dict-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;}
#dict-overlay.open{display:flex;}
#dict-sheet{background:#fff;border-radius:20px;padding:28px 24px;width:min(340px,90vw);text-align:center;position:relative;}
#dict-close{position:absolute;top:10px;right:14px;font-size:1.5em;background:none;border:none;cursor:pointer;color:#aaa;line-height:1;}
#dict-img{width:140px;height:140px;object-fit:contain;margin-bottom:12px;}
#dict-word-text{font-size:2em;font-weight:700;color:#333;margin-bottom:4px;}
#dict-phonics{font-size:1em;color:#888;font-style:italic;margin-bottom:16px;}
#dict-speak{font-size:1.2em;background:#9B59B6;color:#fff;border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;touch-action:manipulation;}
@media (orientation:portrait){
  #dict-overlay{align-items:flex-end;}
  #dict-sheet{border-radius:20px 20px 0 0;width:100%;padding:28px 24px 40px;}
}
</style>
</head>
<body>
<div id="panel">
  <div id="panel-header">
    <a href="../../stories/">&#127968; Lessons</a>
    <h2 id="story-title"></h2>
  </div>
  <div id="panel-controls">
    <button class="ctrl-btn" id="playbtn">&#9654; Play</button>
    <button class="ctrl-btn" id="stopbtn">&#9646;&#9646; Stop</button>
    <div id="speed-btns">
      <button class="speed-btn" data-speed="0.5">&#189;x</button>
      <button class="speed-btn" data-speed="0.75">&#190;x</button>
      <button class="speed-btn active" data-speed="1">1x</button>
    </div>
  </div>
</div>
<div id="main">
  <div id="player-area">
    <div id="words-card">
      <div id="words"></div>
    </div>
  </div>
</div>
<audio id="aud" preload="auto"></audio>
<div id="dict-overlay">
  <div id="dict-sheet">
    <button id="dict-close">&#215;</button>
    <img id="dict-img" src="" alt="" style="display:none;">
    <div id="dict-word-text"></div>
    <div id="dict-phonics"></div>
    <button id="dict-speak">&#128266;</button>
  </div>
</div>
<script src="../../../assets/story-time/story-time-data.js"></script>
<script type="module" src="player.js"></script>
<script>window.ADULT_PROMPTS_ACTIVITY='story-time';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
