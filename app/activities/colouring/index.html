<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colouring Pictures</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/style.css">
<script src="/homeschooling-app/app/shared/menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-home="/homeschooling-app/app/games/" data-prev="prevPicture" data-next="nextPicture"></div>
<div class="game-area">
  <div id="filter-bar" style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;"></div>
  <div class="game-title"><span id="title"></span></div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;">
    <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
</div>
<script src="/homeschooling-app/app/shared/colouring-common.js"></script>
<script src="/homeschooling-app/app/shared/filter-bar.js"></script>
<script src="/homeschooling-app/app/dictionary/dictionary.js"></script>
<script src="/homeschooling-app/app/dictionary/dictionary-helpers.js"></script>
<script>var pictures=[];</script>
<script src="/homeschooling-app/app/shared/colouring-pictures/sun.js"></script>
<script src="/homeschooling-app/app/shared/colouring-pictures/cat.js"></script>
<script src="/homeschooling-app/app/shared/colouring-pictures/fish.js"></script>
<script src="/homeschooling-app/app/shared/colouring-pictures/house.js"></script>
<script src="/homeschooling-app/app/shared/colouring-pictures/tree.js"></script>
<script>
var filtIdx=0,filled,total,filtered=[];

function render(){
  var pic=filtered[filtIdx];
  var svg=document.getElementById('svg');
  svg.innerHTML='';
  hideBanner();
  filled=0;
  total=pic.shapes.filter(function(s){return!s.noColour}).length;
  document.getElementById('title').textContent=pic.name;
  svg.setAttribute('viewBox',pic.vb);
  injectDotPattern(svg);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:'url(#dots)',stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    var el=ns(s.tag,attrs);
    if(s.noColour){svg.appendChild(el);return;}
    el.style.cursor='pointer';
    var done=false;
    el.addEventListener('click',function(){
      if(done)return;
      done=true;
      el.setAttribute('fill',s.colour);
      filled++;
      if(filled===total)showBanner(nextPicture);
    });
    svg.appendChild(el);
  });
}

function nextPicture(){filtIdx=(filtIdx+1)%filtered.length;render();}
function prevPicture(){filtIdx=(filtIdx+filtered.length-1)%filtered.length;render();}

Dictionary.init('/homeschooling-app/app/dictionary/');
loadColouringPictures(pictures,function(){
  buildFilterBar(pictures,function(f){filtered=f;filtIdx=0;render();});
});
</script>
</body>
</html>
