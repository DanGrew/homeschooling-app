<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Puzzle</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<style>
*{box-sizing:border-box;}
.puzzle-outer{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.puzzle-outer.portrait{flex-direction:row;align-items:stretch;}
.puzzle-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;}
.puzzle-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;}
#grid-area{position:relative;}
#reference-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.25;pointer-events:none;transition:opacity 0.3s;}
#puzzle-grid{width:100%;height:100%;}
#slot-area{display:flex;flex-direction:column;align-items:center;gap:10px;}
.slot-label{font-size:0.75em;color:#999;text-align:center;}
#selected-slot{border:3px dashed #ccc;border-radius:8px;overflow:hidden;background-repeat:no-repeat;}
#tray-bar{flex-shrink:0;display:flex;gap:8px;padding:10px;background:#f5f5f5;border-top:2px solid #ddd;align-items:center;justify-content:center;flex-wrap:wrap;}
.puzzle-outer.portrait #tray-bar{border-top:none;border-left:2px solid #ddd;align-items:flex-start;justify-content:flex-start;align-self:stretch;}
#ref-toggle{font-size:0.75em;padding:4px 10px;border:1px solid #ccc;border-radius:12px;background:#fff;cursor:pointer;color:#555;}
#error-msg{display:none;padding:20px;color:#E74C3C;text-align:center;font-size:1em;}
#puzzle-grid .feedback-correct,#puzzle-grid .feedback-wrong{outline:none;}
#puzzle-grid .feedback-correct::after,#puzzle-grid .feedback-wrong::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:2;}
#puzzle-grid .feedback-correct::after{box-shadow:inset 0 0 0 4px #2ECC71;}
#puzzle-grid .feedback-wrong::after{box-shadow:inset 0 0 0 4px #E74C3C;}
</style>
</head>
<body>
<div class="nav-bar" data-home="./" data-title="Puzzle" data-no-instruction="puzzle sets its own goal" data-no-links="standalone game"></div>

<div class="game-area">
  <div id="error-msg"></div>
  <div class="puzzle-outer" id="puzzle-outer">
    <div class="puzzle-wrapper">
      <div class="puzzle-row">
        <div id="grid-area">
          <img id="reference-img" src="" alt="">
          <div id="puzzle-grid"></div>
        </div>
        <div id="slot-area">
          <div class="slot-label">Selected</div>
          <div id="selected-slot"></div>
          <button id="ref-toggle">Hide guide</button>
        </div>
      </div>
    </div>
    <div id="tray-bar"></div>
  </div>
</div>

<script src="../../../components/menu.js" defer></script>
<script src="../../../ui/colouring/colouring-common.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
<script type="module">
  import { derivePieces, shufflePieces, checkPlacement, isComplete } from '../../../core/puzzle/puzzle-core.js';
  import { buildGrid, clearSelectedSlot, fillSelectedSlot, placeInCell, clearCell, markCell, lockCell } from '../../../ui/puzzle/puzzle-grid-ui.js';
  import { buildTray, highlightTray, removeTrayPiece, restoreTrayPiece, lockTrayPiece } from '../../../ui/puzzle/puzzle-tray-ui.js';
  import { showBanner, hideBanner } from '../../../components/success-banner.js';
  import { recordLearningEvent } from '../../../core/telemetry/learning-events.js';

  const params = new URLSearchParams(location.search);
  const puzzleId = sessionStorage.getItem('puzzle-id') || params.get('puzzle') || 'paw-patrol';
  const gridParam = sessionStorage.getItem('puzzle-grid') || params.get('grid') || '4x3';
  const [colsStr, rowsStr] = gridParam.split('x');
  const PUZZLE = {
    src: `../../../assets/puzzle/${puzzleId}/full.jpg`,
    grid: { rows: parseInt(rowsStr, 10), cols: parseInt(colsStr, 10) }
  };

  const MAX_PIXELS = 4_000_000;

  const slot = document.getElementById('selected-slot');
  const gridContainer = document.getElementById('puzzle-grid');
  const trayContainer = document.getElementById('tray-bar');
  const refImg = document.getElementById('reference-img');
  const refToggle = document.getElementById('ref-toggle');
  const errorMsg = document.getElementById('error-msg');
  const puzzleOuter = document.getElementById('puzzle-outer');

  let imgRatio = 1;
  let cellW = 64, cellH = 64;
  let tileW = 32, tileH = 32;
  let slotW = 80, slotH = 80;

  function isPortrait() { return imgRatio < 1; }

  function sizeGrid() {
    const p = +isPortrait();
    const availW = window.innerWidth * [0.60, 0.48][p];
    const availH = window.innerHeight * [0.65, 0.80][p];
    const gridH = Math.floor(Math.min(availH, availW / imgRatio));
    const gridW = Math.floor(gridH * imgRatio);
    cellH = Math.floor(gridH / PUZZLE.grid.rows);
    cellW = Math.floor(gridW / PUZZLE.grid.cols);
    const gridArea = document.getElementById('grid-area');
    gridArea.style.width = `${gridW}px`;
    gridArea.style.height = `${gridH}px`;
  }

  const allPieces = derivePieces(PUZZLE.grid);
  let placements = {};
  let selectedPiece = null;
  let shuffledPieces = [];
  let gridEl, trayEl;
  let refVisible = true;
  let locked = false;

  refToggle.addEventListener('click', () => {
    refVisible = !refVisible;
    refImg.style.opacity = ['0', '0.25'][+refVisible];
    refToggle.textContent = ['Show guide', 'Hide guide'][+refVisible];
  });

  function revealPicture(onDone) {
    const from = parseFloat(refImg.style.opacity);
    refImg.style.zIndex = '2';
    const startTs = performance.now();
    const dur = 1200;
    function step(ts) {
      const t = Math.min((ts - startTs) / dur, 1);
      refImg.style.opacity = String(from + (1 - from) * t);
      [onDone, () => requestAnimationFrame(step)][+(t < 1)]();
    }
    requestAnimationFrame(step);
  }

  function applyLayout() {
    tileH = Math.max(20, Math.floor(cellH / 2));
    tileW = Math.round(tileH * cellW / cellH);
    slotH = Math.max(80, Math.min(cellH, Math.floor(window.innerHeight * 0.20)));
    slotW = Math.round(slotH * cellW / cellH);
    slot.style.width = `${slotW}px`;
    slot.style.height = `${slotH}px`;
    const landscapeCols = Math.min(allPieces.length, Math.floor((puzzleOuter.clientWidth - 40) / (tileW + 6)));
    const availTrayH = puzzleOuter.clientHeight;
    const maxPortraitRows = Math.max(1, Math.floor((availTrayH - 30) / (tileH + 6)));
    const portraitCols = Math.max(1, Math.ceil(allPieces.length / maxPortraitRows));
    const trayColCount = [landscapeCols, portraitCols][+isPortrait()];
    trayEl = buildTray(trayContainer, shuffledPieces, onSelect,
      PUZZLE.src, tileW * PUZZLE.grid.cols, tileH * PUZZLE.grid.rows, tileW, tileH,
      trayColCount);
  }

  function restorePlacements() {
    Object.entries(placements).forEach(([key, { pieceId, correct }]) => {
      const [r, c] = key.split('_').map(Number);
      const piece = allPieces.find(p => p.id === pieceId);
      placeInCell(gridEl, r, c, PUZZLE.src, cellW * PUZZLE.grid.cols, cellH * PUZZLE.grid.rows, cellW, cellH, piece.correct.row, piece.correct.col);
      markCell(gridEl, r, c, correct);
      removeTrayPiece(trayEl, pieceId);
      [() => {}, () => { lockCell(gridEl, r, c); lockTrayPiece(trayEl, pieceId); }][+correct]();
    });
  }

  function onResize() {
    sizeGrid();
    [() => {}, () => {
      applyLayout();
      restorePlacements();
      [() => {}, () => fillSelectedSlot(slot, selectedPiece, PUZZLE.src, slotW * PUZZLE.grid.cols, slotH * PUZZLE.grid.rows, slotW, slotH)][+!!selectedPiece]();
      highlightTray(trayEl, selectedPiece?.id);
    }][+!!gridEl]();
  }

  function start() {
    locked = false;
    placements = {};
    selectedPiece = null;
    shuffledPieces = shufflePieces(allPieces);
    refImg.style.zIndex = '';
    refImg.style.opacity = ['0', '0.25'][+refVisible];
    refToggle.disabled = false;
    clearSelectedSlot(slot);
    gridEl = buildGrid(gridContainer, PUZZLE.grid.rows, PUZZLE.grid.cols, onCellTap);
    applyLayout();
  }

  function onSelect(pieceId) {
    selectedPiece = allPieces.find(p => p.id === pieceId);
    highlightTray(trayEl, pieceId);
    fillSelectedSlot(slot, selectedPiece, PUZZLE.src,
      slotW * PUZZLE.grid.cols, slotH * PUZZLE.grid.rows, slotW, slotH);
  }

  function completionCheck() {
    locked = true;
    refToggle.disabled = true;
    recordLearningEvent({ version: 1, type: 'learning_completed', timestamp: Date.now(), learning_id: 'puzzle', variant_id: puzzleId, difficulty: gridParam, activity_id: 'puzzle' });
    revealPicture(() => {
      showBanner({ buttons: [{ label: 'Choose another \u2192', onClick: function() { hideBanner(); location.href = './'; } }] });
    });
  }

  function liftPiece(row, col, key) {
    const existing = placements[key];
    clearCell(gridEl, row, col);
    delete placements[key];
    restoreTrayPiece(trayEl, existing.pieceId);
    selectedPiece = allPieces.find(p => p.id === existing.pieceId);
    highlightTray(trayEl, selectedPiece.id);
    fillSelectedSlot(slot, selectedPiece, PUZZLE.src,
      slotW * PUZZLE.grid.cols, slotH * PUZZLE.grid.rows, slotW, slotH);
  }

  function dropPiece(row, col) {
    const correct = checkPlacement(selectedPiece, { row, col });
    placements[`${row}_${col}`] = { pieceId: selectedPiece.id, correct };
    placeInCell(gridEl, row, col, PUZZLE.src,
      cellW * PUZZLE.grid.cols, cellH * PUZZLE.grid.rows, cellW, cellH,
      selectedPiece.correct.row, selectedPiece.correct.col);
    markCell(gridEl, row, col, correct);
    removeTrayPiece(trayEl, selectedPiece.id);
    [() => {}, () => { lockCell(gridEl, row, col); lockTrayPiece(trayEl, selectedPiece.id); }][+correct]();
    selectedPiece = null;
    clearSelectedSlot(slot);
    highlightTray(trayEl, null);
    [() => {}, completionCheck][+(isComplete(placements, allPieces.length))]();
  }

  function tapUnoccupied(row, col) {
    [() => {}, () => dropPiece(row, col)][+!!selectedPiece]();
  }

  function onCellTap(row, col) {
    const key = `${row}_${col}`;
    [() => [liftPiece, tapUnoccupied][+!placements[key]](row, col, key), () => {}][+locked]();
  }

  window.addEventListener('resize', onResize);
  window.__puzzleState = { getPieces: () => allPieces, getPlacements: () => placements };

  function showError(pixels) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = `Image too large (${fullImage.naturalWidth}\u00d7${fullImage.naturalHeight} = ${(pixels / 1_000_000).toFixed(1)}MP). Keep images under 4MP.`;
  }

  function initPuzzle() {
    imgRatio = fullImage.naturalWidth / fullImage.naturalHeight;
    puzzleOuter.classList.toggle('portrait', isPortrait());
    sizeGrid();
    start();
  }

  function onImageLoad() {
    const pixels = fullImage.naturalWidth * fullImage.naturalHeight;
    [initPuzzle, () => showError(pixels)][+(pixels > MAX_PIXELS)]();
  }

  const fullImage = new Image();
  fullImage.onload = onImageLoad;
  fullImage.onerror = () => { sizeGrid(); start(); };
  fullImage.src = PUZZLE.src;
  refImg.src = PUZZLE.src;
</script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
var refToggle = document.getElementById('ref-toggle');
makeSpeakable(refToggle, function() { return refToggle.textContent; });
makeSpeakable(document.querySelector('.slot-label'), 'Selected');
</script>
</body>
</html>
