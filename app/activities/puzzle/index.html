<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Puzzle</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<style>
*{box-sizing:border-box;}
.chooser-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:28px;padding:20px;overflow:auto;}
.puzzle-cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;}
.puzzle-card{cursor:pointer;border:4px solid transparent;border-radius:14px;overflow:hidden;background:#f5f5f5;transition:border-color 0.15s;display:flex;flex-direction:column;align-items:center;}
.puzzle-card.selected{border-color:#F5A623;}
.puzzle-card img{width:200px;height:150px;object-fit:cover;display:block;}
.puzzle-card-name{padding:8px 14px;font-size:0.95em;font-weight:bold;color:#444;text-align:center;}
#grid-picker{display:none;flex-direction:column;align-items:center;gap:14px;}
#grid-picker.visible{display:flex;}
.grid-picker-prompt{font-size:0.85em;color:#888;}
.grid-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
.grid-btn{cursor:pointer;padding:14px 28px;border:3px solid #ddd;border-radius:14px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:100px;transition:border-color 0.15s;}
.grid-btn:hover,.grid-btn:focus{border-color:#F5A623;outline:none;}
.grid-btn-label{font-size:1.05em;font-weight:bold;color:#444;}
.grid-btn-size{font-size:0.75em;color:#aaa;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Puzzle" data-instruction="Choose a puzzle to solve" data-no-links="standalone game"></div>
<div class="game-area">
  <div class="chooser-wrap">
    <div class="puzzle-cards" id="puzzle-cards"></div>
    <div id="grid-picker">
      <div class="grid-picker-prompt" id="grid-picker-prompt">Choose difficulty</div>
      <div class="grid-btns" id="grid-btns"></div>
    </div>
  </div>
</div>
<script src="../../../components/menu.js" defer></script>
<script>
var DO_SPEAK={'true':function(el,text){window.__makeSpeakable(el,text);},'false':function(){}};
const LABELS = {
  1: ['Play'],
  2: ['Easy', 'Hard'],
  3: ['Easy', 'Medium', 'Hard'],
  4: ['Easy', 'Medium', 'Hard', 'Expert'],
  5: ['Easy', 'Medium', 'Hard', 'Expert', 'Master'],
};

function makeGridBtn(p, g, label) {
  const [cols, rows] = g.split('x');
  const btn = document.createElement('button');
  btn.className = 'grid-btn';
  btn.innerHTML = `<span class="grid-btn-label">${label}</span><span class="grid-btn-size">${cols}\u00d7${rows}</span>`;
  btn.addEventListener('click', () => {
    sessionStorage.setItem('puzzle-id', p.id);
    sessionStorage.setItem('puzzle-grid', g);
    location.href = 'play.html';
  });
  DO_SPEAK[String(typeof window.__makeSpeakable==='function')](btn, label);
  return btn;
}

function selectPuzzle(p, card, picker, btnsEl) {
  document.querySelectorAll('.puzzle-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  btnsEl.innerHTML = '';
  const labels = LABELS[p.grids.length];
  p.grids.forEach((g, i) => btnsEl.appendChild(makeGridBtn(p, g, labels[i])));
  picker.classList.add('visible');
}

function initChooser(puzzles) {
  puzzles.sort((a, b) => a.name.localeCompare(b.name));
  const cardsEl = document.getElementById('puzzle-cards');
  const picker = document.getElementById('grid-picker');
  const btnsEl = document.getElementById('grid-btns');
  puzzles.forEach(p => {
    const card = document.createElement('div');
    card.className = 'puzzle-card';
    card.innerHTML = `<img src="../../../assets/puzzle/${p.id}/full.jpg" alt="${p.name}"><div class="puzzle-card-name">${p.name}</div>`;
    card.addEventListener('click', () => selectPuzzle(p, card, picker, btnsEl));
    DO_SPEAK[String(typeof window.__makeSpeakable==='function')](card, p.name);
    cardsEl.appendChild(card);
  });
  [() => {}, () => selectPuzzle(puzzles[0], cardsEl.firstElementChild, picker, btnsEl)][+(puzzles.length === 1)]();
}

</script>
<script>window.ADULT_PROMPTS_ACTIVITY='puzzle';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
var _prompt=document.getElementById('grid-picker-prompt');
[_prompt].filter(Boolean).forEach(function(el){ makeSpeakable(el,'Choose difficulty'); });
fetch('../../../content/puzzle/manifest.json').then(function(r){return r.json();}).then(initChooser);</script>
</body>
</html>
