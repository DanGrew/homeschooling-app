<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shopping Play</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<link rel="stylesheet" href="../../shared/shopping-shared.css">
<script src="../../shared/menu.js" defer></script>
</head>
<body>
<div class="nav-bar" data-home="../../games/"></div>
<div class="game-area">
  <div id="filter-bar"></div>
  <div id="phase1">
    <div id="game-body">
      <div id="catalog-area">
        <div id="catalog-title">Choose items for your list:</div>
        <div id="tiles-scroll"><div id="tiles"></div></div>
      </div>
      <div id="list-panel">
        <div id="list-header">🛒 My List</div>
        <div id="list-items"><div id="empty-list">Tap items to add them</div></div>
      </div>
    </div>
    <div id="go-bar">
      <button class="btn-go" id="btn-find" disabled>Find it! 🔍</button>
    </div>
  </div>
  <div id="phase2">
    <div id="phase2-title">Find each item! 🔍</div>
    <div id="find-list"></div>
  </div>
</div>
<div id="success-banner">
  ✅
  <span style="font-size:0.65em;margin-top:8px;">Well done!</span>
  <button id="btn-again">Play Again!</button>
</div>
<script type="module">
import { buildFilterBar } from '../../../ui/filter-bar/filter-bar-ui.js';
import { flattenCatalogs, setAllItems, resetListItems, filterListItems, renderTiles, renderList, showPhase1, startFindPhase } from '../../../ui/shopping/shopping-ui.js';
var CATALOGS=[
  {"name":"Fruit","tags":["fruit"],"items":[
    {"name":"Apple","icon":"🍎"},
    {"name":"Banana","icon":"🍌"},
    {"name":"Grapes","icon":"🍇"},
    {"name":"Lemon","icon":"🍋"},
    {"name":"Orange","icon":"🍊"},
    {"name":"Pear","icon":"🍐"},
    {"name":"Strawberry","icon":"🍓"},
    {"name":"Watermelon","icon":"🍉"}
  ]},
  {"name":"Vegetables","tags":["vegetables"],"items":[
    {"name":"Broccoli","icon":"🥦"},
    {"name":"Carrot","icon":"🥕"},
    {"name":"Corn","icon":"🌽"},
    {"name":"Lettuce","icon":"🥬"},
    {"name":"Pepper","icon":"🫑"},
    {"name":"Tomato","icon":"🍅"}
  ]},
  {"name":"Dairy","tags":["dairy"],"items":[
    {"name":"Butter","icon":"🧈"},
    {"name":"Cheese","icon":"🧀"},
    {"name":"Eggs","icon":"🥚"},
    {"name":"Milk","icon":"🥛"},
    {"name":"Yogurt","icon":"🫙"}
  ]},
  {"name":"Bakery","tags":["bakery"],"items":[
    {"name":"Bread","icon":"🍞"},
    {"name":"Croissant","icon":"🥐"},
    {"name":"Muffin","icon":"🧁"}
  ]},
  {"name":"Groceries","tags":["groceries"],"items":[
    {"name":"Beans","icon":"🥫"},
    {"name":"Boule","icon":"🍞"},
    {"name":"Crumpets","icon":"🥖"},
    {"name":"Milk","icon":"🥛"},
    {"name":"Orange Breakie","icon":"🍊"},
    {"name":"Organic Butter","icon":"🧈"},
    {"name":"Pouch - Cottage Pie","icon":"🥣"},
    {"name":"Pouch - Pulled Pork","icon":"🥩"},
    {"name":"Purple Breakie","icon":"🫐"},
    {"name":"Sauce - BBQ","icon":"🥫"}
  ]}
];

document.getElementById('btn-find').onclick=startFindPhase;

document.getElementById('btn-again').onclick=function(){
  document.getElementById('success-banner').style.display='none';
  document.getElementById('phase2').style.display='none';
  resetListItems();
  showPhase1();
  renderList();
  renderTiles();
};

function initGame(){
  setAllItems(flattenCatalogs(CATALOGS));
  buildFilterBar(CATALOGS.map(function(c){return{tags:[].concat(c.tags).filter(Boolean),name:c.name};}),function(filtered){
    var items=[];
    filtered.forEach(function(c){
      CATALOGS.filter(function(cat){return cat.name===c.name;}).forEach(function(cat){
        items=items.concat(cat.items.map(function(it){return{name:it.name,icon:it.icon,tags:[].concat(cat.tags).filter(Boolean),catalog:cat.name};}));
      });
    });
    setAllItems(items);
    filterListItems(function(li){return items.some(function(i){return i.name+'/'+i.catalog===li.name+'/'+li.catalog;});});
    renderTiles();
    renderList();
  });
}

initGame();
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='shopping-play';</script>
<script src="../../../ui/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
