<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace Letters</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<script>
  window.DICT_BASE = '../../../content/dictionary/entries/';
  window.LESSONS = [
    {id:'vowels',              number:1, title:'Vowels'},
    {id:'round_letters',       number:2, title:'Round Letters'},
    {id:'first_five',          number:3, title:'First Five Letters'},
    {id:'digits_one_to_five',  number:4, title:'Count and Write 1 to 5'},
    {id:'digits_six_to_ten',   number:5, title:'Count and Write 6 to 10'}
  ];
</script>
<script src="../../../components/menu.js" defer></script>
<style>
  .mode-btns{display:flex;gap:12px;justify-content:center;padding:10px 16px 0;flex-wrap:wrap;}
  .mode-btn{border:none;border-radius:16px;padding:12px 28px;font-size:1.1em;font-family:inherit;font-weight:bold;cursor:pointer;}
  .mode-btn:disabled{opacity:0.35;cursor:default;}
  #btn-trace{background:#E74C3C;color:white;}
  #btn-speak{background:#3498DB;color:white;}
  #btn-tryit{background:#2ECC71;color:white;}
  #btn-watch{background:#9B59B6;color:white;}
  #btn-stop{background:#E74C3C;color:white;}
  .trace-hint{text-align:center;font-size:1em;color:#888;padding:4px 16px;display:none;}
  @keyframes dot-pulse{0%,100%{r:14;opacity:1;}50%{r:18;opacity:0.7;}}
  .dot-pulse{animation:dot-pulse 0.7s ease-in-out infinite;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Trace Letters" data-instruction="Trace the letters with your finger" data-no-links="standalone lesson"></div>
<div class="game-area">
  <div class="mode-btns">
    <button class="mode-btn" id="btn-trace" style="display:none">&#9654; Trace</button>
    <button class="mode-btn" id="btn-watch">&#128218; Watch</button>
    <button class="mode-btn" id="btn-speak">&#128264; Speak</button>
    <button class="mode-btn" id="btn-tryit">Try It &#8594;</button>
    <button class="mode-btn" id="btn-stop" style="display:none">&#9632; Reset</button>
  </div>
  <div class="trace-hint" id="trace-hint">Hold the red ball and trace!</div>
  <div id="trace-area" style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <svg id="svg" viewBox="0 0 200 250" style="width:clamp(224px,44vmin,368px);height:clamp(280px,55vmin,460px);max-height:100%;touch-action:none;" preserveAspectRatio="xMidYMid meet">
      <path id="base" fill="none" stroke="#ddd" stroke-width="18" stroke-linecap="butt" stroke-linejoin="round"/>
      <circle id="ball" r="16" fill="#E74C3C" stroke="white" stroke-width="3"/>
    </svg>
  </div>
  <div id="paginator-bar"></div>
</div>

<script src="../../../core/trace/trace-core.js"></script>
<script src="../../../ui/trace/trace-ui.js"></script>
<script type="module">
import { init } from '../../../ui/character-lesson/character-lesson-ui.js';
import { GuidanceService } from '../../../components/guidance/guidance-service.js';
window.addEventListener('load', function() {
  init();
  fetch('../../../content/lessons/character-lesson.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      window.LESSON_MAP = {};
      data.lessons.forEach(function(l) { window.LESSON_MAP[l.id] = l; });
      window.guidanceService = new GuidanceService();
    });
});
</script>
<script>window.ACTIVITY_ID='character-lesson';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">
import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
[['btn-trace','Trace'],['btn-watch','Watch'],['btn-tryit','Try It'],['btn-stop','Reset']].forEach(function(pair) {
  makeSpeakable(document.getElementById(pair[0]), pair[1]);
});
</script>
</body>
</html>
