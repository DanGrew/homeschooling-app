<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Logic Gates</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#puzzle-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow:hidden;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Logic Gates" data-instruction="Flip switches to explore" data-no-links="standalone lessons page"></div>
<div class="game-area">
  <div id="puzzle-area"></div>
  <div id="paginator-bar"></div>
</div>

<script>
window.ACTIVITY_ID = 'logic-gates';
window.DICT_BASE = '../../../content/dictionary/entries/';
window.LEARNINGS_BASE = '../../../content/learnings/';
window.LESSONS = [
  { id: 'logic-gates-lesson-meet_switch', number: 1, title: 'Meet the Switch' },
  { id: 'and_gate',               number: 2, title: 'AND Gate',      puzzle_id: 'and_station' },
  { id: 'or_gate',                number: 3, title: 'OR Gate',       puzzle_id: 'or_station' },
  { id: 'not_gate',               number: 4, title: 'NOT Gate' },
  { id: 'xor_gate',               number: 5, title: 'XOR Gate',      puzzle_id: 'xor_station' },
  { id: 'lesson_2-AND_2-AND-AND', number: 6, title: 'AND Cascade',   puzzle_id: '2-AND_2-AND-AND' },
  { id: 'logic-gates-lesson-chain',        number: 7, title: 'Chain of Gates' },
  { id: 'logic-gates-lesson-big_decision', number: 8, title: 'Big Decision' }
];
window.EXERCISES = [
  { id: 'logic-gates-exercise-chain',    number: 1, title: 'Follow the Chain' },
  { id: 'logic-gates-exercise-two_ways', number: 2, title: 'Two Ways' }
];
</script>

<script src="../../../components/menu.js" defer></script>
<script src="../../../core/logic-gates/logic-engine.js"></script>
<script src="../../../core/logic-gates/logic-gates-core.js"></script>
<script src="../../../ui/logic-gates/output-ui.js"></script>
<script src="../../../ui/logic-gates/station-ui.js"></script>
<script src="../../../ui/logic-gates/puzzle-ui.js"></script>

<script type="module">
import { createPaginator } from '../../../components/pagination/paginator-ui.js';
import { buildSimpleFilterBar } from '../../../components/filter-bar/filter-bar-ui.js';
import { GuidanceService } from '../../../components/guidance/guidance-service.js';

var allItems = [];

var FILTERS = {
  all:        function() { return true; },
  primitive:  function(p) { return p.category === 'primitive'; },
  linear:     function(p) { return p.category === 'linear'; },
  converging: function(p) { return p.category === 'converging'; }
};
var filterFn = FILTERS.all;

function renderPrimitive(item) {
  var area = document.getElementById('puzzle-area');
  area.innerHTML = '';
  var svg = window.StationUI.buildStation(item, function(id) { svg._handleToggle(id); });
  area.appendChild(svg);
}

var ITEM_RENDER = {
  primitive:  function(item) { renderPrimitive(item); },
  linear:     function(item) { window.PuzzleUI.loadPuzzle(item); },
  converging: function(item) { window.PuzzleUI.loadPuzzle(item); }
};
function renderItem(item) { ITEM_RENDER[item.category](item); }

var paginator = createPaginator({
  container: document.getElementById('paginator-bar'),
  items: [],
  perPage: 1,
  wrap: true,
  onRender: renderItem
});

function applyFilter() { paginator.reset(allItems.filter(filterFn)); }

buildSimpleFilterBar([
  { value: 'all',        label: 'All' },
  { value: 'primitive',  label: 'Primitives', icon: '\u2795' },
  { value: 'linear',     label: 'Linear',     icon: '\u25B6\uFE0F' },
  { value: 'converging', label: 'Converging', icon: '\uD83D\uDD00' }
], function(cat) {
  filterFn = FILTERS[cat];
  applyFilter();
}, 'all');

function _findCurrentSvg() { return document.querySelector('#puzzle-area svg'); }

var _FIND_SWITCH_IN_SVG = {
  'true':  function(svg, label) { return svg.querySelector('[data-switch-label="' + label + '"]'); },
  'false': function() { return null; }
};
function _findSwitch(label) {
  var svg = document.querySelector('#puzzle-area svg');
  return _FIND_SWITCH_IN_SVG[String(svg !== null)](svg, label);
}

var _RESET_ITEM = {
  'true':  function(item) { paginator.reset([item]); },
  'false': function() {}
};
function _navigateTo(id) {
  var item = allItems.filter(function(i) { return i.id === id; })[0];
  _RESET_ITEM[String(item !== undefined)](item);
}

var _LOCK_EL = {
  'true':  function(g) { g.style.pointerEvents = 'none'; g.style.opacity = '0.4'; },
  'false': function() {}
};
function _lockSwitch(label) {
  var g = _findSwitch(label);
  _LOCK_EL[String(g !== null)](g);
}

var _UNLOCK_EL = {
  'true':  function(g) { g.style.pointerEvents = ''; g.style.opacity = ''; },
  'false': function() {}
};
function _unlockSwitch(label) {
  var g = _findSwitch(label);
  _UNLOCK_EL[String(g !== null)](g);
}

var _UNLOCK_ALL_SVG = {
  'true':  function(svg) { svg.querySelectorAll('[data-switch-label]').forEach(function(g) { g.style.pointerEvents = ''; g.style.opacity = ''; }); },
  'false': function() {}
};
function _unlockAll() {
  _UNLOCK_ALL_SVG[String(_findCurrentSvg() !== null)](_findCurrentSvg());
}

var _GET_STATES = {
  'true':  function(svg) { return svg._getInputStates(); },
  'false': function() { return {}; }
};
var _TOGGLE_IF_ON = {
  'true':  function(svg, id) { svg._handleToggle(id); },
  'false': function() {}
};
var _APPLY_SWITCH_OFF_G = {
  'true': function(svg, g) {
    var id = g.getAttribute('data-switch');
    var states = _GET_STATES[String(typeof svg._getInputStates === 'function')](svg);
    _TOGGLE_IF_ON[String(!!states[id])](svg, id);
  },
  'false': function() {}
};
var _APPLY_SWITCH_OFF_SVG = {
  'true': function(svg, label) {
    var g = svg.querySelector('[data-switch-label="' + label + '"]');
    _APPLY_SWITCH_OFF_G[String(g !== null)](svg, g);
  },
  'false': function() {}
};
function _setSwitchOff(label) {
  var svg = _findCurrentSvg();
  _APPLY_SWITCH_OFF_SVG[String(svg !== null)](svg, label);
}

var _RESET_SWITCHES_SVG = {
  'true': function(svg) {
    var states = _GET_STATES[String(typeof svg._getInputStates === 'function')](svg);
    Object.keys(states).forEach(function(id) {
      _TOGGLE_IF_ON[String(!!states[id])](svg, id);
    });
  },
  'false': function() {}
};
function _resetSwitches() {
  var svg = _findCurrentSvg();
  _RESET_SWITCHES_SVG[String(svg !== null)](svg);
}

var PAGE_CTRL = {
  'SHOW_SINGLE_AND_GATE':       function() { _navigateTo('and_station'); },
  'SHOW_SINGLE_NOT_GATE':       function() { _navigateTo('not_station'); },
  'SHOW_LINEAR_OR_AND':         function() { _navigateTo('2-OR-1-AND'); },
  'SHOW_LINEAR_AND_OR':         function() { _navigateTo('2-AND-1-OR'); },
  'SHOW_CONVERGING_OR_OR_AND':  function() { _navigateTo('2-OR_2-OR-AND'); },
  'SHOW_CONVERGING_AND_AND_OR': function() { _navigateTo('2-AND_2-AND-OR'); },
  'LOCK_SWITCH_A':              function() { _lockSwitch('A'); },
  'LOCK_SWITCH_B':              function() { _lockSwitch('B'); },
  'LOCK_SWITCH_C':              function() { _lockSwitch('C'); },
  'LOCK_SWITCH_D':              function() { _lockSwitch('D'); },
  'UNLOCK_SWITCH_A':            function() { _unlockSwitch('A'); },
  'UNLOCK_SWITCH_B':            function() { _unlockSwitch('B'); },
  'UNLOCK_SWITCH_C':            function() { _unlockSwitch('C'); },
  'UNLOCK_SWITCH_D':            function() { _unlockSwitch('D'); },
  'SET_SWITCH_A_OFF':           function() { _setSwitchOff('A'); },
  'RESET_SWITCHES':             function() { _resetSwitches(); },
  'PAGE_CONTROL_RESET':         function() { _unlockAll(); }
};

var _CTRL_DISPATCH = {
  'true':  function(type) { PAGE_CTRL[type](); },
  'false': function() {}
};
window.addEventListener('page:control', function(e) {
  _CTRL_DISPATCH[String(e.detail.type in PAGE_CTRL)](e.detail.type);
});

var _guidance = new GuidanceService();
window.guidanceService = {
  start: function(entry) {
    allItems.filter(function(i) { return i.id === entry.puzzle_id; }).slice(0, 1).forEach(function(item) { paginator.reset([item]); });
    _guidance.start(entry);
  }
};

Promise.all([
  fetch('../../../content/logic-gates/sandbox.json?v=2').then(function(r) { return r.json(); }),
  fetch('../../../content/logic-gates/puzzles-linear.json?v=1').then(function(r) { return r.json(); }),
  fetch('../../../content/logic-gates/puzzles-converging.json?v=1').then(function(r) { return r.json(); })
]).then(function(results) {
  var stations = results[0].map(function(s) { return Object.assign({}, s, { category: 'primitive' }); });
  allItems = stations.concat(results[1]).concat(results[2]);
  applyFilter();
}).catch(function(err) {
  console.error('logic gates load error:', err);
});
</script>

<script type="module">
import '../../../components/speech/speech-ui.js';
import '../../../components/speech/speakable.js';
</script>
</body>
</html>
