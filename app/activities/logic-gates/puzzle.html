<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Logic Puzzle</title>
<link rel="stylesheet" href="../../shared/theme.css">
<link rel="stylesheet" href="../../shared/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#goal-banner{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 20px;background:#f0f4ff;border-bottom:2px solid #d0d8f0;flex-shrink:0;}
#goal-text{font-size:1.3em;font-weight:bold;color:#333;text-align:center;}
#puzzle-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow:hidden;}
#btn-reset{font-size:1em;padding:10px 28px;border:none;border-radius:12px;background:#eee;color:#555;font-family:inherit;font-weight:bold;cursor:pointer;touch-action:manipulation;}
#btn-reset:active{transform:scale(0.96);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Logic Puzzle" data-links='[{"href":"sandbox.html","label":"Explore"}]' data-links-icon="lesson"></div>
<div class="game-area">
  <div id="goal-banner">
    <span style="font-size:1.4em;">🎯</span>
    <span id="goal-text">Loading…</span>
  </div>
  <div id="puzzle-area"></div>
  <div style="display:flex;justify-content:center;padding:8px 16px;flex-shrink:0;">
    <button id="btn-reset">Reset</button>
  </div>
  <div id="paginator-bar"></div>
</div>
<script src="../../shared/menu.js" defer></script>
<script type="module" src="../../../ui/shared/success-banner.js"></script>
<script src="../../../core/logic-gates/logic-engine.js"></script>
<script src="../../../ui/logic-gates/output-ui.js"></script>
<script src="../../../ui/logic-gates/station-ui.js"></script>
<script src="../../../ui/logic-gates/puzzle-ui.js"></script>
<script type="module">
import { createPaginator } from '../../../ui/pagination/paginator-ui.js';

fetch('../../../content/logic-gates/puzzles.json?v=2')
  .then(function(r) { return r.json(); })
  .then(function(puzzles) {
    var paginator = createPaginator({
      container: document.getElementById('paginator-bar'),
      items: [],
      perPage: 1,
      wrap: true,
      onRender: function(puzzle) {
        window.PuzzleUI.loadPuzzle(puzzle);
      }
    });
    window._puzzlePaginator = paginator;
    paginator.reset(puzzles);
  })
  .catch(function(err) {
    document.getElementById('goal-text').textContent = 'Failed to load puzzles';
    console.error('puzzle load error:', err);
  });
</script>
</body>
</html>
