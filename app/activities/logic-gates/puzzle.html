<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Logic Puzzle</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#goal-banner{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 20px;background:#f0f4ff;border-bottom:2px solid #d0d8f0;flex-shrink:0;}
#goal-text{font-size:1.3em;font-weight:bold;color:#333;text-align:center;}
#puzzle-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow:hidden;}
#btn-reset{font-size:1em;padding:10px 28px;border:none;border-radius:12px;background:#eee;color:#555;font-family:inherit;font-weight:bold;cursor:pointer;touch-action:manipulation;}
#btn-reset:active{transform:scale(0.96);}
#filter-bar{display:flex;justify-content:center;gap:8px;padding:10px 16px;flex-shrink:0;border-bottom:1px solid #eee;}
.filter-btn{font-size:0.95em;padding:7px 18px;border:none;border-radius:10px;background:#eee;color:#555;font-family:inherit;font-weight:bold;cursor:pointer;touch-action:manipulation;}
.filter-btn.active{background:#2ECC71;color:#fff;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-title="Logic Puzzle" data-instruction="Try to turn the lights and fans on and off" data-links='[{"href":"sandbox.html","label":"Explore"}]' data-links-icon="lesson"></div>
<div class="game-area">
  <div id="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="linear">Linear</button>
    <button class="filter-btn" data-cat="converging">Converging</button>
  </div>
  <div id="goal-banner">
    <span style="font-size:1.4em;">🎯</span>
    <span id="goal-text">Loading…</span>
  </div>
  <div id="puzzle-area"></div>
  <div style="display:flex;justify-content:center;padding:8px 16px;flex-shrink:0;">
    <button id="btn-reset">Reset</button>
  </div>
  <div id="paginator-bar"></div>
</div>
<script src="../../../components/menu.js" defer></script>
<script type="module" src="../../../components/success-banner.js"></script>
<script src="../../../core/logic-gates/logic-engine.js"></script>
<script src="../../../core/logic-gates/logic-gates-core.js"></script>
<script src="../../../ui/logic-gates/output-ui.js"></script>
<script src="../../../ui/logic-gates/station-ui.js"></script>
<script src="../../../ui/logic-gates/puzzle-ui.js"></script>
<script type="module">
import { createPaginator } from '../../../components/pagination/paginator-ui.js';
import '../../../components/speech/speakable.js';

var allPuzzles = [];
var FILTERS = {
  all: function() { return true; },
  linear: function(p) { return p.category === 'linear'; },
  parallel: function(p) { return p.category === 'parallel'; },
  converging: function(p) { return p.category === 'converging'; }
};
var filterFn = FILTERS.all;

var paginator = createPaginator({
  container: document.getElementById('paginator-bar'),
  items: [],
  perPage: 1,
  wrap: true,
  onRender: function(puzzle) {
    window.PuzzleUI.loadPuzzle(puzzle);
  }
});
window._puzzlePaginator = paginator;

function applyFilter() { paginator.reset(allPuzzles.filter(filterFn)); }

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    filterFn = FILTERS[btn.dataset.cat];
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    applyFilter();
  });
});

Promise.all([
  fetch('../../../content/logic-gates/puzzles-linear.json?v=1').then(function(r) { return r.json(); }),
  fetch('../../../content/logic-gates/puzzles-converging.json?v=1').then(function(r) { return r.json(); })
])
  .then(function(results) {
    allPuzzles = results.flat();
    applyFilter();
  })
  .catch(function(err) {
    document.getElementById('goal-text').textContent = 'Failed to load puzzles';
    console.error('puzzle load error:', err);
  });
</script>
<script type="module">import '../../../components/speech/speech-ui.js';</script>
</body>
</html>
