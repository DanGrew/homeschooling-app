<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colour Wheel</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<link rel="stylesheet" href="../../../styles/speakable.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/" data-title="Colour Wheel" data-instruction="Tap a colour to learn about it" data-links='[{"label":"Primary Colours","href":"../../activities/primary-colours/"},{"label":"Secondary Colours","href":"../../activities/secondary-colours/"}]'></div>
<div class="game-area">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:12px;min-height:0;">
    <svg id="wheel-svg" viewBox="0 0 300 300" style="width:100%;height:100%;max-width:320px;max-height:320px;"></svg>
  </div>
  <div style="flex-shrink:0;background:#fff;border-top:2px solid #eee;padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div id="lsn-slot-a" style="width:72px;height:72px;border-radius:50%;border:4px solid #ddd;background:#f0f0f0;cursor:pointer;"></div>
        <span id="lsn-label-a" style="font-size:0.8em;color:#bbb;font-weight:bold;">A</span>
      </div>
      <span id="lsn-label-plus" style="font-size:1.5em;color:#ccc;font-weight:bold;">+</span>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div id="lsn-slot-b" style="width:72px;height:72px;border-radius:50%;border:4px solid #ddd;background:#f0f0f0;cursor:pointer;"></div>
        <span id="lsn-label-b" style="font-size:0.8em;color:#bbb;font-weight:bold;">B</span>
      </div>
      <span id="lsn-label-equals" style="font-size:1.5em;color:#ccc;font-weight:bold;">=</span>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div id="lsn-result" style="width:72px;height:72px;border-radius:50%;border:4px solid #ddd;background:#f0f0f0;"></div>
        <span id="lsn-result-label" style="font-size:0.8em;color:#bbb;">Result</span>
      </div>
    </div>
    <div id="lsn-palette" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"></div>
  </div>
</div>

<script>
  window.ADULT_PROMPTS_ACTIVITY='colour-wheel';
  window.DICT_BASE='../../../content/dictionary/entries/';
  window.LESSONS=[
    {id:'make_orange',number:1,title:'Make Orange'},
    {id:'make_green',number:2,title:'Make Green'},
    {id:'make_purple',number:3,title:'Make Purple'},
    {id:'find_primaries',number:4,title:'Primary Colours'},
    {id:'find_secondaries',number:5,title:'Secondary Colours'},
    {id:'warm_colours',number:6,title:'Warm Colours'},
    {id:'cool_colours',number:7,title:'Cool Colours'},
    {id:'make_teal',number:8,title:'Make Teal'},
    {id:'make_vermillion',number:9,title:'Make Vermillion'},
    {id:'make_amber',number:10,title:'Make Amber'},
    {id:'make_chartreuse',number:11,title:'Make Chartreuse'},
    {id:'make_indigo',number:12,title:'Make Indigo'},
    {id:'make_magenta',number:13,title:'Make Magenta'}
  ];
</script>
<script src="../../../components/menu.js" defer></script>
<script type="module" src="../../../ui/colour-wheel/colour-wheel-ui.js"></script>
<script type="module">
  import{GuidanceService}from'../../../components/guidance/guidance-service.js';
  fetch('../../../content/lessons/colour-wheel.json')
    .then(function(r){return r.json();})
    .then(function(data){
      window.LESSON_MAP={};
      data.lessons.forEach(function(l){window.LESSON_MAP[l.id]=l;});
      window.guidanceService=new GuidanceService();
    });
</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
<script type="module">import { makeSpeakable } from '../../../components/speech/speakable.js';
import '../../../components/speech/speech-ui.js';
[['lsn-label-a','A'],['lsn-label-plus','plus'],['lsn-label-b','B'],['lsn-label-equals','equals'],['lsn-result-label','Result']].forEach(function(pair){
  [document.getElementById(pair[0])].filter(Boolean).forEach(function(el){makeSpeakable(el,pair[1]);});
});</script>
</body>
</html>
