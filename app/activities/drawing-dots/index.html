<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Drawing Dots</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<script src="../../../components/menu.js" defer></script>
<style>
@keyframes wrong{0%,100%{fill:white}50%{fill:#E74C3C}}
.dot-wrong{animation:wrong 0.4s ease}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../games/" data-prev="prevShape" data-next="nextShape"></div>
<div class="game-area">
  <div id="filter-bar" style="border-bottom:1px solid #eee;"></div>
  <div class="game-title"><span id="title"></span></div>
  <div id="instruction" style="text-align:center;font-size:1.1em;color:#888;padding:0 16px 8px;"></div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
    <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
</div>
<script type="module">
import { startEngine } from '../../../ui/drawing-dots/drawing-dots-engine.js';
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import { loadAllDrawingDots } from '../../../core/dictionary/dictionary-helpers-core.js';
Dictionary.init('../../../content/dictionary/');
var shapes=[];
loadAllDrawingDots(shapes,function(){startEngine(shapes);},function(){document.getElementById('title').textContent='⚠️ Failed to load — check connection';});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='drawing-dots';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
