<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Time</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Comic Sans MS','Chalkboard SE',cursive;display:flex;height:100vh;overflow:hidden;}
#panel{width:180px;min-width:180px;background:#f5f5f5;border-right:2px solid #ddd;display:flex;flex-direction:column;overflow:hidden;}
#panel-header{padding:16px;border-bottom:1px solid #ddd;}
#panel-header a{color:#9B59B6;text-decoration:none;font-size:0.9em;}
#panel-header a:hover{text-decoration:underline;}
#panel-header h2{font-size:1.05em;color:#333;margin-top:8px;line-height:1.3;}
#panel-controls{padding:16px;display:flex;flex-direction:column;gap:10px;}
.ctrl-btn{font-family:inherit;font-size:1em;padding:12px 10px;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation;width:100%;text-align:center;}
#playbtn{background:#9B59B6;color:#fff;}
#stopbtn{background:#E74C3C;color:#fff;}
#restartbtn{background:#2980B9;color:#fff;}
#main{flex:1;overflow-y:auto;background:#fff8f0;}
#player-area{padding:35vh 24px;display:flex;justify-content:center;}
#words{font-size:min(2em,5.5vw);line-height:2.2;text-align:center;max-width:640px;width:100%;}
</style>
</head>
<body>
<div id="panel">
  <div id="panel-header">
    <a href="../index.html">&#8592; Lessons</a>
    <h2 id="story-title"></h2>
  </div>
  <div id="panel-controls">
    <button class="ctrl-btn" id="playbtn">&#9654; Play</button>
    <button class="ctrl-btn" id="stopbtn">&#9646;&#9646; Stop</button>
    <button class="ctrl-btn" id="restartbtn">&#8635; Restart</button>
  </div>
</div>
<div id="main">
  <div id="player-area">
    <div id="words"></div>
  </div>
</div>
<audio id="aud" preload="auto"></audio>
<script src="data.js"></script>
<script src="player.js"></script>
</body>
</html>
