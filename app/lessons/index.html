<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px;}
h1{font-size:3em;color:#333;margin-bottom:32px;}
section{width:100%;max-width:760px;margin-bottom:40px;}
hr{border:none;border-top:3px solid #ddd;margin-bottom:24px;}
h2{text-align:center;font-size:1.8em;color:#555;margin-bottom:20px;}
.tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:180px;height:180px;border-radius:24px;text-decoration:none;color:#333;font-size:1.1em;font-family:inherit;font-weight:bold;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.12);transition:transform 0.15s,box-shadow 0.15s;background:#fff;padding:0 0 16px;}
.tile:hover{transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,0.18);}
.tile svg{flex:1;width:100%;padding:20px 20px 8px;}
.tile span{font-size:1em;text-align:center;padding:0 8px;}
.home{color:#9B59B6;}
</style>
