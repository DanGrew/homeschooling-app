<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Colour Playground</title>
<link rel="stylesheet" href="../../../styles/theme.css">
<link rel="stylesheet" href="../../../styles/style.css">
<script src="../../../components/menu.js" defer></script>
<style>
#mode-bar{display:flex;border-bottom:2px solid #eee;flex-shrink:0;}
.mode-btn{flex:1;padding:10px 0;font-size:1em;font-weight:bold;border:none;background:#f5f5f5;cursor:pointer;color:#888;border-bottom:3px solid transparent;}
.mode-btn.active{background:#fff;color:#333;border-bottom-color:#F39C12;}
#layout{flex:1;display:flex;overflow:hidden;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#sidebar{width:180px;display:flex;flex-direction:column;gap:8px;padding:8px;flex-shrink:0;overflow:hidden;}
#ref-wrap{flex:1;min-height:0;display:flex;flex-direction:column;}
#ref-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
#ref-label{font-size:0.7em;color:#888;}
#ref-toggle{font-size:0.7em;background:#eee;border:none;border-radius:6px;padding:2px 7px;cursor:pointer;color:#555;}
#ref-svg{width:100%;flex:1;min-height:0;}
#guided-pal{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex-shrink:0;}
#free-pal{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
#cur-colour{width:48px;height:48px;border-radius:12px;border:3px solid #ddd;align-self:center;background:#e0e0e0;flex-shrink:0;}
#base-palette{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.swatch{aspect-ratio:1;border-radius:10px;cursor:pointer;border:3px solid transparent;box-sizing:border-box;}
.swatch.sel{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333;}
#mixer{display:flex;align-items:center;gap:4px;}
.mix-slot{width:40px;height:40px;border-radius:10px;border:3px dashed #ccc;cursor:pointer;box-sizing:border-box;flex-shrink:0;background:#f5f5f5;}
.mix-slot.filled{border-style:solid;border-color:#555;}
.mix-op{color:#bbb;font-weight:bold;flex-shrink:0;}
#mix-result{width:40px;height:40px;border-radius:10px;border:3px solid #eee;box-sizing:border-box;flex-shrink:0;background:#f5f5f5;}
#mix-result.filled{border-color:#555;cursor:pointer;}
#shade-pop{display:none;position:fixed;background:#fff;border:2px solid #ccc;border-radius:14px;padding:8px;gap:6px;flex-direction:row;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:200;align-items:center;}
#shade-pop.open{display:flex;}
.shade-sw{width:48px;height:48px;border-radius:10px;cursor:pointer;border:3px solid transparent;box-sizing:border-box;}
.shade-sw:hover{border-color:#555;}
.shade-sw.active-shade{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333;}
@media(orientation:portrait){
  #layout{flex-direction:column;}
  #sidebar{width:100%;flex-direction:row;height:auto;padding:6px 8px;align-items:stretch;}
  #ref-wrap{flex:0 0 auto;width:100px;min-width:80px;}
  #ref-svg{width:100%;height:90px;flex:none;}
  #guided-pal{flex:1;grid-template-columns:repeat(5,1fr);align-content:start;}
  #free-pal{flex:1;flex-direction:column;gap:4px;}
  #cur-colour{width:36px;height:36px;align-self:flex-start;}
  #base-palette{grid-template-columns:repeat(5,1fr);}
  .swatch{aspect-ratio:1;}
  #mixer{gap:3px;}
  .mix-slot,#mix-result{width:32px;height:32px;}
}
</style>
</head>
<body>
<div class="nav-bar" data-home="../../lessons/"></div>
<div class="game-area">
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="magic">✨ Magic</button>
    <button class="mode-btn" data-mode="guided">🎯 Guided</button>
    <button class="mode-btn" data-mode="free">🎨 Free</button>
  </div>
  <div id="filter-bar" style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #eee;"></div>
  <div class="game-title"><span id="title"></span></div>
  <div id="layout">
    <div id="canvas-wrap">
      <svg id="svg" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="sidebar">
      <div id="ref-wrap">
        <div id="ref-header">
          <span id="ref-label">Reference</span>
          <button id="ref-toggle">Hide</button>
        </div>
        <svg id="ref-svg" style="width:100%;flex:1;min-height:0;" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div id="guided-pal"></div>
      <div id="free-pal">
        <div id="cur-colour"></div>
        <div id="base-palette"></div>
        <div id="mixer">
          <div class="mix-slot" id="mix-a"></div>
          <span class="mix-op">+</span>
          <div class="mix-slot" id="mix-b"></div>
          <span class="mix-op">=</span>
          <div id="mix-result"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="paginator-bar"></div>
</div>

<div id="shade-pop">
  <div class="shade-sw" id="sh-light"></div>
  <div class="shade-sw" id="sh-base"></div>
  <div class="shade-sw" id="sh-dark"></div>
</div>

<script src="../../../ui/colouring/colouring-common.js"></script>
<script type="module" src="../../../components/success-banner.js"></script>
<script>var pictures=[];</script>
<script src="../../../assets/colouring/pictures/sun.js"></script>
<script src="../../../assets/colouring/pictures/cat.js"></script>
<script src="../../../assets/colouring/pictures/fish.js"></script>
<script src="../../../assets/colouring/pictures/house.js"></script>
<script src="../../../assets/colouring/pictures/tree.js"></script>
<script type="module">
import Dictionary from '../../../core/dictionary/dictionary-core.js';
import { loadColouringPictures } from '../../../core/dictionary/dictionary-helpers-core.js';
import { buildFilterBar } from '../../../components/filter-bar/filter-bar-ui.js';
import { createPaginator } from '../../../components/pagination/paginator-ui.js';

var BASE=[
  {name:'Red',    base:'#E74C3C',light:'#F1948A',dark:'#922B21'},
  {name:'Blue',   base:'#3498DB',light:'#85C1E9',dark:'#1A5276'},
  {name:'Yellow', base:'#F1C40F',light:'#F9E79F',dark:'#B7950B'},
  {name:'Green',  base:'#2ECC71',light:'#82E0AA',dark:'#1A7A43'},
  {name:'Orange', base:'#E67E22',light:'#F0B27A',dark:'#935116'},
  {name:'Purple', base:'#9B59B6',light:'#C39BD3',dark:'#6C3483'},
  {name:'Pink',   base:'#FF69B4',light:'#FFB3D9',dark:'#C2185B'},
  {name:'Brown',  base:'#795548',light:'#A1887F',dark:'#4E342E'},
  {name:'Black',  base:'#333333',light:'#888888',dark:'#111111'},
  {name:'White',  base:'#F5F5F5',light:'#FFFFFF',dark:'#CCCCCC'},
];

var mode='magic',selectedColour=null,mixA=null,mixB=null,refVisible=true;
var currentPic=null,paginator,filled=0,total=0,popBase=null;

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(function(v){return Math.round(v).toString(16).padStart(2,'0');}).join('');}
function mixHex(a,b){var ra=hexToRgb(a),rb=hexToRgb(b);return rgbToHex((ra[0]+rb[0])/2,(ra[1]+rb[1])/2,(ra[2]+rb[2])/2);}

function baseOf(c){
  for(var i=0;i<BASE.length;i++){var b=BASE[i];if(b.base===c||b.light===c||b.dark===c)return b.base;}
  return null;
}

function setActive(c){
  selectedColour=c;
  var cur=document.getElementById('cur-colour');
  cur.style.background=c||'#e0e0e0';
  cur.style.borderColor=c?'#333':'#ddd';
  var fam=baseOf(c)||c;
  document.querySelectorAll('#base-palette .swatch').forEach(function(sw){
    sw.classList.toggle('sel',sw.dataset.base===fam);
  });
  document.querySelectorAll('#guided-pal .swatch').forEach(function(sw){
    sw.classList.toggle('sel',sw.dataset.colour===c);
  });
  if(popBase){
    document.getElementById('sh-light').classList.toggle('active-shade',popBase.light===c);
    document.getElementById('sh-base').classList.toggle('active-shade',popBase.base===c);
    document.getElementById('sh-dark').classList.toggle('active-shade',popBase.dark===c);
  }
}

var shadePop=document.getElementById('shade-pop');
['sh-light','sh-base','sh-dark'].forEach(function(id,i){
  document.getElementById(id).addEventListener('click',function(e){
    e.stopPropagation();
    if(popBase)setActive([popBase.light,popBase.base,popBase.dark][i]);
    closePop();
  });
});

function openPop(bc,swatchEl){
  popBase=bc;
  document.getElementById('sh-light').style.background=bc.light;
  document.getElementById('sh-base').style.background=bc.base;
  document.getElementById('sh-dark').style.background=bc.dark;
  document.getElementById('sh-light').classList.toggle('active-shade',bc.light===selectedColour);
  document.getElementById('sh-base').classList.toggle('active-shade',bc.base===selectedColour);
  document.getElementById('sh-dark').classList.toggle('active-shade',bc.dark===selectedColour);
  var r=swatchEl.getBoundingClientRect(),popW=3*48+2*6+16+4;
  shadePop.style.left=Math.max(4,Math.min(window.innerWidth-popW-4,r.left+r.width/2-popW/2))+'px';
  shadePop.style.top=Math.max(4,r.top-72)+'px';
  shadePop.classList.add('open');
}
function closePop(){shadePop.classList.remove('open');popBase=null;}
document.addEventListener('click',function(e){
  if(!shadePop.contains(e.target)&&!e.target.closest('#base-palette'))closePop();
});

function updateMix(){
  var el=document.getElementById('mix-result');
  if(mixA&&mixB){
    var c=mixHex(mixA,mixB);
    el.style.background=c;el.classList.add('filled');el.dataset.c=c;
  } else {
    el.style.background='#f5f5f5';el.classList.remove('filled');el.dataset.c='';
  }
}
document.getElementById('mix-a').addEventListener('click',function(){
  if(selectedColour){mixA=selectedColour;this.style.background=mixA;this.classList.add('filled');updateMix();}
});
document.getElementById('mix-b').addEventListener('click',function(){
  if(selectedColour){mixB=selectedColour;this.style.background=mixB;this.classList.add('filled');updateMix();}
});
document.getElementById('mix-result').addEventListener('click',function(){if(this.dataset.c)setActive(this.dataset.c);});

document.getElementById('ref-toggle').addEventListener('click',function(){
  refVisible=!refVisible;
  document.getElementById('ref-svg').style.display=refVisible?'':'none';
  this.textContent=refVisible?'Hide':'Show';
});

document.querySelectorAll('.mode-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    mode=btn.dataset.mode;
    selectedColour=null;
    if(currentPic)renderPicture(currentPic);
  });
});

function applyLayout(){
  var sidebar=document.getElementById('sidebar');
  sidebar.style.display=mode==='magic'?'none':'';
  document.getElementById('guided-pal').style.display=mode==='guided'?'':'none';
  document.getElementById('free-pal').style.display=mode==='free'?'':'none';
}

function buildGuidedPal(pic){
  var gp=document.getElementById('guided-pal');
  gp.innerHTML='';
  var seen={},cols=[];
  pic.shapes.filter(function(s){return !s.noColour;}).forEach(function(s){
    if(!seen[s.colour]){seen[s.colour]=1;cols.push(s.colour);}
  });
  cols.forEach(function(c){
    var d=document.createElement('div');
    d.className='swatch';d.style.background=c;d.dataset.colour=c;
    d.addEventListener('click',function(){setActive(c);});
    gp.appendChild(d);
  });
}

function buildBasePalette(){
  var bp=document.getElementById('base-palette');
  bp.innerHTML='';
  BASE.forEach(function(bc){
    var d=document.createElement('div');
    d.className='swatch';d.style.background=bc.base;d.dataset.base=bc.base;d.title=bc.name;
    d.addEventListener('click',function(e){
      e.stopPropagation();
      if(shadePop.classList.contains('open')&&popBase===bc)closePop();
      else openPop(bc,d);
    });
    bp.appendChild(d);
  });
}

function renderRef(pic){
  var ref=document.getElementById('ref-svg');
  ref.innerHTML='';ref.setAttribute('viewBox',pic.vb);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:s.colour||'#eee',stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    ref.appendChild(ns(s.tag,attrs));
  });
  ref.style.display=refVisible?'':'none';
}

function renderPicture(pic){
  currentPic=pic;closePop();selectedColour=null;filled=0;
  document.getElementById('title').textContent=pic.name;
  hideBanner();
  total=pic.shapes.filter(function(s){return !s.noColour;}).length;
  var svg=document.getElementById('svg');
  svg.innerHTML='';svg.setAttribute('viewBox',pic.vb);
  injectDotPattern(svg);
  pic.shapes.forEach(function(s){
    var attrs=Object.assign({},{fill:'url(#dots)',stroke:'#333','stroke-width':'4','stroke-linejoin':'round','stroke-linecap':'round'},s.attrs);
    var el=ns(s.tag,attrs);
    if(s.noColour){
      svg.appendChild(el);
    } else {
      el.style.cursor='pointer';
      el.addEventListener('click',function(){
        if(mode==='magic'){
          el.setAttribute('fill',s.colour);filled++;
          if(filled===total)showBanner(function(){paginator.next();});
        } else if(selectedColour){
          el.setAttribute('fill',selectedColour);
        }
      });
      svg.appendChild(el);
    }
  });
  renderRef(pic);
  if(mode==='guided')buildGuidedPal(pic);
  applyLayout();
}

buildBasePalette();
applyLayout();

paginator=createPaginator({
  container:document.getElementById('paginator-bar'),
  items:[],perPage:1,wrap:true,
  onRender:function(pic){renderPicture(pic);}
});

Dictionary.init('../../../content/dictionary/');
loadColouringPictures(pictures,function(){
  buildFilterBar(pictures,function(f){paginator.reset(f);});
},function(){document.getElementById('title').textContent='⚠️ Failed to load — check connection';});
</script>
<script>window.ADULT_PROMPTS_ACTIVITY='colouring-playground';</script>
<script src="../../../components/adult-prompts/adult-prompts-ui.js" defer></script>
</body>
</html>
