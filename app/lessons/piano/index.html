<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piano</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;font-family:'Comic Sans MS','Chalkboard SE',cursive;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0;}
#stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#note-display{font-size:clamp(3em,15vw,7em);line-height:1;transition:color 0.15s;}
#note-hint{font-size:clamp(1em,3vw,1.4em);color:#bbb;}
#keys-wrap{height:min(220px,30vh);flex-shrink:0;padding:0 4px 4px;gap:3px;}
</style>
</head>
<body>
<div id="header">
  <a href="../index.html" style="font-size:1.6em;text-decoration:none;">&#127968;</a>
  <span style="font-size:1.5em;font-weight:bold;color:#333;">&#127929; Piano</span>
  <a href="../../games/piano/index.html" style="font-size:0.95em;color:#9B59B6;text-decoration:none;font-weight:bold;">Game &#9654;</a>
</div>
<div id="stage">
  <div id="note-display">&#9834;</div>
  <div id="note-hint">Tap a key!</div>
</div>
<div id="keys-wrap"></div>
<script src="../../assets/js/piano-shared.js"></script>
<script>
var display = document.getElementById('note-display');
var hint = document.getElementById('note-hint');
renderKeys(document.getElementById('keys-wrap'), function(i, note, keyEl) {
  initAudio().then(function() { playNote(note, 1.0); }).catch(function(){});
  glowKey(keyEl, 'hit');
  display.textContent = PIANO_CONFIG.NOTE_LABELS[i] + ' \u266a';
  display.style.color = PIANO_CONFIG.KEY_COLORS[i];
  hint.style.display = 'none';
});
</script>
</body>
</html>
