<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stories</title>
<link rel="stylesheet" href="/homeschooling-app/app/shared/theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px;}
h1{font-size:3em;color:#333;margin-bottom:32px;}
.tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:180px;height:180px;border-radius:24px;text-decoration:none;color:#333;font-size:1.1em;font-family:inherit;font-weight:bold;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.12);transition:transform 0.15s,box-shadow 0.15s;background:#fff;padding:0 0 16px;}
.tile:hover{transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,0.18);}
.tile svg{flex:1;width:100%;padding:20px 20px 8px;}
.tile span{font-size:1em;text-align:center;padding:0 8px;}
.home{display:block;margin-bottom:24px;color:#F59E0B;font-size:1em;text-decoration:none;}
.home:hover{text-decoration:underline;}
</style>
</head>
<body>
<a class="home" href="../index.html">&#127968; Home</a>
<h1>Stories!</h1>
<div class="tiles">

  <a class="tile" href="/homeschooling-app/app/activities/story-time/?story=david-and-goliath" style="background:#FFF8E7;">
    <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="48" rx="18" ry="6" fill="#c8a06a"/>
      <rect x="36" y="20" width="8" height="28" fill="#c8a06a"/>
      <circle cx="40" cy="16" r="8" fill="#f5c97a"/>
      <line x1="20" y1="30" x2="60" y2="30" stroke="#888" stroke-width="2"/>
      <circle cx="62" cy="26" r="6" fill="#e74c3c"/>
    </svg>
    <span>David and Goliath</span>
  </a>

  <a class="tile" href="/homeschooling-app/app/activities/story-time/?story=jonah-and-the-big-fish" style="background:#E8F4FF;">
    <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="36" cy="38" rx="22" ry="14" fill="#4FC3F7"/>
      <polygon points="58,30 72,24 72,46" fill="#0288D1"/>
      <ellipse cx="28" cy="34" rx="4" ry="3" fill="#fff" opacity="0.6"/>
      <circle cx="27" cy="34" r="1.5" fill="#333"/>
      <path d="M10 20 Q20 8 30 20" stroke="#f5c97a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
    <span>Jonah and the Big Fish</span>
  </a>

</div>
</body>
</html>
