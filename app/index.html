<title>Home</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px 48px;}
h1{font-size:3em;color:#333;margin-bottom:48px;}
.tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:28px;}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:180px;height:180px;border-radius:24px;text-decoration:none;color:#333;font-size:1.1em;font-family:inherit;font-weight:bold;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.12);transition:transform 0.15s,box-shadow 0.15s;background:#fff;padding:0 0 16px;}
.tile:hover{transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,0.18);}
.tile svg{flex:1;width:100%;padding:20px 20px 8px;}
.tile span{font-size:1em;text-align:center;padding:0 8px;}
.section-divider{width:100%;max-width:600px;display:flex;align-items:center;gap:16px;margin:48px 0 32px;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:2px;background:#e5e7eb;border-radius:2px;}
.section-divider h2{font-size:1.1em;color:#9ca3af;white-space:nowrap;}
</style>
</head>
