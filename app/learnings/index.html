<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Learnings</title>
<link rel="stylesheet" href="../../styles/theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff8f0;font-family:inherit;padding:24px 16px 48px;}
#page-layout{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
#journal-col{flex:1;min-width:280px;}
a.back{display:inline-block;margin-bottom:20px;color:#7c6fcd;text-decoration:none;font-size:0.95em;}
a.back:hover{text-decoration:underline;}
h1{font-size:2em;color:#333;margin-bottom:28px;}
.group-label{font-size:0.85em;font-weight:bold;color:#9ca3af;text-transform:uppercase;letter-spacing:0.08em;margin:32px 0 12px;}
.group-label:first-of-type{margin-top:0;}
.entry{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.07);}
.entry-time{font-size:0.78em;color:#aaa;margin-bottom:4px;}
.entry-source{font-size:0.78em;color:#bbb;margin-bottom:2px;}
.entry-source:empty{display:none;}
.entry-title{font-size:1em;font-weight:bold;color:#333;margin-bottom:6px;}
.entry-criteria{display:flex;flex-wrap:wrap;gap:6px;}
.entry-criteria:empty{display:none;}
.tag{font-size:0.75em;background:#f0e8ff;color:#7c6fcd;border-radius:6px;padding:2px 8px;}
.empty{color:#bbb;font-size:0.95em;margin-top:32px;text-align:center;}
#breakdown-panel{width:260px;flex-shrink:0;position:sticky;top:24px;}
.bp-section{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,0.07);margin-bottom:16px;}
.bp-heading{font-size:0.8em;font-weight:bold;color:#9ca3af;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}
.bar-row{margin-bottom:10px;}
.bar-label{font-size:0.75em;color:#555;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{height:8px;background:#f3f0fb;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.bar-row-zero .bar-label{color:#ccc;}
.entry-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.entry-meta:empty{display:none;}
.meta-tag{font-size:0.72em;background:#f5f5f5;color:#888;border-radius:6px;padding:2px 8px;}
.filter-bar{display:flex;gap:16px;align-items:center;margin-bottom:24px;flex-wrap:wrap;}
.filter-bar label{font-size:0.85em;color:#555;display:flex;align-items:center;gap:6px;}
.filter-bar select{font-family:inherit;font-size:0.85em;border:1px solid #ddd;border-radius:6px;padding:4px 8px;background:#fff;color:#333;}
</style>
</head>
<body>
<div id="page-layout">
  <div id="journal-col">
    <a class="back" href="../">← Home</a>
    <h1>Learnings</h1>
    <div class="filter-bar">
      <label>From <select id="filter-from"><option value=""></option></select></label>
      <label>To <select id="filter-to"><option value=""></option></select></label>
    </div>
    <div id="journal"></div>
  </div>
  <div id="breakdown-panel">
    <div class="bp-section">
      <div class="bp-heading">Areas</div>
      <div id="area-bars"></div>
    </div>
    <div class="bp-section">
      <div class="bp-heading">Skills</div>
      <div id="crit-bars"></div>
    </div>
  </div>
</div>
<script type="module">
import { getAllEvents } from '../../core/telemetry/learning-db.js';
import { fetchLearning, buildEntryViewModel, sortAndGroupEvents, formatCriterion, extraMetaTags } from '../../core/telemetry/learning-journal-core.js';

var ZERO_CLASS = { 'true': ' bar-row-zero', 'false': '' };

var AREA_META = [
  { key: 'ead',      label: 'Expressive Arts',        color: '#9B59B6' },
  { key: 'uw',       label: 'Understanding the World', color: '#27AE60' },
  { key: 'cl',       label: 'Communication',           color: '#3498DB' },
  { key: 'pd',       label: 'Physical Dev.',           color: '#E67E22' },
  { key: 'psed',     label: 'Personal & Social',       color: '#E91E63' },
  { key: 'literacy', label: 'Literacy',                color: '#1ABC9C' },
  { key: 'maths',    label: 'Maths',                   color: '#E74C3C' }
];

var NO_EVENTS = {
  'true':  function(j)    { j.innerHTML = '<p class="empty">No learnings recorded yet.</p>'; },
  'false': function(j, e) { renderGroups(j, e); }
};

function buildTimeOptions(sel) {
  Array.from({ length: 96 }, function(_, i) {
    var opt = document.createElement('option');
    opt.value = i * 15;
    opt.textContent = ('0' + Math.floor(i * 15 / 60)).slice(-2) + ':' + ('0' + (i * 15 % 60)).slice(-2);
    sel.appendChild(opt);
  });
}
buildTimeOptions(document.getElementById('filter-from'));
buildTimeOptions(document.getElementById('filter-to'));

function renderEntry(event, lesson) {
  var vm = buildEntryViewModel(event, lesson);
  var div = document.createElement('div');
  div.className = 'entry';
  var metaTags = extraMetaTags(vm, event)
    .concat([{ key: 'difficulty', label: 'Difficulty', val: vm.difficulty }])
    .filter(function(m) { return m.val !== undefined; })
    .map(function(m) { return '<span class="meta-tag">' + m.label + ': ' + m.val + '</span>'; })
    .join('');
  div.innerHTML =
    '<div class="entry-time">' + vm.timeStr + '</div>' +
    '<div class="entry-source">' + vm.sourceStr + '</div>' +
    '<div class="entry-title">' + vm.title + '</div>' +
    '<div class="entry-meta">' + metaTags + '</div>' +
    '<div class="entry-criteria">' + vm.criteriaTags.map(function(t) {
      return '<span class="tag">' + t + '</span>';
    }).join('') + '</div>';
  return div;
}

function appendEntry(wrap, event) {
  var placeholder = document.createElement('div');
  wrap.appendChild(placeholder);
  var lid = [event.learning_id, event.lessonId].filter(Boolean)[0];
  fetchLearning(lid, function(learning) {
    wrap.replaceChild(renderEntry(event, learning), placeholder);
  });
}

function renderGroup(journal, label, events) {
  var h = document.createElement('div');
  h.className = 'group-label';
  h.textContent = label;
  journal.appendChild(h);
  var wrap = document.createElement('div');
  journal.appendChild(wrap);
  events.forEach(function(event) { appendEntry(wrap, event); });
}

function renderGroups(journal, events) {
  var grouped = sortAndGroupEvents(events);
  grouped.order.forEach(function(label) { renderGroup(journal, label, grouped.groups[label]); });
}

function makeBar(label, pct, color) {
  var row = document.createElement('div');
  row.className = 'bar-row' + ZERO_CLASS[String(pct === 0)];
  row.innerHTML =
    '<div class="bar-label">' + label + '</div>' +
    '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>';
  return row;
}

function renderBreakdown(events, learnings) {
  var areaTally = {};
  var critTally = {};
  AREA_META.forEach(function(a) { areaTally[a.key] = 0; });
  Object.keys(learnings).forEach(function(lid) {
    learnings[lid].criteria.forEach(function(c) { critTally[c] = 0; });
  });
  events.forEach(function(ev) {
    var lid = [ev.learning_id, ev.lessonId].filter(Boolean)[0];
    [learnings[lid]].filter(Boolean).forEach(function(l) {
      l.criteria.forEach(function(c) {
        areaTally[c.split('.')[0]] += 1;
        critTally[c] += 1;
      });
    });
  });
  var areaMax = Math.max(1, Math.max.apply(null, AREA_META.map(function(a) { return areaTally[a.key]; })));
  var areaBars = document.getElementById('area-bars');
  AREA_META.forEach(function(a) {
    areaBars.appendChild(makeBar(a.label, Math.round((areaTally[a.key] / areaMax) * 100), a.color));
  });
  var critKeys = Object.keys(critTally).sort(function(a, b) { return critTally[b] - critTally[a]; });
  var critMax = [critKeys[0]].filter(Boolean).reduce(function(acc, k) { return critTally[k]; }, 1);
  var critBars = document.getElementById('crit-bars');
  critKeys.forEach(function(c) {
    critBars.appendChild(makeBar(formatCriterion(c), Math.round((critTally[c] / critMax) * 100), '#7c6fcd'));
  });
  [critKeys.length].filter(function(n) { return n === 0; }).forEach(function() {
    critBars.innerHTML = '<p style="font-size:0.8em;color:#ccc;">No criteria yet.</p>';
  });
}

var _allEvents = [];

function renderJournal() {
  var journal = document.getElementById('journal');
  journal.innerHTML = '';
  NO_EVENTS[String(_allEvents.length === 0)](journal, _allEvents);
}

document.getElementById('filter-from').addEventListener('change', renderJournal);
document.getElementById('filter-to').addEventListener('change', renderJournal);

getAllEvents(function(events) {
  _allEvents = events;
  renderJournal();
  var seen = {};
  var lids = [];
  events.forEach(function(ev) {
    var lid = [ev.learning_id, ev.lessonId].filter(Boolean)[0];
    [lid].filter(Boolean).filter(function(id) { return seen[id] === undefined; }).forEach(function(id) {
      seen[id] = true;
      lids.push(id);
    });
  });
  var loaded = {};
  var remaining = lids.length;
  function onAllLoaded() { renderBreakdown(events, loaded); }
  [lids.length].filter(function(n) { return n === 0; }).forEach(onAllLoaded);
  lids.forEach(function(lid) {
    fetchLearning(lid, function(learning) {
      [learning].filter(Boolean).forEach(function(l) { loaded[lid] = l; });
      remaining -= 1;
      [remaining].filter(function(r) { return r === 0; }).forEach(onAllLoaded);
    });
  });
});
</script>
</body>
</html>
