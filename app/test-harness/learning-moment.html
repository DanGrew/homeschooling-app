<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Learning Moment Harness</title>
<link rel="stylesheet" href="../../styles/theme.css">
<link rel="stylesheet" href="../../styles/style.css">
<link rel="stylesheet" href="../../styles/speakable.css">
</head>
<body>
<div class="nav-bar" data-home="../../app/" data-title="Learning Moment Harness" data-no-instruction="test harness" data-no-links="test harness"></div>
<div class="game-area">
<button id="trigger" style="margin:40px;padding:12px 24px;font-size:1em;">Show Learning Moment</button>
</div>
<script src="../../components/menu.js" defer></script>
<script type="module">
import { showLearningMoment } from '../../components/learning-moments/learning-moment-service.js';
import { recordLearningEvent } from '../../core/telemetry/learning-events.js';
import '../../components/speech/speech-ui.js';
import { makeSpeakable } from '../../components/speech/speakable.js';
var btn = document.getElementById('trigger');
makeSpeakable(btn, 'Show Learning Moment');
btn.addEventListener('click', function() {
  showLearningMoment('You made orange!');
});
window._showLearningMoment = showLearningMoment;
window._recordLearningEvent = recordLearningEvent;
window._showWithActivity = function(msg, act) { showLearningMoment(msg, act); };
</script>
</body>
</html>
