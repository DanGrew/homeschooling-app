name: Architecture Checks

on:
  push:
  pull_request:

jobs:

  no-dom-in-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-dom-in-core reports/no-dom.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-dom
          path: reports/no-dom.txt

  no-ui-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-ui-imports reports/no-ui-imports.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-ui-imports
          path: reports/no-ui-imports.txt

  ui-complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js ui-complexity reports/ui-complexity.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-ui-complexity
          path: reports/ui-complexity.txt

  aggregate-report:
    runs-on: ubuntu-latest
    needs:
      - no-dom-in-core
      - no-ui-imports
      - ui-complexity
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports
          merge-multiple: true

      - name: Collect reports
        run: |
          if [ ! -f reports/no-dom.txt ]; then echo "Missing no-dom report"; exit 1; fi
          if [ ! -f reports/no-ui-imports.txt ]; then echo "Missing ui-imports report"; exit 1; fi
          if [ ! -f reports/ui-complexity.txt ]; then echo "Missing complexity report"; exit 1; fi

          echo "## 🧱 Architecture Report" > combined.txt
          echo "" >> combined.txt
          cat reports/no-dom.txt >> combined.txt
          echo "" >> combined.txt
          cat reports/no-ui-imports.txt >> combined.txt
          echo "" >> combined.txt
          cat reports/ui-complexity.txt >> combined.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: combined.txt
