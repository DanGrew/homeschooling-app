name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: git fetch origin main
      - run: npm run test:coverage
      - name: Write coverage report
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          if (!fs.existsSync('coverage/coverage-summary.json')) {
            fs.writeFileSync('coverage-report.md', '### Unit Test Coverage\n⚠️ Coverage data missing — tests may have failed.');
            process.exit(0);
          }
          const cov = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const s = cov.total;
          const row = (label, key) => \`| \${label} | \${s[key].pct}% | \${s[key].covered} / \${s[key].total} |\`;
          let changedSection = '';
          try {
            const changed = execSync('git diff --name-only origin/main...HEAD').toString().trim().split('\n').filter(Boolean);
            const hits = changed.map(f => {
              const data = cov[process.cwd() + '/' + f];
              return data ? \`- \\\`\${f}\\\` — lines: \${data.lines.pct}%, functions: \${data.functions.pct}%\` : null;
            }).filter(Boolean);
            if (hits.length) changedSection = '\n\n### Changed Files Coverage\n' + hits.join('\n');
            else changedSection = '\n\n### Changed Files Coverage\n_No changed files instrumented by Vitest (ui/ and app/ files are covered by Playwright, not unit tests)_';
          } catch(e) {}
          const body = [
            '### Unit Test Coverage',
            '| Metric | % | Covered / Total |',
            '|--------|---|-----------------|',
            row('Lines', 'lines'),
            row('Statements', 'statements'),
            row('Functions', 'functions'),
            row('Branches', 'branches'),
          ].join('\n') + changedSection;
          fs.writeFileSync('coverage-report.md', body);
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-coverage
          path: coverage-report.md

  check-untested:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Check untested files
        run: |
          node scripts/check-untested.js 2>&1 | tee untested-report.txt
          exit ${PIPESTATUS[0]}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-untested
          path: untested-report.txt

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install chromium --with-deps
      - run: npm test

  no-dom-in-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-dom-in-core reports/no-dom.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-dom
          path: reports/no-dom.txt

  no-ui-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-ui-imports reports/no-ui-imports.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-ui-imports
          path: reports/no-ui-imports.txt

  ui-cyclomatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: git fetch origin main
      - run: mkdir -p reports
      - run: node scripts/check-ui-cyclomatic.js reports/ui-cyclomatic.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-ui-cyclomatic
          path: reports/ui-cyclomatic.txt

  no-stray-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-stray-files reports/no-stray-files.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-stray-files
          path: reports/no-stray-files.txt

  no-app-exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-app-exports reports/no-app-exports.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-app-exports
          path: reports/no-app-exports.txt

  pr-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    needs:
      - coverage
      - check-untested
      - no-dom-in-core
      - no-ui-imports
      - ui-cyclomatic
      - no-stray-files
      - no-app-exports
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports
          merge-multiple: true

      - name: Combine reports
        run: |
          {
            cat reports/coverage-report.md 2>/dev/null || echo "### Unit Test Coverage\n⚠️ Report missing"
            echo ""
            echo "### Untested Files Check"
            echo '```'
            cat reports/untested-report.txt 2>/dev/null || echo "⚠️ Report missing"
            echo '```'
            echo ""
            echo "### Architecture Checks"
            cat reports/no-dom.txt 2>/dev/null || echo "⚠️ no-dom-in-core report missing"
            echo ""
            cat reports/no-ui-imports.txt 2>/dev/null || echo "⚠️ no-ui-imports report missing"
            echo ""
            cat reports/no-stray-files.txt 2>/dev/null || echo "⚠️ no-stray-files report missing"
            echo ""
            cat reports/no-app-exports.txt 2>/dev/null || echo "⚠️ no-app-exports report missing"
            echo ""
            cat reports/ui-cyclomatic.txt 2>/dev/null || echo "⚠️ ui-cyclomatic report missing"
          } > combined.md

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: combined.md
