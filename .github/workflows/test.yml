name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: git fetch origin main
      - run: npm run test:coverage
      - name: Write coverage report
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          if (!fs.existsSync('coverage/coverage-summary.json')) {
            fs.writeFileSync('coverage-report.md', '### Unit Test Coverage\n⚠️ Coverage data missing — tests may have failed.');
            process.exit(0);
          }
          const cov = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const s = cov.total;
          const row = (label, key) => \`| \${label} | \${s[key].pct}% | \${s[key].covered} / \${s[key].total} |\`;
          let changedSection = '';
          try {
            const changed = execSync('git diff --name-only origin/main...HEAD').toString().trim().split('\n').filter(Boolean);
            const hits = changed.map(f => {
              const data = cov[process.cwd() + '/' + f];
              return data ? \`- \\\`\${f}\\\` — lines: \${data.lines.pct}%, functions: \${data.functions.pct}%\` : null;
            }).filter(Boolean);
            if (hits.length) changedSection = '\n\n### Changed Files Coverage\n' + hits.join('\n');
            else changedSection = '\n\n### Changed Files Coverage\n_No changed files instrumented by Vitest (ui/ and app/ files are covered by Playwright, not unit tests)_';
          } catch(e) {}
          const body = [
            '### Unit Test Coverage',
            '| Metric | % | Covered / Total |',
            '|--------|---|-----------------|',
            row('Lines', 'lines'),
            row('Statements', 'statements'),
            row('Functions', 'functions'),
            row('Branches', 'branches'),
          ].join('\n') + changedSection;
          fs.writeFileSync('coverage-report.md', body);
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-coverage
          path: coverage-report.md

  check-untested:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Check untested files
        run: |
          node scripts/check-untested.js 2>&1 | tee untested-report.txt
          exit ${PIPESTATUS[0]}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-untested
          path: untested-report.txt

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install chromium --with-deps
      - run: npm test

  no-dom-in-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-dom-in-core reports/no-dom.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-dom
          path: reports/no-dom.txt

  no-ui-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-ui-imports reports/no-ui-imports.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-ui-imports
          path: reports/no-ui-imports.txt

  ui-cyclomatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: git fetch origin main
      - run: mkdir -p reports
      - run: node scripts/check-ui-cyclomatic.js reports/ui-cyclomatic.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-ui-cyclomatic
          path: reports/ui-cyclomatic.txt

  no-stray-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-stray-files reports/no-stray-files.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-stray-files
          path: reports/no-stray-files.txt

  no-app-exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-app-exports reports/no-app-exports.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-app-exports
          path: reports/no-app-exports.txt

  no-guard-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-guard-chain reports/no-guard-chain.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-guard-chain
          path: reports/no-guard-chain.txt

  no-filter-conditional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/arch-check.js no-filter-conditional reports/no-filter-conditional.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-no-filter-conditional
          path: reports/no-filter-conditional.txt

  check-manifest-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p reports
      - run: node scripts/check-manifest-files.js reports/check-manifest-files.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-check-manifest-files
          path: reports/check-manifest-files.txt

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: mkdir -p reports
      - run: node scripts/validate-schemas.js reports/validate-json.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-validate-json
          path: reports/validate-json.txt

  check-contracts:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run page contract validator
        run: |
          mkdir -p reports
          node scripts/contracts/run.js 2>&1 | tee reports/contracts.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-contracts
          path: reports/contracts.txt

  contracts-speakable:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install chromium --with-deps
      - name: Run speakable contract tests
        run: |
          mkdir -p reports
          npx playwright test --config playwright.contracts.config.js --reporter=line 2>&1 | tee reports/contracts-speakable.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-contracts-speakable
          path: reports/contracts-speakable.txt

  pr-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    needs:
      - coverage
      - check-untested
      - no-dom-in-core
      - no-ui-imports
      - ui-cyclomatic
      - no-stray-files
      - no-app-exports
      - no-guard-chain
      - no-filter-conditional
      - check-manifest-files
      - validate-json
      - check-contracts
      - contracts-speakable
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports
          merge-multiple: true

      - name: Combine reports
        run: |
          smry() { grep '^SUMMARY:' "$1" 2>/dev/null | sed 's/^SUMMARY: //' || echo "⚠️ missing"; }
          row() { echo "| $1 | $2 |"; }
          {
            echo "<!-- ci-report -->"
            echo "**CI Report** · \`${GITHUB_SHA:0:7}\` · $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            COV=$(grep '| Lines' reports/coverage-report.md 2>/dev/null | grep -oP '\d+\.?\d*%' | head -1 || echo "⚠️ missing")
            row "Coverage (lines)" "$COV"
            row "Untested files" "$(smry reports/untested-report.txt)"
            row "no-dom-in-core" "$(smry reports/no-dom.txt)"
            row "no-ui-imports" "$(smry reports/no-ui-imports.txt)"
            row "no-stray-files" "$(smry reports/no-stray-files.txt)"
            row "no-app-exports" "$(smry reports/no-app-exports.txt)"
            row "no-guard-chain" "$(smry reports/no-guard-chain.txt)"
            row "no-filter-conditional" "$(smry reports/no-filter-conditional.txt)"
            row "manifest files" "$(smry reports/check-manifest-files.txt)"
            row "validate-json" "$(smry reports/validate-json.txt)"
            row "ui-cyclomatic" "$(smry reports/ui-cyclomatic.txt)"
            row "Page Contract Checks" "$(smry reports/contracts.txt)"
            SPEAKABLE=$(sed 's/\x1b\[[0-9;]*[A-Za-z]//g' reports/contracts-speakable.txt 2>/dev/null)
            SPFAIL=$(echo "$SPEAKABLE" | grep -oP '\d+ failed' | grep -oP '\d+' | tail -1)
            SPPASS=$(echo "$SPEAKABLE" | grep -oP '\d+ passed' | grep -oP '\d+' | tail -1)
            if [ -n "$SPFAIL" ]; then
              row "Speakable Button Contracts" "❌ ${SPFAIL} / $((${SPFAIL:-0} + ${SPPASS:-0})) tests"
            elif [ -n "$SPPASS" ]; then
              row "Speakable Button Contracts" "✅ 0 / ${SPPASS} tests"
            else
              row "Speakable Button Contracts" "⚠️ missing"
            fi
          } > combined.md

      - name: Find existing CI report comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- ci-report -->'

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: combined.md
          edit-mode: replace
