<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colouring Palette</title>
<style>
body{font-family:sans-serif;padding:24px;background:#f5f5f5;}
h1{font-size:1rem;margin:0 0 16px;color:#444;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px;}
.swatch{border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.colour{height:72px;}
.label{background:#fff;padding:4px 6px;font-size:11px;line-height:1.4;}
.num{font-weight:700;font-size:13px;}
.hex{color:#666;font-family:monospace;}
.name{color:#888;font-size:10px;}
</style>
</head>
<body>
<h1>Colouring palette — tell me which numbers to remove</h1>
<div class="grid" id="grid"></div>
<script>
const PALETTE = [
  ['#111111','near-black'],
  ['#555555','dark grey'],
  ['#9E9E9E','mid grey'],
  ['#BDC3C7','light grey'],
  ['#FFFFFF','white'],
  ['#FDEBD0','skin/peach'],
  ['#795548','brown'],
  ['#CD853F','golden tan'],
  ['#922B21','dark red'],
  ['#E74C3C','red'],
  ['#FF69B4','hot pink'],
  ['#F8BBD0','pale pink'],
  ['#CE93D8','light purple'],
  ['#9B59B6','purple'],
  ['#1F3A93','dark blue'],
  ['#3498DB','blue'],
  ['#5DADE2','light blue'],
  ['#1ABC9C','teal'],
  ['#27AE60','dark green'],
  ['#7CB342','mid green'],
  ['#C0CA33','olive/yellow-green'],
  ['#FFF9C4','pale yellow'],
  ['#FFF9C4','pale yellow'],
  ['#F1C40F','yellow'],
  ['#F39C12','amber'],
  ['#E67E22','orange'],
];

const grid = document.getElementById('grid');
PALETTE.forEach(([hex, name], i) => {
  const div = document.createElement('div');
  div.className = 'swatch';
  const isDark = isDarkColour(hex);
  div.innerHTML = `
    <div class="colour" style="background:${hex};display:flex;align-items:center;justify-content:center;">
      <span class="num" style="color:${isDark?'#fff':'#000'};opacity:.7;font-size:18px;">${i+1}</span>
    </div>
    <div class="label">
      <div class="num">${i+1}</div>
      <div class="hex">${hex}</div>
      <div class="name">${name}</div>
    </div>`;
  grid.appendChild(div);
});

function isDarkColour(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)<128;
}
</script>
</body>
</html>
